function togglePendingCorte(idx) {
  if (!state._pendingCortes) state._pendingCortes = state.players.map(function() { return false; });
  state._pendingCortes[idx] = !state._pendingCortes[idx];
  var btn = document.querySelector('#roundInputs .btn-corte[data-idx="' + idx + '"]');
  if (btn) btn.classList.toggle('active', state._pendingCortes[idx]);
}

function getTotalFines() {
  return state.players.map(function(_, pi) {
    return (state.fines || []).reduce(function(sum, fineRound) { return sum + ((fineRound && fineRound[pi]) || 0); }, 0);
  });
}

function getTotalCortes() {
  return state.players.map(function(_, pi) {
    return (state.cortes || []).reduce(function(sum, roundCortes) {
      return sum + ((roundCortes && roundCortes[pi]) ? -50 : 0);
    }, 0);
  });
}

function getFinalTotals() {
  var totals = getTotals();
  var totalFines = getTotalFines();
  var totalCortes = getTotalCortes();
  return totals.map(function(t, i) { return t + totalFines[i] + totalCortes[i]; });
}

function submitRound() {
  const scores = state.players.map((_, i) => {
    return parseInt(document.getElementById(`roundScore_${i}`).value) || 0;
  });

  if (scores.every(s => s === 0)) {
    alert(t('game_alert_no_scores'));
    return;
  }

  var fines = state.players.map(function(_, i) { return Math.max(0, parseInt(document.getElementById('roundFine_'+i)?.value) || 0); });
  var cortesThisRound = state.players.map(function(_, i) {
    return !!(state._pendingCortes && state._pendingCortes[i]);
  });
  state.rounds.push(scores);
  state.fines.push(fines);
  state.cortes.push(cortesThisRound);
  state._pendingCortes = null;
  state.currentRound = state.rounds.length;
  state.lastRoundRoastMessages = buildRoastMessages(scores);
  state.justSubmittedRound = true;

  const totals = getTotals();
  var submittedRoundIndex = state.rounds.length - 1;
  var submittedSnapshot = { scores: scores.slice(), fines: fines.slice(), cortes: cortesThisRound.slice() };
  if (totals.some(t => t >= state.maxPoints)) {
    state.gameOver = true;
    saveCurrentGame();
    logEdit('submit_round', submittedRoundIndex, { after: submittedSnapshot });
    logEdit('finish_game', null, { totals: totals.slice(), maxPoints: state.maxPoints });
    showScreen('results');
    return;
  }

  saveCurrentGame();
  logEdit('submit_round', submittedRoundIndex, { after: submittedSnapshot });
  renderGame();
}

function openEditMaxPoints() {

function closeEditMaxPoints() {
  document.getElementById('editMaxPointsModal').classList.remove('active');

function saveEditMaxPoints() {
  const val = parseInt(document.getElementById('newMaxPointsInput').value);
  if (!val || val < 50) { alert(t('edit_limit_label')); return; }
  var oldMaxPoints = state.maxPoints;
  state.maxPoints = val;
  closeEditMaxPoints();

  const finalTotals = getFinalTotals();
  const wasOver = state.gameOver;
  state.gameOver = finalTotals.some(function(t) { return t >= state.maxPoints; });
  saveCurrentGame();
  logEdit('edit_max_points', null, { before: oldMaxPoints, after: val, wasOver: wasOver, isOver: state.gameOver });
  if (state.gameOver && !wasOver) {
    logEdit('finish_game', null, { totals: finalTotals.slice(), maxPoints: state.maxPoints, via: 'edit_max_points' });
  }

  if (!state.gameOver && wasOver) {
    // Game re-opened: go back to game screen
    showScreen('game');
  } else if (document.getElementById('game').classList.contains('active')) {
    renderGame();
  } else if (document.getElementById('results').classList.contains('active')) {
    renderResults();
  }
}

function saveEditRound() {
  if (editingRound < 0) return;
  var editedRoundIdx = editingRound;
  var beforeSnapshot = _snapshotRound(editedRoundIdx);
  if (!state.fines[editingRound]) state.fines[editingRound] = state.players.map(function() { return 0; });
  if (!state.cortes[editingRound]) state.cortes[editingRound] = state.players.map(function() { return false; });
  state.players.forEach((_, i) => {
    state.rounds[editingRound][i] = parseInt(document.getElementById(`editScore_${i}`).value) || 0;
    state.fines[editingRound][i] = Math.max(0, parseInt(document.getElementById('editFine_'+i)?.value) || 0);
    state.cortes[editingRound][i] = !!document.getElementById('editCorte_'+i)?.checked;
  });
  var afterSnapshot = _snapshotRound(editedRoundIdx);
  closeEditModal();
  saveCurrentGame();
  logEdit('edit_round', editedRoundIdx, { before: beforeSnapshot, after: afterSnapshot });

  const totals = getTotals();
  const wasOver = state.gameOver;
  state.gameOver = totals.some(t => t >= state.maxPoints);
  if (state.gameOver && !wasOver) {
    logEdit('finish_game', null, { totals: totals.slice(), maxPoints: state.maxPoints, via: 'edit_round' });
  }

  if (state.gameOver && document.getElementById('results').classList.contains('active')) {
    renderResults();
  } else if (state.gameOver && !wasOver) {
    showScreen('results');
  } else if (!state.gameOver && wasOver) {
    showScreen('game');
  } else {
    if (document.getElementById('game').classList.contains('active')) renderGame();
    if (document.getElementById('results').classList.contains('active')) renderResults();
  }
}

// ============ +4 SOUND BOARD ============
let soundCtx = null;
let soundIndex = 0;

function playNextSound() {
  if (!soundCtx) soundCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (soundCtx.state === 'suspended') soundCtx.resume();
  const sounds = [playSadTrombone, playAirHorn, playDramaticSting, playFuneralMarch];
  sounds[soundIndex % sounds.length]();
  soundIndex++;
  const logo = document.querySelector('.header-logo svg');
  if (logo) { logo.classList.remove('hat-pulse'); void logo.offsetWidth; logo.classList.add('hat-pulse'); }
}

function playTone(freq, type, start, dur, gainVal) {
  const osc = soundCtx.createOscillator();
  const gain = soundCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.value = gainVal || 0.3;
  osc.connect(gain); gain.connect(soundCtx.destination);
  osc.start(soundCtx.currentTime + start);
  osc.stop(soundCtx.currentTime + start + dur);
  gain.gain.setValueAtTime(gainVal || 0.3, soundCtx.currentTime + start);
  gain.gain.exponentialRampToValueAtTime(0.001, soundCtx.currentTime + start + dur);
}

function playSadTrombone() {
  [293.66, 277.18, 261.63, 246.94].forEach((f, i) => playTone(f, 'sawtooth', i * 0.3, 0.3, 0.2));
}
function playAirHorn() {
  [200, 250, 200, 250].forEach((f, i) => playTone(f, 'sawtooth', i * 0.08, 0.12, 0.25));
  playTone(220, 'sawtooth', 0.32, 0.5, 0.3);
}
function playDramaticSting() {
  [440, 554, 659, 880].forEach((f, i) => playTone(f, 'square', i * 0.08, 0.15, 0.15));
  playTone(220, 'sawtooth', 0.4, 0.6, 0.2);
}
function playFuneralMarch() {
  const notes = [[261.63,0,0.5],[261.63,0.5,0.25],[261.63,0.75,0.25],[261.63,1.0,0.75],[311.13,1.0,0.75],[293.66,1.75,0.25],[293.66,2.0,0.25],[261.63,2.25,0.25],[261.63,2.5,0.5],[246.94,2.5,0.5]];
  notes.forEach(([f, s, d]) => playTone(f, 'triangle', s, d, 0.2));
}

    const quip = i === 0 ? posQuips[0] : i === standings.length - 1 ? posQuips[4] : (posQuips[Math.min(i, 4)]);
    const fineStr = p.fines > 0 ? ` (+${p.fines} ${t('game_fines_label')})` : '';
    const corteStr = p.cortes < 0 ? ` (${p.cortes} ${t('game_cortes_label')})` : '';
    lines.push(`${i + 1}. ${p.name}: ${p.total} pts${fineStr}${corteStr} - ${quip}`);
  });
  lines.push('');
  lines.push(`Resumen: ${state.rounds.length} ${currentLang === 'es' ? 'rondas' : 'rounds'} - ${currentLang === 'es' ? 'limite' : 'limit'} ${state.maxPoints}`);

  // Meal assignments — loser pays postre o picada
  var n = standings.length;
  var loserName = standings[n - 1].name;
  var payVerb = currentLang === 'es' ? 'paga el' : 'pays for';
  var payOr = currentLang === 'es' ? 'o' : 'or';
  lines.push('');
  lines.push('🍴 ' + loserName + ' ' + payVerb + ' 🍮' + t('meals_postre') + ' ' + payOr + ' 🧀' + t('meals_picada'));

  const lastPlace = standings[standings.length - 1];
  lines.push('');
  lines.push(currentLang === 'es'
    ? `${lastPlace.name}, poema para tu derrota:`
    : `${lastPlace.name}, a poem for your defeat:`);
  lines.push(...buildLoserPoem(lastPlace.name, currentLang));
  return lines.join('\n');
}

function wrapTextLines(ctx, text, maxWidth) {
  const words = String(text || '').split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && cur) {
      lines.push(cur);
      cur = w;
    } else {
      cur = test;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

function loadFaceImage(src) {
  return new Promise(function(resolve) {
    if (!src) { resolve(null); return; }
    var im = new Image();
    im.onload = function() { resolve(im); };
    im.onerror = function() { resolve(null); };
    im.src = src;
  });
}

function drawAvatar(ctx, faceImg, playerIdx, x, y, size, slug) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();
  if (faceImg) {
    ctx.drawImage(faceImg, x, y, size, size);
  } else {
    var colors = (typeof PLAYER_COLORS !== 'undefined' && PLAYER_COLORS.length)
      ? PLAYER_COLORS
      : ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#1abc9c','#e67e22','#34495e'];
    ctx.fillStyle = colors[playerIdx % colors.length];
    ctx.fillRect(x, y, size, size);
  }
  ctx.restore();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
  ctx.stroke();

  // Season-winner star badge above the avatar
  if (slug && typeof _isSeasonWinner === 'function' && _isSeasonWinner(slug)) {
    var starFont = Math.max(10, Math.round(size * 0.28));
    var padX = Math.max(3, Math.round(size * 0.06));
    var padY = Math.max(2, Math.round(size * 0.04));
    ctx.save();
    ctx.font = 'bold ' + starFont + "px 'Inter', sans-serif";
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    var star = '\u2726';
    var starW = ctx.measureText(star).width;
    var rectW = Math.ceil(starW) + padX * 2;
    var rectH = starFont + padY * 2;
    var rectX = x + size / 2 - rectW / 2;
    var rectY = y - rectH - Math.max(2, Math.round(size * 0.04));
    ctx.fillStyle = '#0f0f1a';
    if (ctx.roundRect) {
      ctx.beginPath();
      ctx.roundRect(rectX, rectY, rectW, rectH, Math.min(6, rectH / 3));
      ctx.fill();
    } else {
      ctx.fillRect(rectX, rectY, rectW, rectH);
    }
    ctx.fillStyle = '#ffd400';
    ctx.fillText(star, rectX + padX, rectY + padY);
    ctx.restore();
  }
}

function renderShareComposite(img, faces) {
  const W = 1080;
  const photoH = Math.round(img.height * (W / img.width));
  const TOP_H = 280;
  const BOTTOM_BASE = 360;
  const POEM_LINE_H = 28;
  const PAD = 40;

  const totals = getTotals();
  const totalFinesC = getTotalFines();
  const totalCortesC = getTotalCortes();
  const players = state.players.map((p, i) => ({
    name: p.name,
    face: faces ? faces[i] : null,
    playerIdx: i,
    slug: (typeof _playerSlug === 'function') ? _playerSlug(p) : (p.name || '').toLowerCase(),
    total: totals[i],
    fines: totalFinesC[i],
    cortes: totalCortesC[i],
  })).sort((a, b) => a.total - b.total);

  const winner = players[0];
  const loser = players[players.length - 1];
  const middle = players.slice(1, players.length - 1);

  const poem = buildLoserPoem(loser.name, currentLang);

  const ts = state.gameId ? (parseInt(String(state.gameId).replace('game_', ''), 10) || Date.now()) : Date.now();
  const dateStr = formatTimestamp(ts);
  const venueStr = state.venue ? ('📍 ' + state.venue) : '';

  // Pre-wrap poem to know final canvas height
  const tmp = document.createElement('canvas').getContext('2d');
  tmp.font = 'italic 22px Inter, sans-serif';
  let totalPoemLines = 0;
  const wrappedPoem = poem.map(function(line) {
    const wrapped = wrapTextLines(tmp, line, W - PAD * 2);
    totalPoemLines += wrapped.length;
    return wrapped;
  });
  const BOTTOM_H = BOTTOM_BASE + Math.max(0, totalPoemLines - 4) * POEM_LINE_H;

  const H = TOP_H + photoH + BOTTOM_H;

  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  const COL_BG = '#181a1f';
  const COL_BG2 = '#22252c';
  const COL_TEXT = '#f5f5f7';
  const COL_MUTED = '#a0a3aa';
  const COL_BORDER = '#2d313a';
  const COL_YELLOW = '#ffde00';
  const COL_GREEN = '#2ecc71';

  // --- TOP: winner card + middle players ---
  ctx.fillStyle = COL_BG;
  ctx.fillRect(0, 0, W, TOP_H);

  const WINNER_FACE_SIZE = 120;
  const WINNER_FACE_X = PAD;
  const WINNER_FACE_Y = 50;
  const WINNER_TEXT_X = WINNER_FACE_X + WINNER_FACE_SIZE + 24;

  drawAvatar(ctx, winner.face, winner.playerIdx, WINNER_FACE_X, WINNER_FACE_Y, WINNER_FACE_SIZE, winner.slug);

  ctx.textBaseline = 'top';
  ctx.font = "bold 56px 'Fredoka One', Inter, sans-serif";
  ctx.fillStyle = COL_YELLOW;
  ctx.fillText('🏆 ' + winner.name, WINNER_TEXT_X, 52);

  ctx.font = '600 40px Inter, sans-serif';
  ctx.fillStyle = COL_TEXT;
  const winnerScore = winner.total + ' pts';
  ctx.fillText(winnerScore, WINNER_TEXT_X, 122);

  let wx = WINNER_TEXT_X + ctx.measureText(winnerScore).width + 16;
  ctx.font = '500 22px Inter, sans-serif';
  if (winner.fines > 0) {
    ctx.fillStyle = COL_YELLOW;
    const s = '(+' + winner.fines + ' ' + t('game_fines_label') + ')';
    ctx.fillText(s, wx, 134);
    wx += ctx.measureText(s).width + 10;
  }
  if (winner.cortes < 0) {
    ctx.fillStyle = COL_GREEN;
    const s = '(' + winner.cortes + ' ' + t('game_cortes_label') + ')';
    ctx.fillText(s, wx, 134);
  }

  // Middle players, right-aligned with small avatar
  const RU_FACE_SIZE = 36;
  ctx.font = '500 20px Inter, sans-serif';
  ctx.fillStyle = COL_MUTED;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  let my = 54;
  middle.forEach(function(p, i) {
    const pos = i + 2;
    let line = pos + '. ' + p.name + ' — ' + p.total + ' pts';
    if (p.fines > 0) line += ' (+' + p.fines + ' ' + t('game_fines_label') + ')';
    if (p.cortes < 0) line += ' (' + p.cortes + ' ' + t('game_cortes_label') + ')';
    const textWidth = ctx.measureText(line).width;
    const faceX = W - PAD - textWidth - RU_FACE_SIZE - 12;
    drawAvatar(ctx, p.face, p.playerIdx, faceX, my - 8, RU_FACE_SIZE, p.slug);
    ctx.fillStyle = COL_MUTED;
    ctx.fillText(line, W - PAD, my);
    my += 46;
  });
  ctx.textAlign = 'left';

  ctx.fillStyle = COL_BORDER;
  ctx.fillRect(0, TOP_H - 2, W, 2);

  // --- PHOTO ---
  ctx.drawImage(img, 0, TOP_H, W, photoH);

  // --- BOTTOM: meta + loser + poem ---
  const by0 = TOP_H + photoH;
  ctx.fillStyle = COL_BG2;
  ctx.fillRect(0, by0, W, BOTTOM_H);

  ctx.font = '500 22px Inter, sans-serif';
  ctx.fillStyle = COL_MUTED;
  const metaY = by0 + 28;
  if (venueStr) ctx.fillText(venueStr, PAD, metaY);
  const dW = ctx.measureText(dateStr).width;
  ctx.fillText(dateStr, W - PAD - dW, metaY);

  const LOSER_FACE_SIZE = 90;
  const LOSER_FACE_X = PAD;
  const LOSER_FACE_Y = by0 + 80;
  const LOSER_TEXT_X = LOSER_FACE_X + LOSER_FACE_SIZE + 20;

  drawAvatar(ctx, loser.face, loser.playerIdx, LOSER_FACE_X, LOSER_FACE_Y, LOSER_FACE_SIZE, loser.slug);

  ctx.font = '600 18px Inter, sans-serif';
  ctx.fillStyle = COL_MUTED;
  ctx.fillText(t('share_loser_label').toUpperCase(), LOSER_TEXT_X, by0 + 80);

  ctx.font = "bold 36px 'Fredoka One', Inter, sans-serif";
  ctx.fillStyle = COL_GREEN;
  ctx.fillText('💀 ' + loser.name + ' — ' + loser.total + ' pts', LOSER_TEXT_X, by0 + 106);

  let ly = by0 + 152;
  let lx = LOSER_TEXT_X;
  ctx.font = '500 20px Inter, sans-serif';
  if (loser.fines > 0) {
    ctx.fillStyle = COL_YELLOW;
    const s = '(+' + loser.fines + ' ' + t('game_fines_label') + ')';
    ctx.fillText(s, lx, ly);
    lx += ctx.measureText(s).width + 10;
  }
  if (loser.cortes < 0) {
    ctx.fillStyle = COL_GREEN;
    const s = '(' + loser.cortes + ' ' + t('game_cortes_label') + ')';
    ctx.fillText(s, lx, ly);
  }

  // Meal line: loser pays postre o picada
  ctx.font = "600 22px Inter, sans-serif";
  ctx.fillStyle = COL_TEXT;
  const payVerbPic = currentLang === 'es' ? 'paga el' : 'pays for';
  const payOrPic = currentLang === 'es' ? 'o' : 'or';
  const mealText = '🍴 ' + loser.name + ' ' + payVerbPic + ' 🍮' + t('meals_postre') + ' ' + payOrPic + ' 🧀' + t('meals_picada');
  ctx.fillText(mealText, PAD, by0 + 200);

  ctx.font = 'italic 22px Inter, sans-serif';
  ctx.fillStyle = COL_TEXT;
  let py = by0 + 250;
  wrappedPoem.forEach(function(group) {
    group.forEach(function(ln) {
      ctx.fillText(ln, PAD, py);
      py += POEM_LINE_H;
    });
  });

  return canvas;
}

// ============ GAME PERSISTENCE ============
function loadGames() {
  try {
    var data = localStorage.getItem('lunesdeuno_games');
    return data ? JSON.parse(data) : [];
  } catch (e) { return []; }
}

function saveGames(games) {
  localStorage.setItem('lunesdeuno_games', JSON.stringify(games));
}

function saveCurrentGame() {
  if (!state.gameId) return;
  var games = loadGames();
  var existing = games.find(function(g) { return g.id === state.gameId; });

  var winnerSlot = null;
  var winnerPlayerId = null;
  if (state.gameOver && state.players && state.players.length) {
    var finalTotals = getFinalTotals();
    winnerSlot = 0;
    for (var i = 1; i < finalTotals.length; i++) {
      if (finalTotals[i] < finalTotals[winnerSlot]) winnerSlot = i;
    }
    var winnerParticipant = (state.participants || [])[winnerSlot];
    winnerPlayerId = winnerParticipant ? winnerParticipant.playerId : null;
  }

  var priorFinishedAt = existing ? existing.finishedAt : null;
  var finishedAt = state.gameOver ? (priorFinishedAt || Date.now()) : null;

  var entry = {
    id: state.gameId,
    timestamp: parseInt(state.gameId.replace('game_', ''), 10) || Date.now(),
    finishedAt: finishedAt,
    winnerSlot: winnerSlot,
    winnerPlayerId: winnerPlayerId,
    seasonId: existing ? (existing.seasonId || null) : null,
    state: {
      playerCount: state.playerCount,
      maxPoints: state.maxPoints,
      players: state.players,
      rounds: state.rounds,
      currentRound: state.currentRound,
      gameOver: state.gameOver,
      gameId: state.gameId,
      fines: state.fines || [],
      cortes: state.cortes || [],
      participants: state.participants || [],
      absentees: state.absentees || [],
      hostId: state.hostId || null,
      venue: state.venue || ''
    },
    finished: !!state.gameOver
  };
  var idx = games.findIndex(function(g) { return g.id === state.gameId; });
  if (idx >= 0) { games[idx] = entry; } else { games.push(entry); }
  saveGames(games);

  // El save a Firestore va por la cola (con retry + indicador). Si LDU_READY
  // todavía no llegó, queda en cola y se intenta cuando dispara el evento.
  var wasFinalized = priorFinishedAt && existing && existing.finished;
  var shouldComputeSeason = state.gameOver && !wasFinalized;
  enqueueSaveGame(entry, shouldComputeSeason);
}

// ============ COLA DE SAVE (retry + indicador) ============
// Cada save a Firestore pasa por la cola: si Firestore está caído o lento,
// el entry queda persistido en localStorage y se reintenta cuando llega el
// evento `online`, cuando vuelve a foreground (`visibilitychange`), o cuando
// dispara `ldu-ready`. Idempotencia: la cola se deduplica por gameId, siempre
// nos quedamos con la última versión del partido.
var SAVE_QUEUE_KEY = 'lunesdeuno_saveQueue';
var _saveInFlight = false;
var _saveRetryTimer = null;
var _saveSeasonTriggers = {};   // gameId → bool (¿hay que llamar maybeComputeSeason al éxito?)

function _loadSaveQueue() {
  try {
    var raw = localStorage.getItem(SAVE_QUEUE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
function _persistSaveQueue(q) {
  try { localStorage.setItem(SAVE_QUEUE_KEY, JSON.stringify(q)); } catch (e) {}
}
function _setSaveIndicator(stateName, count) {
  var el = document.getElementById('saveIndicator');
  var txt = document.getElementById('saveIndicatorText');
  if (!el || !txt) return;
  el.classList.remove('visible', 'saving', 'saved', 'pending');
  if (stateName === 'hidden') return;
  el.classList.add('visible', stateName);
  if (stateName === 'saving') txt.textContent = t('save_saving');
  else if (stateName === 'saved') txt.textContent = t('save_saved');
  else if (stateName === 'pending') {
    var key = (count === 1) ? 'save_pending_one' : 'save_pending_many';
    txt.textContent = t(key).replace('{n}', String(count || 0));
  }
}

function enqueueSaveGame(entry, shouldComputeSeason) {
  if (!entry || !entry.id) return;
  var q = _loadSaveQueue();
  // Deduplicar por id: la última versión del mismo partido pisa a la previa.
  q = q.filter(function(e) { return e.id !== entry.id; });
  q.push(entry);
  _persistSaveQueue(q);
  if (shouldComputeSeason) _saveSeasonTriggers[entry.id] = true;
  _setSaveIndicator('pending', q.length);
  flushSaveQueue();
}

function flushSaveQueue() {
  if (_saveInFlight) return;
  if (!window.LDU_READY || !window.LDU || !window.LDU.saveGame) return;
  var q = _loadSaveQueue();
  if (!q.length) { _setSaveIndicator('hidden'); return; }
  _saveInFlight = true;
  _setSaveIndicator('saving');
  var head = q[0];
  window.LDU.saveGame(head)
    .then(function() {
      var fresh = _loadSaveQueue();
      var i = fresh.findIndex(function(e) { return e.id === head.id; });
      // Sólo borramos esa entrada si el timestamp coincide con la que mandamos.
      // Si entre tanto se push'eó una versión más nueva del mismo partido,
      // preservamos la nueva (queda como pendiente).
      if (i >= 0 && fresh[i].timestamp === head.timestamp) fresh.splice(i, 1);
      _persistSaveQueue(fresh);
      _saveInFlight = false;
      // Disparar maybeComputeSeason si correspondía para este gameId (sólo
      // la primera vez que el partido cierra).
      if (_saveSeasonTriggers[head.id]) {
        delete _saveSeasonTriggers[head.id];
        if (typeof maybeComputeSeason === 'function') {
          try { maybeComputeSeason(); } catch (e) { console.warn(e); }
        }
      }
      if (fresh.length === 0) {
        _setSaveIndicator('saved');
        setTimeout(function() {
          // Sólo escondemos si todavía no hay nuevos pendientes.
          if (_loadSaveQueue().length === 0) _setSaveIndicator('hidden');
        }, 1500);
      } else {
        _setSaveIndicator('pending', fresh.length);
        flushSaveQueue();
      }
    })
    .catch(function(err) {
      console.warn('[LDU] saveGame failed (kept in queue):', err);
      _saveInFlight = false;
      _setSaveIndicator('pending', _loadSaveQueue().length);
      if (_saveRetryTimer) clearTimeout(_saveRetryTimer);
      _saveRetryTimer = setTimeout(flushSaveQueue, 30000);
    });
}

window.addEventListener('online', flushSaveQueue);
window.addEventListener('ldu-ready', flushSaveQueue);
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') flushSaveQueue();
});

function formatTimestamp(ts) {
  var d = new Date(ts);
  var days = currentLang === 'es'
    ? ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']
    : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months = currentLang === 'es'
    ? ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']
    : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var hh = String(d.getHours()).padStart(2, '0');
  var mm = String(d.getMinutes()).padStart(2, '0');
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()] + ', ' + hh + ':' + mm;
}

function formatDate(ts) {
  var d = new Date(ts);
  var days = currentLang === 'es'
    ? ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']
    : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months = currentLang === 'es'
    ? ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']
    : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}

function _gameCardFace(player, idx) {
  if (!player) return '';
  var inner;
  if (player.face) {
    inner = '<img src="' + player.face + '" alt="' + (player.name || '') + '" class="player-face-sm">';
  } else {
    var color = player.color || (PLAYER_COLORS[idx % PLAYER_COLORS.length]);
    inner = '<div class="player-color" style="background:' + color + '"></div>';
  }
  return _withSeasonStar(inner, _playerSlug(player), 'sm');
}

function _gameFinalTotals(s) {
  var rounds = s.rounds || [];
  var fines = s.fines || [];
  var cortes = s.cortes || [];
  var n = (s.players || []).length;
  var totals = [];
  for (var i = 0; i < n; i++) {
    var base = rounds.reduce(function(sum, r) { return sum + ((r && r[i]) || 0); }, 0);
    var f = fines.reduce(function(sum, r) { return sum + ((r && r[i]) || 0); }, 0);
    var c = cortes.reduce(function(sum, r) { return sum + ((r && r[i]) ? -50 : 0); }, 0);
    totals.push(base + f + c);
  }
  return totals;
}

function renderGamesList() {
  var container = document.getElementById('gamesList');
  var games = loadGames();
  if (games.length === 0) { container.innerHTML = ''; return; }

  // Build game-within-season numbering using chronological order.
  var finishedChrono = games
    .filter(function(g) { return g.finished; })
    .slice()
    .sort(function(a, b) {
      return (a.finishedAt || a.timestamp || 0) - (b.finishedAt || b.timestamp || 0);
    });
  var gameMeta = {}; // id -> { seasonNumber, indexInSeason }
  finishedChrono.forEach(function(g, i) {
    var seasonNumber = Math.floor(i / 4) + 1;
    var indexInSeason = (i % 4) + 1;
    gameMeta[g.id] = { seasonNumber: seasonNumber, indexInSeason: indexInSeason };
  });

  games.sort(function(a, b) { return (b.finishedAt || b.timestamp || 0) - (a.finishedAt || a.timestamp || 0); });
  var html = '<div class="games-list"><h3>' + t('games_title') + '</h3>';
  games.forEach(function(g) {
    var s = g.state || {};
    var players = s.players || [];
    var btnLabel = g.finished ? t('games_view') : t('games_resume');
    var btnAction = 'resumeGame(\'' + g.id + '\')';
    var dateStr = formatDate(g.finishedAt || g.timestamp);
    var venueStr = s.venue ? ' · 📍 ' + s.venue : '';

    var body;
    if (g.finished && players.length) {
      var totals = _gameFinalTotals(s);
      var minIdx = 0, maxIdx = 0;
      totals.forEach(function(v, i) {
        if (v < totals[minIdx]) minIdx = i;
        if (v > totals[maxIdx]) maxIdx = i;
      });
      var meta = gameMeta[g.id];
      var header = meta
        ? (t('games_temporada') + ' ' + meta.seasonNumber + ' - ' + t('games_partido') + ' ' + meta.indexInSeason)
        : t('games_partido');
      var winner = players[minIdx];
      var loser = players[maxIdx];
      body = ''
        + '<div class="game-card-season">' + header + '</div>'
        + '<div class="game-card-row">'
          + _gameCardFace(winner, minIdx)
          + '<span><b>' + (winner && winner.name ? winner.name : '—') + '</b> ' + t('games_won') + '</span>'
        + '</div>'
        + '<div class="game-card-row game-card-loser">'
          + _gameCardFace(loser, maxIdx)
          + '<span><b>' + (loser && loser.name ? loser.name : '—') + '</b> ' + t('games_lost_with') + ' ' + totals[maxIdx] + ' ' + t('games_pts') + '</span>'
        + '</div>'
        + '<div class="game-item-meta">' + dateStr + venueStr + '</div>';
    } else {
      var names = players.map(function(p) { return p.name; });
      body = ''
        + '<div class="game-card-inprogress">📋 ' + t('games_inprogress') + '</div>'
        + '<div class="game-card-row"><span>' + names.join(', ') + '</span></div>'
        + '<div class="game-item-meta">' + dateStr + venueStr + '</div>';
    }

    html += '<div class="game-item">'
      + '<div class="game-item-info">' + body + '</div>'
      + '<div class="game-item-actions">'
        + '<button class="btn btn-secondary btn-small" onclick="' + btnAction + '">' + btnLabel + '</button>'
        + '<button class="btn btn-secondary btn-small" style="color:var(--danger);" onclick="deleteGame(\'' + g.id + '\')">' + t('games_delete') + '</button>'
      + '</div>'
    + '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function resumeGame(gameId) {
  var games = loadGames();
  var g = games.find(function(g) { return g.id === gameId; });
  if (!g) return;
  state.playerCount = g.state.playerCount;
  state.maxPoints = g.state.maxPoints;
  state.players = g.state.players;
  state.rounds = g.state.rounds;
  state.currentRound = g.state.currentRound;
  state.gameOver = g.state.gameOver;
  state.gameId = g.state.gameId;
  state.fines = g.state.fines || [];
  state.cortes = (g.state.cortes && g.state.cortes.length)
    ? g.state.cortes
    : (g.state.rounds || []).map(function(r) { return (r || []).map(function() { return false; }); });
  state.participants = g.state.participants || [];
  state.absentees = g.state.absentees || [];
  state.hostId = g.state.hostId || null;
  state.venue = g.state.venue || '';
  if (g.finished) {
    showScreen('results');
  } else {
    showScreen('game');
  }
}

function deleteGame(gameId) {
  if (!confirm(t('games_confirm_delete'))) return;
  var games = loadGames();
  games = games.filter(function(g) { return g.id !== gameId; });
  saveGames(games);
  if (window.LDU_READY && window.LDU && window.LDU.deleteGame) {
    window.LDU.deleteGame(gameId).catch(function(err) { console.warn('[LDU] deleteGame failed:', err); });
  }
  renderGamesList();
}

// Firestore wraps rows as { v: [...] }; unwrap back to a plain 2-D array.
// Pass-through for plain rows so pre-wrap docs still load.
function unwrap2d(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.map(function(row) {
    if (row && Array.isArray(row.v)) return row.v;
    if (Array.isArray(row)) return row;
    return [];
  });
}

function _remoteGameToEntry(r) {
  var rRounds = unwrap2d(r.rounds);
  var rFines = unwrap2d(r.fines);
  var rCortes = unwrap2d(r.cortes);
  return {
    id: r.gameId,
    timestamp: r.createdAt && r.createdAt.toMillis ? r.createdAt.toMillis() : Date.now(),
    finishedAt: r.finishedAt && r.finishedAt.toMillis ? r.finishedAt.toMillis() : null,
    winnerSlot: (typeof r.winnerSlot === 'number') ? r.winnerSlot : null,
    winnerPlayerId: r.winnerPlayerId || null,
    seasonId: r.seasonId || null,
    state: {
      playerCount: (r.participants || []).length,
      maxPoints: r.maxPoints || 0,
      players: (r.participants || []).map(function(p) { return { name: p.name, color: p.color, face: p.face }; }),
      rounds: rRounds,
      currentRound: rRounds.length,
      gameOver: !!r.finished,
      gameId: r.gameId,
      fines: rFines,
      cortes: rCortes,
      participants: r.participants || [],
      absentees: r.absentees || [],
      hostId: r.hostId || null,
      venue: r.venue || ''
    },
    finished: !!r.finished
  };
}

// Firestore es la fuente de verdad. Reemplaza la lista local con la colección
// `games`. Solo preservamos partidas locales en curso (finished === false)
// que todavía no se subieron, para no romper un "resume" en progreso.
// Los juegos locales finalizados que no estén en Firestore se descartan.
function syncRemoteGamesToLocal() {
  if (!window.LDU_READY || !window.LDU || !window.LDU.getAllGames) return Promise.resolve();
  return window.LDU.getAllGames().then(function(remoteGames) {
    var remoteEntries = (remoteGames || []).map(_remoteGameToEntry);
    var remoteIds = {};
    remoteEntries.forEach(function(e) { remoteIds[e.id] = true; });
    var localInProgress = loadGames().filter(function(g) {
      return !g.finished && !remoteIds[g.id];
    });
    saveGames(remoteEntries.concat(localInProgress));
    if (typeof renderGamesList === 'function') renderGamesList();
  }).catch(function(err) { console.warn('[LDU] syncRemoteGamesToLocal failed:', err); });
}

// ============ SEASONS & STATS HELPERS ============

function computeGameFinalScore(gameDoc, slot) {
  var rounds = gameDoc.rounds || [];
  var fines = gameDoc.fines || [];
  var cortes = gameDoc.cortes || [];
  var base = rounds.reduce(function(sum, r) { return sum + ((r && r[slot]) || 0); }, 0);
  var f = fines.reduce(function(sum, r) { return sum + ((r && r[slot]) || 0); }, 0);
  var c = cortes.reduce(function(sum, r) { return sum + ((r && r[slot]) ? -50 : 0); }, 0);
  return base + f + c;
}

function maybeComputeSeason() {
  if (!window.LDU_READY || !window.LDU || !window.LDU.getAllFinishedGames) return Promise.resolve();
  return window.LDU.getAllFinishedGames().then(function(games) {
    if (!games || !games.length || (games.length % 4 !== 0)) return;
    var seasonNumber = games.length / 4;
    return window.LDU.getSeason(seasonNumber).then(function(existing) {
      if (existing) return;
      // Normalize remote docs (wrapped arrays) into plain shape for scoring.
      var fourGames = games.slice(-4).map(function(g) {
        return {
          gameId: g.gameId,
          finishedAt: g.finishedAt,
          participants: g.participants || [],
          rounds: unwrap2d(g.rounds),
          fines: unwrap2d(g.fines),
          cortes: unwrap2d(g.cortes)
        };
      });

      var presence = {};
      var perPlayerScores = {};
      // Collect any absentee across the 4 games so they appear in the season
      // and receive the per-game loser-score penalty.
      var allSlugs = {};
      fourGames.forEach(function(g) {
        (g.participants || []).forEach(function(p) {
          if (p.playerId) allSlugs[p.playerId] = true;
        });
        (g.absentees || []).forEach(function(slug) { if (slug) allSlugs[slug] = true; });
      });

      fourGames.forEach(function(g) {
        // Loser-base = highest rounds-only total (the slot that crossed
        // maxPoints). Absentees get that base score as their penalty —
        // explicitly NOT the loser's fines/cortes.
        var maxBase = -Infinity;
        (g.participants || []).forEach(function(p) {
          var base = (g.rounds || []).reduce(function(sum, r) { return sum + ((r && r[p.slot]) || 0); }, 0);
          if (base > maxBase) maxBase = base;
        });
        var loserPenalty = (maxBase === -Infinity) ? 0 : maxBase;

        (g.participants || []).forEach(function(p) {
          if (!p.playerId) return;
          presence[p.playerId] = (presence[p.playerId] || 0) + 1;
          perPlayerScores[p.playerId] = (perPlayerScores[p.playerId] || 0) + computeGameFinalScore(g, p.slot);
        });
        (g.absentees || []).forEach(function(slug) {
          if (!slug) return;
          perPlayerScores[slug] = (perPlayerScores[slug] || 0) + loserPenalty;
        });
      });

      var participantIds = Object.keys(allSlugs);
      // Eligible for the season crown = played all 4 games (no absences).
      var eligible = participantIds.filter(function(id) { return presence[id] === 4; });
      var winnerPlayerId = null;
      if (eligible.length) {
        winnerPlayerId = eligible.reduce(function(best, id) {
          if (best === null) return id;
          if (perPlayerScores[id] < perPlayerScores[best]) return id;
          if (perPlayerScores[id] === perPlayerScores[best] && id < best) return id;
          return best;
        }, null);
      }
      // Season loser = highest perPlayerScores across everyone (absences count).
      var loserPlayerId = null;
      if (participantIds.length) {
        loserPlayerId = participantIds.reduce(function(worst, id) {
          if (worst === null) return id;
          if ((perPlayerScores[id] || 0) > (perPlayerScores[worst] || 0)) return id;
          return worst;
        }, null);
      }
      var losers = participantIds.filter(function(id) { return id !== winnerPlayerId; });

      var seasonDoc = {
        seasonNumber: seasonNumber,
        gameIds: fourGames.map(function(g) { return g.gameId; }),
        startedAt: fourGames[0].finishedAt || null,
        endedAt: fourGames[3].finishedAt || null,
        participantIds: participantIds,
        perPlayerScores: perPlayerScores,
        winnerPlayerId: winnerPlayerId,
        loserPlayerId: loserPlayerId,
        losers: losers
      };

      return window.LDU.writeSeason(seasonDoc).then(function() {
        var updates = fourGames.map(function(g) { return window.LDU.updateGameSeason(g.gameId, seasonNumber); });
        return Promise.all(updates);
      });
    });
  }).catch(function(err) { console.warn('[LDU] maybeComputeSeason failed:', err); });
}

// ============ STATS ============
var _statsData = { games: [], seasons: [], computed: null, computedBySeason: {}, loaded: false };
var _selectedSeasonNumber = 'ongoing';

function initStats() {
  document.getElementById('statsMeta').textContent = t('stats_meta');
  renderStatsLoadingState();
  loadStatsData().then(function() {
    _statsData.computed = computeAllStats(_statsData.games, _statsData.seasons);
    _statsData.computedBySeason = {};
    // Refresh season-winner set (also used for face badges site-wide).
    SEASON_WINNERS = new Set();
    (_statsData.seasons || []).forEach(function(s) {
      if (s && s.winnerPlayerId) SEASON_WINNERS.add(s.winnerPlayerId);
    });
    populatePlayerDropdown();
    populateLeaderboardSort();
    populateSeasonSelector();
    switchStatsTab('player');
    var presetSlugs = PRESET_NAMES.map(function(n) { return n.toLowerCase(); });
    var defaultSlug = presetSlugs.find(function(s) { return _statsData.computed.byPlayer[s] && _statsData.computed.byPlayer[s].gamesPlayed > 0; }) || presetSlugs[0];
    var sel = document.getElementById('statsPlayerSelect');
    if (sel) sel.value = defaultSlug;
    renderPlayerStats(defaultSlug);
    renderLeaderboard('gamesWon', 'annual');
    var seasonSortSel = document.getElementById('leaderboardSortSeason');
    if (seasonSortSel) seasonSortSel.value = 'totalScore';
    renderLeaderboard('totalScore', 'season');
    renderSeasonsTable();
    renderH2HMatrix();
    _updateSeasonTabLabel();
  });
}

// Current ongoing season number (1-based). Returns null until stats have loaded.
function _currentSeasonNumber() {
  if (!_statsData || !_statsData.loaded) return null;
  return (_statsData.seasons || []).length + 1;
}

function _statsTabLabel(key) {
  return t(key);
}

function _updateSeasonTabLabel() {
  document.querySelectorAll('[data-i18n="stats_tab_leaderboard_season"]').forEach(function(el) {
    if (el.classList.contains('stats-tab-btn')) {
      el.textContent = t('stats_tab_leaderboard_season');
    }
  });
}

function _ongoingSeasonGames(games, finishedSeasons) {
  var finished = (games || [])
    .filter(function(g) { return g && g.finished; })
    .slice()
    .sort(function(a, b) { return (a.finishedAt || 0) - (b.finishedAt || 0); });
  var skip = (finishedSeasons || []).length * 4;
  return finished.slice(skip);
}

function _gamesForFinishedSeason(seasonNumber) {
  var seasonDoc = (_statsData.seasons || []).find(function(s) { return s && s.seasonNumber === seasonNumber; });
  if (!seasonDoc) return [];
  var ids = seasonDoc.gameIds || [];
  var idSet = {};
  ids.forEach(function(id) { idSet[id] = true; });
  return (_statsData.games || []).filter(function(g) { return g && idSet[g.gameId]; });
}

function getSeasonComputed(sel) {
  var key = (sel === 'ongoing' || sel == null) ? 'ongoing' : String(sel);
  if (_statsData.computedBySeason[key]) return _statsData.computedBySeason[key];
  var games;
  if (key === 'ongoing') {
    games = _ongoingSeasonGames(_statsData.games, _statsData.seasons);
  } else {
    games = _gamesForFinishedSeason(Number(sel));
  }
  // Pass the full seasons list so "Temp. ganadas" reflects the running yearly
  // total of finished seasons a player has won, regardless of which season is
  // currently selected.
  var computed = computeAllStats(games, _statsData.seasons);
  _statsData.computedBySeason[key] = computed;
  return computed;
}

function populateSeasonSelector() {
  var sel = document.getElementById('leaderboardSeasonSelector');
  if (!sel) return;
  var opts = [];
  var ongoingGames = _ongoingSeasonGames(_statsData.games, _statsData.seasons);
  if (ongoingGames.length > 0) {
    var n = (_statsData.seasons || []).length + 1;
    var ongoingLabel = (currentLang === 'en')
      ? ('Season ' + n + ' (in progress)')
      : ('Temporada ' + n + ' (en curso)');
    opts.push(['ongoing', ongoingLabel]);
  }
  var finished = (_statsData.seasons || []).slice().sort(function(a, b) {
    return (b.seasonNumber || 0) - (a.seasonNumber || 0);
  });
  finished.forEach(function(s) {
    var label = (currentLang === 'en' ? 'Season ' : 'Temporada ') + (s.seasonNumber || '?');
    opts.push([String(s.seasonNumber), label]);
  });
  if (!opts.length) {
    sel.innerHTML = '';
    return;
  }
  sel.innerHTML = opts.map(function(o) {
    return '<option value="' + o[0] + '">' + o[1] + '</option>';
  }).join('');
  var hasSelected = opts.some(function(o) { return o[0] === String(_selectedSeasonNumber); });
  sel.value = hasSelected ? String(_selectedSeasonNumber) : opts[0][0];
  _selectedSeasonNumber = sel.value === 'ongoing' ? 'ongoing' : Number(sel.value);
}

function onLeaderboardSeasonChange(value) {
  _selectedSeasonNumber = (value === 'ongoing') ? 'ongoing' : Number(value);
  var sortSel = document.getElementById('leaderboardSortSeason');
  var sortKey = (sortSel && sortSel.value) || 'totalScore';
  renderLeaderboard(sortKey, 'season');
}

function renderStatsLoadingState() {
  var card = document.getElementById('statsPlayerCard');
  if (card) card.innerHTML = '<div style="color:var(--text-muted);padding:1rem;text-align:center;">…</div>';
  document.getElementById('leaderboardTable').innerHTML = '';
  var tSeason = document.getElementById('leaderboardTableSeason');
  if (tSeason) tSeason.innerHTML = '';
  document.getElementById('seasonsTable').innerHTML = '';
  document.getElementById('h2hMatrix').innerHTML = '';
}

function loadStatsData() {
  // Firestore-only: si todavía no está listo, esperamos `ldu-ready` y reintentamos.
  // Ya no se cae a localStorage — las stats tienen que reflejar solo partidas reales.
  if (!(window.LDU_READY && window.LDU && window.LDU.getAllFinishedGames)) {
    return new Promise(function(resolve) {
      var settled = false;
      var onReady = function() {
        if (settled) return;
        settled = true;
        loadStatsData().then(resolve);
      };
      document.addEventListener('ldu-ready', onReady, { once: true });
      // Si pasan 8 s y Firebase no respondió, no colgamos la pestaña Stats.
      // Resolvemos sin datos y dejamos que la UI muestre "no hay datos" más
      // el banner offline global (data-i18n="offline_banner").
      setTimeout(function() {
        if (settled) return;
        settled = true;
        document.removeEventListener('ldu-ready', onReady);
        _statsData.loaded = true;
        resolve();
      }, 8000);
    });
  }

  var gamesPromise = window.LDU.getAllFinishedGames().then(function(remoteGames) {
    return (remoteGames || []).map(function(r) {
      return {
        gameId: r.gameId,
        finishedAt: r.finishedAt && r.finishedAt.toMillis ? r.finishedAt.toMillis() : (r.finishedAt || 0),
        maxPoints: r.maxPoints || 0,
        venue: r.venue || '',
        hostId: r.hostId || null,
        participants: r.participants || [],
        absentees: r.absentees || [],
        rounds: unwrap2d(r.rounds),
        fines: unwrap2d(r.fines),
        cortes: unwrap2d(r.cortes),
        winnerSlot: (typeof r.winnerSlot === 'number') ? r.winnerSlot : null,
        winnerPlayerId: r.winnerPlayerId || null,
        seasonId: r.seasonId || null,
        finished: true
      };
    });
  });

  var seasonsPromise = (window.LDU && window.LDU.getSeasons)
    ? window.LDU.getSeasons().catch(function() { return []; })
    : Promise.resolve([]);

  return Promise.all([gamesPromise, seasonsPromise]).then(function(results) {
    _statsData.games = results[0] || [];
    _statsData.seasons = results[1] || [];
    _statsData.loaded = true;
  });
}

function _emptyPlayerStats(slug) {
  return {
    slug: slug,
    gamesPlayed: 0, gamesWon: 0, gamesLost: 0,
    roundsPlayed: 0, roundsWon: 0, roundsLost: 0,
    totalScore: 0, scoreSumRound: 0,
    highestRoundScore: 0, lowestGameScore: null, worstGameScore: 0,
    absences: 0, timesHosted: 0, wonWhileHosting: 0,
    perfectRounds: 0, totalMultas: 0, totalCortes: 0,
    seasonsWon: 0, seasonsLost: 0,
    positionDist: {}, sumPosition: 0,
    fastestWin: null, longestGame: 0,
    biggestComeback: 0, closestLoss: null,
    unfinished: 0, netVsAvg: 0,
    venueStats: {}, dayStats: {},
    gameResults: [], h2h: {}
  };
}

function computeAllStats(games, seasons) {
  var presetSlugs = PRESET_NAMES.map(function(n) { return n.toLowerCase(); });
  var byPlayer = {};
  presetSlugs.forEach(function(s) { byPlayer[s] = _emptyPlayerStats(s); });

  // Defensa en profundidad: stats y rankings sólo cuentan partidas terminadas.
  // Los callers ya suelen pasar arrays filtrados (getAllFinishedGames), pero
  // garantizamos la regla acá también.
  var finishedGames = (games || []).filter(function(g) { return g && g.finished === true; });
  var sorted = finishedGames.slice().sort(function(a, b) { return (a.finishedAt || 0) - (b.finishedAt || 0); });

  sorted.forEach(function(g) {
    var participants = g.participants || [];
    var numPlayers = participants.length;
    if (!numPlayers) return;

    var finalScores = participants.map(function(_, slot) { return computeGameFinalScore(g, slot); });
    var ordered = finalScores.map(function(v, i) { return { slot: i, score: v }; }).sort(function(a, b) { return a.score - b.score; });
    var positionBySlot = {};
    ordered.forEach(function(o, i) { positionBySlot[o.slot] = i + 1; });

    var numRounds = (g.rounds || []).length;
    var roundWinsBySlot = {};
    var roundLossesBySlot = {};
    (g.rounds || []).forEach(function(round) {
      if (!round || !round.length) return;
      var minVal = Math.min.apply(null, round);
      var maxVal = Math.max.apply(null, round);
      round.forEach(function(s, slot) {
        if (s === minVal) roundWinsBySlot[slot] = (roundWinsBySlot[slot] || 0) + 1;
        if (s === maxVal && maxVal > 0) roundLossesBySlot[slot] = (roundLossesBySlot[slot] || 0) + 1;
      });
    });

    var runningTotals = participants.map(function() { return 0; });
    var comebackBestBySlot = participants.map(function() { return 0; });
    (g.rounds || []).forEach(function(round) {
      round.forEach(function(s, slot) { runningTotals[slot] += (s || 0); });
      participants.forEach(function(_, slot) {
        var oppMin = Infinity;
        participants.forEach(function(_, other) {
          if (other !== slot && runningTotals[other] < oppMin) oppMin = runningTotals[other];
        });
        if (oppMin === Infinity) return;
        var deficit = runningTotals[slot] - oppMin;
        if (deficit > comebackBestBySlot[slot]) comebackBestBySlot[slot] = deficit;
      });
    });

    var finishedAt = g.finishedAt || 0;
    var dayOfWeek = finishedAt ? new Date(finishedAt).getDay() : -1;

    participants.forEach(function(p, slot) {
      if (!p.playerId || !byPlayer[p.playerId]) return;
      var ps = byPlayer[p.playerId];
      ps.gamesPlayed++;
      ps.roundsPlayed += numRounds;
      ps.totalScore += finalScores[slot];
      ps.roundsWon += roundWinsBySlot[slot] || 0;
      ps.roundsLost += roundLossesBySlot[slot] || 0;

      (g.rounds || []).forEach(function(round) {
        var s = (round && round[slot]) || 0;
        ps.scoreSumRound += s;
        if (s > ps.highestRoundScore) ps.highestRoundScore = s;
        if (s === 0) ps.perfectRounds++;
      });
      (g.fines || []).forEach(function(round) { ps.totalMultas += (round && round[slot]) || 0; });
      (g.cortes || []).forEach(function(round) { if (round && round[slot]) ps.totalCortes++; });

      if (ps.lowestGameScore === null || finalScores[slot] < ps.lowestGameScore) ps.lowestGameScore = finalScores[slot];
      if (finalScores[slot] > ps.worstGameScore) ps.worstGameScore = finalScores[slot];
      if (numRounds > ps.longestGame) ps.longestGame = numRounds;

      var pos = positionBySlot[slot];
      ps.sumPosition += pos;
      var posKey = (pos === numPlayers) ? 'last' : String(pos);
      ps.positionDist[posKey] = (ps.positionDist[posKey] || 0) + 1;

      var isWin = (g.winnerPlayerId === p.playerId);
      if (isWin) {
        ps.gamesWon++;
        if (ps.fastestWin === null || numRounds < ps.fastestWin) ps.fastestWin = numRounds;
        if (comebackBestBySlot[slot] > ps.biggestComeback) ps.biggestComeback = comebackBestBySlot[slot];
      } else {
        ps.gamesLost++;
        if (pos === 2) {
          var winnerScore = ordered[0].score;
          var diff = finalScores[slot] - winnerScore;
          if (ps.closestLoss === null || diff < ps.closestLoss) ps.closestLoss = diff;
        }
      }
      ps.gameResults.push({ won: isWin, finishedAt: finishedAt, gameId: g.gameId });

      var othersTotal = 0, othersCount = 0;
      finalScores.forEach(function(fs, i) { if (i !== slot) { othersTotal += fs; othersCount++; } });
      var othersAvg = othersCount ? (othersTotal / othersCount) : 0;
      ps.netVsAvg += (finalScores[slot] - othersAvg);

      if (g.venue) {
        var v = g.venue;
        if (!ps.venueStats[v]) ps.venueStats[v] = { games: 0, wins: 0 };
        ps.venueStats[v].games++;
        if (isWin) ps.venueStats[v].wins++;
      }

      if (dayOfWeek >= 0) {
        if (!ps.dayStats[dayOfWeek]) ps.dayStats[dayOfWeek] = { games: 0, wins: 0 };
        ps.dayStats[dayOfWeek].games++;
        if (isWin) ps.dayStats[dayOfWeek].wins++;
      }

      if (g.hostId === p.playerId) {
        ps.timesHosted++;
        if (isWin) ps.wonWhileHosting++;
      }

      participants.forEach(function(other, otherSlot) {
        if (otherSlot === slot) return;
        if (!other.playerId) return;
        if (!ps.h2h[other.playerId]) ps.h2h[other.playerId] = { wins: 0, losses: 0, together: 0 };
        ps.h2h[other.playerId].together++;
        if (positionBySlot[slot] < positionBySlot[otherSlot]) ps.h2h[other.playerId].wins++;
        else if (positionBySlot[slot] > positionBySlot[otherSlot]) ps.h2h[other.playerId].losses++;
      });
    });

    // Absentees are penalized with the loser's BASE game score only (rounds
    // only, no fines, no cortes). The loser is whoever crossed maxPoints,
    // i.e. the slot with the highest base-score total.
    var baseScores = participants.map(function(_, slot) {
      return (g.rounds || []).reduce(function(sum, r) { return sum + ((r && r[slot]) || 0); }, 0);
    });
    var loserSlot = -1;
    var loserBase = 0;
    baseScores.forEach(function(v, i) {
      if (loserSlot < 0 || v > loserBase) { loserSlot = i; loserBase = v; }
    });
    (g.absentees || []).forEach(function(absSlug) {
      if (byPlayer[absSlug]) {
        byPlayer[absSlug].absences++;
        byPlayer[absSlug].totalScore += loserBase;
      }
    });
  });

  (seasons || []).forEach(function(s) {
    if (s.winnerPlayerId && byPlayer[s.winnerPlayerId]) byPlayer[s.winnerPlayerId].seasonsWon++;
    (s.losers || []).forEach(function(loserSlug) {
      if (byPlayer[loserSlug]) byPlayer[loserSlug].seasonsLost++;
    });
  });

  presetSlugs.forEach(function(slug) {
    var ps = byPlayer[slug];
    ps.avgScorePerGame = ps.gamesPlayed ? ps.totalScore / ps.gamesPlayed : 0;
    ps.avgScorePerRound = ps.roundsPlayed ? ps.scoreSumRound / ps.roundsPlayed : 0;
    ps.avgPosition = ps.gamesPlayed ? ps.sumPosition / ps.gamesPlayed : 0;
    ps.winRate = ps.gamesPlayed ? ps.gamesWon / ps.gamesPlayed : 0;
    ps.homeWinRate = ps.timesHosted ? ps.wonWhileHosting / ps.timesHosted : 0;

    var gr = ps.gameResults;
    ps.longestWinStreak = 0; ps.longestLossStreak = 0;
    var cw = 0, cl = 0;
    gr.forEach(function(r) {
      if (r.won) { cw++; cl = 0; if (cw > ps.longestWinStreak) ps.longestWinStreak = cw; }
      else       { cl++; cw = 0; if (cl > ps.longestLossStreak) ps.longestLossStreak = cl; }
    });
    ps.currentWinStreak = 0; ps.currentLossStreak = 0;
    for (var i = gr.length - 1; i >= 0; i--) {
      if (gr[i].won) { if (ps.currentLossStreak > 0) break; ps.currentWinStreak++; }
      else           { if (ps.currentWinStreak > 0) break; ps.currentLossStreak++; }
    }
    ps.gamesSinceLastWin = null;
    for (var j = gr.length - 1, since = 0; j >= 0; j--) {
      if (gr[j].won) { ps.gamesSinceLastWin = since; break; }
      since++;
    }

    ps.nemesis = null; ps.victim = null;
    var maxLosses = 0, maxWins = 0;
    Object.keys(ps.h2h).forEach(function(other) {
      var rec = ps.h2h[other];
      if (rec.losses > maxLosses) { maxLosses = rec.losses; ps.nemesis = other; }
      if (rec.wins > maxWins) { maxWins = rec.wins; ps.victim = other; }
    });

    ps.bestDay = null;
    var bestRate = -1;
    Object.keys(ps.dayStats).forEach(function(d) {
      var ds = ps.dayStats[d];
      if (ds.games >= 2) {
        var r = ds.wins / ds.games;
        if (r > bestRate) { bestRate = r; ps.bestDay = parseInt(d, 10); }
      }
    });
  });

  var seasonsChrono = (seasons || []).slice().sort(function(a, b) { return (a.seasonNumber || 0) - (b.seasonNumber || 0); });
  presetSlugs.forEach(function(slug) {
    var ps = byPlayer[slug];
    ps.longestSeasonWinStreak = 0;
    ps.currentSeasonWinStreak = 0;
    var streak = 0;
    seasonsChrono.forEach(function(s) {
      var played = (s.participantIds || []).indexOf(slug) >= 0;
      if (!played) { streak = 0; return; }
      if (s.winnerPlayerId === slug) { streak++; if (streak > ps.longestSeasonWinStreak) ps.longestSeasonWinStreak = streak; }
      else { streak = 0; }
    });
    ps.currentSeasonWinStreak = streak;
  });

  return { byPlayer: byPlayer, seasons: seasonsChrono };
}

function _dayLabel(d) {
  if (d === null || typeof d !== 'number' || d < 0) return t('stat_never');
  var days = currentLang === 'es'
    ? ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb']
    : ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  return days[d];
}

function _tile(label, value, sub) {
  var subHtml = sub ? '<div class="stat-sub">' + sub + '</div>' : '';
  return '<div class="stat-tile"><div class="stat-label">' + label + '</div>'
       + '<div class="stat-value">' + value + '</div>' + subHtml + '</div>';
}

  html += _tile(t('stat_rounds_won'), ps.roundsWon);
  html += _tile(t('stat_rounds_lost'), ps.roundsLost);
  html += _tile(t('stat_seasons_won'), ps.seasonsWon);
  html += _tile(t('stat_seasons_lost'), ps.seasonsLost);
  html += _tile(t('stat_absences'), ps.absences);
  html += _tile(t('stat_times_hosted'), ps.timesHosted);

  html += '<div class="stat-section-label">Streaks & averages</div>';
  html += '<div class="stats-grid">';
  html += _tile(t('stat_current_win_streak'), ps.currentWinStreak);
  html += _tile(t('stat_longest_win_streak'), ps.longestWinStreak);
  html += _tile(t('stat_current_loss_streak'), ps.currentLossStreak);
  html += _tile(t('stat_longest_loss_streak'), ps.longestLossStreak);
  html += _tile(t('stat_season_win_streak'), ps.currentSeasonWinStreak);
  html += _tile(t('stat_longest_season_streak'), ps.longestSeasonWinStreak);
  html += _tile(t('stat_avg_round'), ps.avgScorePerRound.toFixed(1));
  html += _tile(t('stat_avg_game'), ps.avgScorePerGame.toFixed(1));
  html += _tile(t('stat_avg_position'), ps.avgPosition.toFixed(2));
  html += _tile(t('stat_games_since_win'), ps.gamesSinceLastWin === null ? t('stat_never') : ps.gamesSinceLastWin);
  html += _tile(t('stat_net_points'), (ps.netVsAvg >= 0 ? '+' : '') + ps.netVsAvg.toFixed(0));
  html += _tile(t('stat_rounds_played'), ps.roundsPlayed);
  html += '</div>';

  html += '<div class="stat-section-label">Penalties & perks</div>';
  html += '<div class="stats-grid">';
  html += _tile(t('stat_total_multas'), ps.totalMultas);
  html += _tile(t('stat_total_cortes'), ps.totalCortes);
  html += _tile(t('stat_perfect_rounds'), ps.perfectRounds);
  html += _tile(t('stat_home_field'), ps.timesHosted ? (ps.homeWinRate * 100).toFixed(0) + '%' : '—', ps.timesHosted ? (ps.wonWhileHosting + '/' + ps.timesHosted) : '');
  html += '</div>';

  html += '<div class="stat-section-label">Extremes</div>';
  html += '<div class="stats-grid">';
  html += _tile(t('stat_fastest_win'), ps.fastestWin === null ? '—' : ps.fastestWin, ps.fastestWin === null ? '' : t('stat_rounds'));
  html += _tile(t('stat_longest_game'), ps.longestGame || '—', t('stat_rounds'));
  html += _tile(t('stat_biggest_comeback'), ps.biggestComeback || '—', ps.biggestComeback ? t('stat_pts') : '');
  html += _tile(t('stat_closest_loss'), ps.closestLoss === null ? '—' : ps.closestLoss, ps.closestLoss === null ? '' : t('stat_pts'));
  html += _tile(t('stat_worst_game'), ps.worstGameScore || '—', ps.worstGameScore ? t('stat_pts') : '');
  html += _tile(t('stat_nemesis'), ps.nemesis ? _presetName(ps.nemesis) : t('stat_none'), ps.nemesis ? (ps.h2h[ps.nemesis].losses + '-' + ps.h2h[ps.nemesis].wins) : '');
  html += _tile(t('stat_victim'), ps.victim ? _presetName(ps.victim) : t('stat_none'), ps.victim ? (ps.h2h[ps.victim].wins + '-' + ps.h2h[ps.victim].losses) : '');
  html += _tile(t('stat_day_perf'), ps.bestDay === null ? '—' : _dayLabel(ps.bestDay));
  html += '</div>';

  html += '<div class="stat-section-label">' + t('stat_pos_dist') + '</div>';
  html += '<div class="stats-grid">';
  Object.keys(ps.positionDist).sort().forEach(function(k) {
    var label = (k === 'last') ? '🪦 ' + t('stat_pos_dist') : '#' + k;
    html += _tile(label, ps.positionDist[k]);
  });
  html += '</div>';

  container.innerHTML = html;
}

function renderLeaderboard(sortKey, scope) {
  sortKey = sortKey || 'gamesWon';
  scope = scope || 'annual';
  var isSeason = scope === 'season';
  var tableId = isSeason ? 'leaderboardTableSeason' : 'leaderboardTable';
  var table = document.getElementById(tableId);
  if (!table) return;
  var computed = isSeason ? getSeasonComputed(_selectedSeasonNumber) : _statsData.computed;
  if (!computed) return;

  var rows = Object.values(computed.byPlayer)
    .filter(function(p) { return p.gamesPlayed > 0 || (isSeason && p.absences > 0); })
    .sort(function(a, b) {
      // "lower is better" for these keys.
      if (sortKey === 'avgPosition' || sortKey === 'totalScore' || sortKey === 'lowestGameScore') {
        var av = (a[sortKey] == null) ? Infinity : a[sortKey];
        var bv = (b[sortKey] == null) ? Infinity : b[sortKey];
        return av - bv;
      }
      return (b[sortKey] || 0) - (a[sortKey] || 0);
    });

  if (!rows.length) {
    var msg = isSeason ? t('leaderboard_no_season') : t('stats_no_data');
    table.innerHTML = '<tbody><tr><td style="color:var(--text-muted);text-align:center;padding:1rem;">' + msg + '</td></tr></tbody>';
    return;
  }

  var html = '<thead><tr>'
    + '<th>#</th>'
    + '<th>' + t('leaderboard_player') + '</th>'
    + '<th>' + t('leaderboard_games') + '</th>'
    + '<th>' + t('leaderboard_wins') + '</th>'
    + '<th>' + t('leaderboard_losses') + '</th>'
    + '<th>' + t('leaderboard_winrate') + '</th>'
    + '<th>' + t('leaderboard_seasons') + '</th>'
    + '<th>' + t('leaderboard_avg_pos') + '</th>'
    + '<th>' + t('leaderboard_hosted') + '</th>'
    + '<th>' + t('leaderboard_absences') + '</th>'
    + '<th>' + t('leaderboard_best_game') + '</th>'
    + '<th>' + t('leaderboard_worst_game') + '</th>'
    + '<th>' + t('leaderboard_score') + '</th>'
    + '</tr></thead><tbody>';
  rows.forEach(function(p, i) {
    var face = PRESET_FACES[p.slug];
    var faceInner = face
      ? '<img src="' + face + '" class="player-face-sm" style="vertical-align:middle;margin-right:.35rem;">'
      : '';
    var faceImg = _withSeasonStar(faceInner, p.slug, 'sm');
    html += '<tr>'
      + '<td>' + (i + 1) + '</td>'
      + '<td>' + faceImg + _presetName(p.slug) + '</td>'
      + '<td>' + p.gamesPlayed + '</td>'
      + '<td>' + p.gamesWon + '</td>'
      + '<td>' + p.gamesLost + '</td>'
      + '<td>' + (p.gamesPlayed ? (p.winRate * 100).toFixed(0) + '%' : '—') + '</td>'
      + '<td>' + (p.seasonsWon > 0 ? '<span style="color:#ffd400;letter-spacing:2px;">' + '\u2726'.repeat(p.seasonsWon) + '</span>' : '—') + '</td>'
      + '<td>' + (p.avgPosition ? p.avgPosition.toFixed(2) : '—') + '</td>'
      + '<td>' + p.timesHosted + '</td>'
      + '<td>' + p.absences + '</td>'
      + '<td>' + (p.lowestGameScore == null ? '—' : p.lowestGameScore) + '</td>'
      + '<td>' + (p.worstGameScore || '—') + '</td>'
      + '<td>' + p.totalScore + '</td>'
      + '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function _computeOngoingSeason(games, finishedSeasons) {
  // Returns a synthetic season-like object for the games that belong to a
  // season still in progress (< 4 finished games since the last full season),
  // or null when the tail aligns with a full season.
  var finished = (games || [])
    .filter(function(g) { return g && g.finished; })
    .slice()
    .sort(function(a, b) { return (a.finishedAt || 0) - (b.finishedAt || 0); });
  if (!finished.length) return null;
  var completedCount = (finishedSeasons || []).length * 4;
  var tail = finished.slice(completedCount);
  if (!tail.length) return null;

  var seasonNumber = (finishedSeasons || []).length + 1;
  var presence = {};
  var perPlayerScores = {};
  var allSlugs = {};

  tail.forEach(function(g) {
    // Absentee penalty = loser's BASE score (rounds only, no fines/cortes).
    var maxBase = -Infinity;
    (g.participants || []).forEach(function(p) {
      var base = (g.rounds || []).reduce(function(sum, r) { return sum + ((r && r[p.slot]) || 0); }, 0);
      if (base > maxBase) maxBase = base;
    });
    var loserPenalty = (maxBase === -Infinity) ? 0 : maxBase;
    (g.participants || []).forEach(function(p) {
      if (!p.playerId) return;
      presence[p.playerId] = (presence[p.playerId] || 0) + 1;
      perPlayerScores[p.playerId] = (perPlayerScores[p.playerId] || 0) + computeGameFinalScore(g, p.slot);
      allSlugs[p.playerId] = true;
    });
    (g.absentees || []).forEach(function(slug) {
      if (!slug) return;
      perPlayerScores[slug] = (perPlayerScores[slug] || 0) + loserPenalty;
      allSlugs[slug] = true;
    });
  });

  var participantIds = Object.keys(allSlugs);
  var eligible = participantIds.filter(function(id) { return presence[id] === tail.length; });
  var leaderPlayerId = null;
  if (eligible.length) {
    leaderPlayerId = eligible.reduce(function(best, id) {
      if (best === null) return id;
      if (perPlayerScores[id] < perPlayerScores[best]) return id;
      if (perPlayerScores[id] === perPlayerScores[best] && id < best) return id;
      return best;
    }, null);
  }
  var loserPlayerId = null;
  if (participantIds.length) {
    loserPlayerId = participantIds.reduce(function(worst, id) {
      if (worst === null) return id;
      if ((perPlayerScores[id] || 0) > (perPlayerScores[worst] || 0)) return id;
      return worst;
    }, null);
  }

  return {
    seasonNumber: seasonNumber,
    gameIds: tail.map(function(g) { return g.gameId; }),
    startedAt: tail[0].finishedAt || null,
    endedAt: tail[tail.length - 1].finishedAt || null,
    participantIds: participantIds,
    perPlayerScores: perPlayerScores,
    winnerPlayerId: leaderPlayerId,
    loserPlayerId: loserPlayerId,
    inProgress: true
  };
}

function renderSeasonsTable() {
  var table = document.getElementById('seasonsTable');
  if (!table || !_statsData.computed) return;
  var finishedSeasons = _statsData.computed.seasons.slice();
  var ongoing = _computeOngoingSeason(_statsData.games, finishedSeasons);
  var seasons = finishedSeasons.slice().reverse();
  if (ongoing) seasons.unshift(ongoing);
  if (!seasons.length) { table.innerHTML = '<tbody><tr><td style="color:var(--text-muted);text-align:center;padding:1rem;">' + t('stats_no_data') + '</td></tr></tbody>'; return; }
  var html = '<thead><tr>'
    + '<th>' + t('seasons_col_num') + '</th>'
    + '<th>' + t('seasons_col_winner') + '</th>'
    + '<th>' + t('seasons_col_score') + '</th>'
    + '<th>' + t('seasons_col_loser') + '</th>'
    + '<th>' + t('seasons_col_loser_score') + '</th>'
    + '<th>' + t('seasons_col_dates') + '</th>'
    + '<th>' + t('seasons_col_games') + '</th>'
    + '</tr></thead><tbody>';
  seasons.forEach(function(s) {
    var scores = s.perPlayerScores || {};
    var winner = s.winnerPlayerId ? _presetName(s.winnerPlayerId) : '—';
    var winnerScore = s.winnerPlayerId && scores[s.winnerPlayerId] != null ? scores[s.winnerPlayerId] : '—';
    var loser = s.loserPlayerId ? _presetName(s.loserPlayerId) : '—';
    var loserScore = s.loserPlayerId && scores[s.loserPlayerId] != null ? scores[s.loserPlayerId] : '—';
    var startedAt = s.startedAt && s.startedAt.toMillis ? s.startedAt.toMillis() : s.startedAt;
    var endedAt = s.endedAt && s.endedAt.toMillis ? s.endedAt.toMillis() : s.endedAt;
    var dates = (startedAt && endedAt) ? (formatTimestamp(startedAt) + ' → ' + formatTimestamp(endedAt)) : '—';
    var numLabel = '#' + s.seasonNumber + (s.inProgress ? ' ⏳' : '');
    var winnerFaceInner = s.winnerPlayerId && PRESET_FACES[s.winnerPlayerId]
      ? '<img src="' + PRESET_FACES[s.winnerPlayerId] + '" class="player-face-sm" style="vertical-align:middle;margin-right:.25rem;">'
      : '';
    var winnerFace = _withSeasonStar(winnerFaceInner, s.winnerPlayerId, 'sm');
    var loserFaceInner = s.loserPlayerId && PRESET_FACES[s.loserPlayerId]
      ? '<img src="' + PRESET_FACES[s.loserPlayerId] + '" class="player-face-sm" style="vertical-align:middle;margin-right:.25rem;">'
      : '';
    var loserFace = _withSeasonStar(loserFaceInner, s.loserPlayerId, 'sm');
    var winnerLabel = (s.inProgress ? '⭐ ' : '🏆 ') + winnerFace + winner;
    var loserLabel = '💀 ' + loserFace + loser;
    var gamesCount = (s.gameIds || []).length + (s.inProgress ? '/4' : '');
    html += '<tr>'
      + '<td>' + numLabel + '</td>'
      + '<td>' + winnerLabel + '</td>'
      + '<td>' + winnerScore + '</td>'
      + '<td>' + loserLabel + '</td>'
      + '<td>' + loserScore + '</td>'
      + '<td style="font-size:.8rem;color:var(--text-muted);">' + dates + '</td>'
      + '<td>' + gamesCount + '</td>'
      + '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function renderH2HMatrix() {
  var table = document.getElementById('h2hMatrix');
  if (!table || !_statsData.computed) return;
  var slugs = PRESET_NAMES.map(function(n) { return n.toLowerCase(); });
  var byPlayer = _statsData.computed.byPlayer;
  var html = '<thead><tr><th></th>';
  slugs.forEach(function(s) { html += '<th title="' + _presetName(s) + '">' + _presetName(s).slice(0, 3) + '</th>'; });
  html += '</tr></thead><tbody>';
  slugs.forEach(function(rowSlug) {
    html += '<tr><th>' + _presetName(rowSlug) + '</th>';
    slugs.forEach(function(colSlug) {
      if (rowSlug === colSlug) { html += '<td class="h2h-diag">—</td>'; return; }
      var rec = byPlayer[rowSlug].h2h[colSlug];
      if (!rec || !rec.together) { html += '<td style="color:var(--text-muted);">·</td>'; return; }
      var rate = rec.wins / rec.together;
      var cls = rate > 0.5 ? 'h2h-good' : (rate < 0.5 ? 'h2h-bad' : '');
      html += '<td class="' + cls + '" title="' + rec.wins + '-' + rec.losses + ' (' + rec.together + ')">' + rec.wins + '/' + rec.together + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

// ============ SHARE STATS TABLE AS IMAGE ============
function _showStatsToast(msg) {
  var toast = document.getElementById('copyToast');
  if (!toast) return;
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2200);
}

async function shareStatsTableImage(tableId, titleKey, btn) {
  var table = document.getElementById(tableId);
  if (!table || !table.querySelector('tbody')) return;
  if (typeof html2canvas === 'undefined') {
    _showStatsToast(t('stats_share_error'));
    return;
  }

  if (btn) { btn.disabled = true; btn.dataset._label = btn.textContent; btn.textContent = t('stats_share_preparing'); }

  // Off-screen styled wrapper so the whole (non-scrolling) table renders at natural width.
  var wrap = document.createElement('div');
  wrap.style.cssText = [
    'position:fixed',
    'top:-100000px',
    'left:0',
    'background:#0f0f1a',
    'color:#f0f0f5',
    'padding:48px',
    "font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif",
    'z-index:-1'
  ].join(';');

  var header = document.createElement('div');
  header.style.cssText = 'display:flex;align-items:center;gap:16px;margin-bottom:28px;';
  header.innerHTML =
    '<div style="width:56px;height:56px;border-radius:12px;background:#0f0f1a;border:1px solid #3a3a5c;display:flex;align-items:center;justify-content:center;font-size:32px;">🎩</div>'
    + '<div>'
    +   '<div style="font-family:\'Fredoka One\',cursive;font-size:42px;color:#FFDE00;line-height:1;">Lunes de UNO</div>'
    +   '<div style="color:#8888a8;font-size:20px;margin-top:6px;">' + _statsTabLabel(titleKey) + '</div>'
    + '</div>';
  wrap.appendChild(header);

  var clone = table.cloneNode(true);
  clone.style.borderCollapse = 'collapse';
  clone.style.fontSize = '20px';
  clone.style.background = '#1a1a2e';
  clone.style.width = 'auto';
  clone.style.borderRadius = '12px';
  clone.style.overflow = 'hidden';
  clone.querySelectorAll('th').forEach(function(th) {
    th.style.padding = '14px 18px';
    th.style.background = '#242442';
    th.style.color = '#8888a8';
    th.style.fontSize = '16px';
    th.style.fontWeight = '700';
    th.style.textAlign = 'left';
    th.style.borderBottom = '1px solid #3a3a5c';
    th.style.textTransform = 'uppercase';
    th.style.letterSpacing = '.05em';
    th.style.whiteSpace = 'nowrap';
  });
  clone.querySelectorAll('td').forEach(function(td) {
    td.style.padding = '14px 18px';
    td.style.borderBottom = '1px solid #3a3a5c';
    td.style.whiteSpace = 'nowrap';
    td.style.color = '#f0f0f5';
  });
  clone.querySelectorAll('img').forEach(function(img) {
    img.style.width = '28px';
    img.style.height = '28px';
    img.style.verticalAlign = 'middle';
    img.style.borderRadius = '50%';
    img.style.marginRight = '8px';
    img.crossOrigin = 'anonymous';
  });
  wrap.appendChild(clone);

  var footer = document.createElement('div');
  footer.style.cssText = 'margin-top:24px;color:#8888a8;font-size:16px;';
  footer.textContent = 'lunesdeuno • ' + formatTimestamp(Date.now());
  wrap.appendChild(footer);

  document.body.appendChild(wrap);

  try {
    if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch (e) {} }

    var canvas = await html2canvas(wrap, {
      backgroundColor: '#0f0f1a',
      scale: 2,
      useCORS: true,
      logging: false
    });

    var blob = await new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
    if (!blob) throw new Error('blob-null');

    var filename = 'lunesdeuno-' + tableId + '.png';
    var file = new File([blob], filename, { type: 'image/png' });
    var shareData = { files: [file], title: 'Lunes de UNO', text: _statsTabLabel(titleKey) };

    if (navigator.canShare && navigator.canShare(shareData)) {
      try {
        await navigator.share(shareData);
      } catch (e) {
        if (e && e.name === 'AbortError') { /* user cancelled */ }
        else throw e;
      }
    } else {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(a.href); }, 5000);
      _showStatsToast(t('stats_share_downloaded'));
      window.open('https://wa.me/', '_blank');
    }
  } catch (err) {
    console.warn('[shareStatsTableImage]', err);
    _showStatsToast(t('stats_share_error'));
  } finally {
    document.body.removeChild(wrap);
    if (btn) { btn.disabled = false; btn.textContent = btn.dataset._label || t('stats_share_wa'); }
  }
}

// ============ INIT ============
asadoMode = localStorage.getItem('lunesdeuno_asado') === 'on';
document.getElementById('asadoToggle').checked = asadoMode;
if (asadoMode) applyAsadoMode();

setLang(currentLang);
initSetup();
renderGamesList();

// Kick off passive fingerprint warmup during idle so the first edit event
// doesn't wait on canvas/WebRTC/ipapi. Fire-and-forget; wrapped in try/catch.
try {
  var _warmup = function() { try { warmupFingerprint(); } catch (e) {} };
  if (typeof window.requestIdleCallback === 'function') {
    window.requestIdleCallback(_warmup, { timeout: 3000 });
  } else {
    setTimeout(_warmup, 0);
  }
} catch (e) {}

function lduBootstrap() {
  if (!window.LDU_READY || !window.LDU) return;
  var presets = PRESET_NAMES.map(function(name, i) {
    var slug = name.toLowerCase();
    return {
      slug: slug,
      displayName: name,
      face: PRESET_FACES[slug] || null,
      color: PLAYER_COLORS[i % PLAYER_COLORS.length]
    };
  });
  window.LDU.seedPresets(presets).catch(function(err) { console.warn('[LDU] seedPresets failed:', err); });
  syncRemoteGamesToLocal().then(function() { renderGamesList(); });
  loadSeasonWinners().then(function() {
    renderGamesList();
    var setupEl = document.getElementById('setup');
    if (setupEl && setupEl.classList.contains('active') && typeof renderAttendanceRoster === 'function') {
      renderAttendanceRoster();
    }
    var gameEl = document.getElementById('game');
    if (gameEl && gameEl.classList.contains('active') && typeof renderGame === 'function') {
      try { renderGame(); } catch(e) {}
    }
    var resultsEl = document.getElementById('results');
    if (resultsEl && resultsEl.classList.contains('active') && typeof renderResults === 'function') {
      try { renderResults(); } catch(e) {}
    }
    var statsEl = document.getElementById('stats');
    if (statsEl && statsEl.classList.contains('active') && typeof initStats === 'function') {
      try { initStats(); } catch(e) {}
    }
  });
}

if (window.LDU_READY) {
  lduBootstrap();
} else {
  window.addEventListener('ldu-ready', lduBootstrap, { once: true });
}

// Si Firebase no termina de inicializar en 8 s mostramos un banner indicando
// modo offline. Si llega después, lo escondemos.
var _offlineBannerTimer = setTimeout(function() {
  if (!window.LDU_READY) {
    var b = document.getElementById('offlineBanner');
    if (b) b.classList.add('visible');
  }
}, 8000);
window.addEventListener('ldu-ready', function() {
  clearTimeout(_offlineBannerTimer);
  var b = document.getElementById('offlineBanner');
  if (b) b.classList.remove('visible');
});

// Antes de que iOS suspenda la pestaña en background (o antes de cerrar el tab),
// forzamos un saveCurrentGame para que el último estado del partido en curso
// quede en localStorage y se intente flushear a Firestore.
function _flushOnHide() {
  try {
    if (typeof state !== 'undefined' && state && state.gameId && !state.gameOver
        && typeof saveCurrentGame === 'function') {
      saveCurrentGame();
    }
  } catch (e) { /* swallow: never break navigation */ }
}
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') _flushOnHide();
});
window.addEventListener('pagehide', _flushOnHide);
</script>
