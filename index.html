<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ED1C24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lunes de UNO">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>Lunes de UNO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --uno-red: #ED1C24;
      --uno-yellow: #FFDE00;
      --uno-green: #00A651;
      --uno-blue: #0072BC;
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface-2: #242442;
      --surface-3: #2e2e50;
      --text: #f0f0f5;
      --text-muted: #8888a8;
      --border: #3a3a5c;
      --danger: #ff4d6a;
      --success: #4dff91;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      max-width: 100vw;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* ---- Offline banner (firebase no cargó) ---- */
    .offline-banner {
      display: none;
      position: fixed;
      left: 1rem; right: 1rem;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 1rem);
      z-index: 250;
      background: rgba(255, 222, 0, .96);
      color: #1a1a1a;
      text-align: center;
      font-size: .85rem;
      font-weight: 600;
      padding: .55rem .9rem;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
    }
    .offline-banner.visible { display: block; }

    /* ---- Indicador de guardado (sync con Firestore) ---- */
    .save-indicator {
      display: none;
      position: fixed;
      top: calc(20vh + .5rem); right: .75rem;
      z-index: 240;
      background: var(--surface-2);
      color: var(--text);
      font-size: .75rem;
      font-weight: 600;
      padding: .3rem .7rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      user-select: none;
      pointer-events: none;
    }
    .save-indicator.visible { display: inline-block; }
    .save-indicator.saving { color: var(--uno-yellow); }
    .save-indicator.saved { color: var(--uno-green); }
    .save-indicator.pending { color: var(--uno-yellow); border-color: var(--uno-yellow); }

    /* ---- Header (logo + flags) ---- */
    .app-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 20vh;
      min-height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header-logo {
      display: flex; align-items: center; gap: .5rem;
      text-decoration: none; color: var(--text);
      height: 100%;
    }
    .header-logo svg {
      height: 80%;
      width: auto;
      max-height: 20vh;
      display: block;
    }
    .lang-switcher {
      display: flex; gap: .4rem;
      height: 80%;
      align-items: center;
    }
    .lang-btn {
      width: 44px; height: 32px; border-radius: 8px; cursor: pointer;
      border: 2px solid var(--border); overflow: hidden;
      transition: all .2s; opacity: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; line-height: 1;
      background: var(--surface-2);
    }
    @media (max-width: 768px) {
      .app-header { height: 10vh; min-height: 40px; }
      .header-logo svg { max-height: 10vh; }
      .lang-btn {
        height: 80%; width: auto; aspect-ratio: 11 / 8;
        max-height: 56px; padding: 3px;
      }
      .lang-btn svg { width: auto !important; height: 100% !important; }
    }
    .lang-btn:hover { border-color: var(--text-muted); background: var(--surface-3); }
    .lang-btn.active { border-color: var(--uno-yellow); background: rgba(255,222,0,.1); box-shadow: 0 2px 12px rgba(255,222,0,.25); }

    @media print { .app-header { display: none !important; } .round-roast { display: none !important; } }

    /* ---- Shared Layout ---- */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      max-width: 100vw;
      padding: 2rem 1rem;
      animation: fadeIn .35s ease;
    }
    .screen.active { display: flex; }
    .screen { padding-top: calc(20vh + 2rem); }
    @media (max-width: 768px) {
      .screen { padding-top: calc(10vh + 2rem); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1, h2, h3, h4 { font-family: 'Fredoka One', cursive; letter-spacing: .02em; }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
      border: none; border-radius: 14px; cursor: pointer;
      font-family: 'Inter', sans-serif; font-weight: 600;
      transition: all .2s ease;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--uno-red), #ff4060);
      color: #fff; font-size: 1.15rem; padding: 1rem 2.5rem;
      box-shadow: 0 6px 24px rgba(237,28,36,.35);
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 8px 32px rgba(237,28,36,.5); transform: translateY(-2px); }

    .btn-secondary {
      background: var(--surface-2); color: var(--text);
      font-size: .95rem; padding: .75rem 1.5rem; border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--surface-3); }

    .btn-small {
      font-size: .8rem; padding: .45rem 1rem; border-radius: 8px;
    }

    .btn-icon {
      width: 38px; height: 38px; padding: 0; border-radius: 10px;
      background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
      font-size: 1.1rem;
    }

    /* ---- Cards ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
    }

    /* ---- Inputs ---- */
    .input-group { display: flex; flex-direction: column; gap: .4rem; }
    .input-group label { font-size: .85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }

    input[type="text"], input[type="number"], select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      padding: .7rem 1rem;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    input:focus, select:focus { border-color: var(--uno-blue); }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* ---- HOME SCREEN ---- */
    #home { justify-content: center; gap: 2.5rem; text-align: center; }
    .logo-title {
      font-size: 3.2rem;
      background: linear-gradient(135deg, var(--uno-red), var(--uno-yellow), var(--uno-green), var(--uno-blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 12px rgba(237,28,36,.3));
    }
    .logo-sub { color: var(--text-muted); font-size: 1rem; margin-top: .5rem; }

    .uno-cards {
      display: flex; gap: .5rem; justify-content: center; margin-bottom: .5rem;
    }
    .uno-card-mini {
      width: clamp(56px, 15vw, 80px);
      display: block;
      transform: rotate(var(--rot, 0deg));
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,.35), 0 8px 24px rgba(0,0,0,.2);
    }
    .uno-card-mini img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    /* ---- SETUP SCREEN ---- */
    #setup { gap: 1.5rem; padding-top: calc(20vh + 1.5rem); }
    #setup .card + .card { margin-top: 0; }

    .player-inputs { display: flex; flex-direction: column; gap: .75rem; margin-top: .75rem; }
    .player-input-row {
      display: flex; align-items: center; gap: .5rem;
    }
    .player-color {
      width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    }
    .player-input-row input { flex: 1; }

    .preset-names {
      display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .75rem; margin-bottom: .25rem;
    }
    .preset-names-label {
      font-size: .75rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em; width: 100%; margin-bottom: .15rem;
    }
    .preset-chip {
      display: flex; flex-direction: column; align-items: center;
      width: 70px; padding: .4rem; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface-2);
      cursor: pointer; transition: all .2s; gap: .25rem;
      font: inherit; color: inherit; text-align: center;
    }
    .preset-chip:focus-visible {
      outline: 2px solid var(--uno-yellow); outline-offset: 2px;
    }
    .preset-chip img {
      width: 52px; height: 52px; border-radius: 6px; object-fit: cover;
    }
    .preset-chip .chip-name {
      font-family: 'Inter', sans-serif; font-size: .7rem; font-weight: 600;
      color: var(--text); text-align: center;
    }
    .preset-chip:hover { border-color: var(--uno-yellow); background: rgba(255,222,0,.12); }
    .preset-chip.used { opacity: .3; cursor: not-allowed; pointer-events: none; }
    .player-face {
      width: 1.5rem; height: 1.5rem; border-radius: 4px; object-fit: cover; flex-shrink: 0;
    }
    .player-face-sm {
      width: 1.2rem; height: 1.2rem; border-radius: 3px; object-fit: cover; vertical-align: middle;
    }
    /* Season-winner badge: small rectangle with a ★ sits just above the face. */
    .face-wrap {
      position: relative; display: inline-block; vertical-align: middle;
      line-height: 0;
    }
    .face-wrap .season-star-badge {
      position: absolute;
      left: 50%;
      top: -0.55rem;
      transform: translateX(-50%);
      background: #0f0f1a;
      color: #ffd400;
      font-size: .55rem;
      line-height: 1;
      padding: 1px 4px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 1;
      font-family: 'Inter', sans-serif;
    }
    .face-wrap.face-wrap-lg .season-star-badge { top: -0.7rem; font-size: .7rem; padding: 2px 5px; }

    .points-presets {
      display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .75rem;
    }
    .preset-btn {
      padding: .5rem 1rem; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text); cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: .9rem; font-weight: 500;
      transition: all .2s;
    }
    .preset-btn:hover, .preset-btn.selected {
      border-color: var(--uno-yellow); background: rgba(255,222,0,.12); color: var(--uno-yellow);
    }

    .setup-footer { margin-top: .5rem; }

    /* Number selector */
    .number-selector {
      display: flex; align-items: center; gap: 1rem; margin-top: .75rem;
    }
    .number-display {
      font-family: 'Fredoka One', cursive; font-size: 2.2rem;
      width: 60px; text-align: center; color: var(--uno-yellow);
    }

    /* ---- GAME SCREEN ---- */
    #game { gap: 1.25rem; padding-top: calc(20vh + 1rem); }

    .game-header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 480px;
    }
    .game-header h2 { font-size: 1.4rem; }

    .round-badge {
      background: var(--uno-blue); color: #fff;
      padding: .3rem .9rem; border-radius: 20px;
      font-size: .85rem; font-weight: 600;
    }

    .scoreboard {
      width: 100%; max-width: 480px;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .scoreboard th, .scoreboard td {
      padding: .65rem .75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .scoreboard th {
      background: var(--surface-2);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      font-weight: 600;
    }
    .scoreboard tr:last-child td { border-bottom: none; }
    .scoreboard .player-name-cell {
      display: flex; align-items: center; gap: .5rem; font-weight: 600;
    }
    .scoreboard .total-cell {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
    }
    .scoreboard .over-limit { color: var(--danger); }
    .scoreboard .winner-row { background: rgba(77, 255, 145, .08); }

    .round-inputs { display: flex; flex-direction: column; gap: .65rem; }
    .round-input-row {
      display: flex; align-items: center; gap: .75rem;
    }
    .round-input-row .player-label {
      display: flex; align-items: center; gap: .5rem;
      font-weight: 600; font-size: .95rem;
      min-width: 120px;
    }
    .round-input-row input {
      width: 90px; text-align: center;
      font-size: 1.1rem; font-weight: 600;
      padding: .6rem .5rem;
    }

    .game-actions {
      display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center;
    }

    /* Progress bar */
    .progress-container { width: 100%; max-width: 480px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: .8rem; color: var(--text-muted); margin-bottom: .35rem;
    }
    .progress-bar {
      height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      transition: width .4s ease;
      background: linear-gradient(90deg, var(--uno-green), var(--uno-yellow), var(--uno-red));
    }

    /* Round history */
    .round-history {
      width: 100%; max-width: 480px;
    }
    /* Round roast carousel */
    .round-roast {
      width: 100%; max-width: 480px;
      display: none;
      flex-direction: column;
      gap: .5rem;
    }
    .round-roast.visible { display: flex; }
    .round-roast-slides {
      min-height: 80px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .round-roast-slide {
      display: none;
      padding: 1rem 1.25rem;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: .95rem;
      line-height: 1.4;
      min-height: 80px;
      box-sizing: border-box;
    }
    .round-roast-slide.active {
      display: flex;
    }
    .round-roast-slide.roast { color: var(--danger); }
    .round-roast-slide.brag { color: var(--success); }
    .round-roast-dots {
      display: flex;
      justify-content: center;
      gap: .5rem;
    }
    .round-roast-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--surface-3);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform .2s, background .2s;
    }
    .round-roast-dot:hover { background: var(--border); }
    .round-roast-dot.active { background: var(--uno-yellow); transform: scale(1.2); }

    /* ---- Roast Speak Button ---- */
    .roast-speak-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--text-muted);
      padding: 0.3rem;
      transition: color 0.2s, transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .roast-speak-btn:hover {
      color: var(--uno-yellow);
      transform: scale(1.15);
    }
    .roast-speak-btn.speaking {
      color: var(--uno-yellow);
      animation: pulse-speak 0.8s ease infinite;
    }
    @keyframes pulse-speak {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .round-history h3 { font-size: 1rem; margin-bottom: .75rem; color: var(--text-muted); }
    .round-history-table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      font-size: .85rem;
    }
    .round-history-table th, .round-history-table td {
      padding: .5rem .6rem; text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .round-history-table th {
      background: var(--surface-2); font-size: .7rem;
      text-transform: uppercase; letter-spacing: .04em;
      color: var(--text-muted); font-weight: 600;
    }
    .round-history-table tr:last-child td { border-bottom: none; }
    .round-history-table td:first-child { font-weight: 600; text-align: left; padding-left: .75rem; }
    .round-history-table th:first-child { text-align: left; padding-left: .75rem; }
    .round-history-table .edit-cell {
      cursor: pointer; color: var(--uno-blue); font-weight: 600;
    }
    .round-history-table .edit-cell:hover { text-decoration: underline; }

    /* ---- RESULTS SCREEN ---- */
    #results { gap: 1.5rem; padding-top: calc(20vh + 1.5rem); text-align: center; }

    .trophy { font-size: 4rem; margin-bottom: .25rem; }
    .winner-name {
      font-family: 'Fredoka One', cursive; font-size: 2rem;
      background: linear-gradient(135deg, var(--uno-yellow), #ffaa00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .winner-subtitle { color: var(--text-muted); font-size: .95rem; margin-top: .25rem; }

    .final-standings {
      width: 100%; max-width: 480px;
    }
    .standing-row {
      display: flex; align-items: center; gap: 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: .85rem 1rem; margin-bottom: .5rem;
      transition: background .2s;
    }
    .standing-row:first-child { border-color: var(--uno-yellow); background: rgba(255,222,0,.06); }
    .standing-position {
      font-family: 'Fredoka One', cursive; font-size: 1.3rem;
      width: 36px; text-align: center;
    }
    .standing-position.gold { color: var(--uno-yellow); }
    .standing-position.silver { color: #c0c0c0; }
    .standing-position.bronze { color: #cd7f32; }
    .standing-info { flex: 1; text-align: left; }
    .standing-info .name { font-weight: 600; font-size: 1rem; }
    .standing-score {
      font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    }

    .results-actions {
      display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center;
      margin-top: .5rem;
    }

    /* ---- EDIT MODAL ---- */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      z-index: 100; align-items: flex-start; justify-content: center;
      padding: 1rem;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.75rem;
      width: 100%; max-width: 400px;
      max-height: calc(100dvh - 2rem);
      overflow-y: auto;
      margin: auto 0;
      animation: fadeIn .25s ease;
    }
    .modal h3 { margin-bottom: 1rem; font-size: 1.15rem; }
    .modal-inputs { display: flex; flex-direction: column; gap: .65rem; }
    .modal-input-row {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .modal-input-row label { font-weight: 600; font-size: .9rem; }
    .modal-input-row input { width: 90px; text-align: center; font-weight: 600; }
    .modal-actions { display: flex; gap: .75rem; margin-top: 1.25rem; justify-content: flex-end; }

    /* ---- PRINT STYLES ---- */
    @media print {
      body { background: #fff; color: #000; }
      .screen { padding: 0; min-height: auto; }
      .no-print { display: none !important; }
      .card, .scoreboard, .round-history-table, .standing-row {
        background: #fff; border-color: #ddd; color: #000;
      }
      .scoreboard th, .round-history-table th { background: #f5f5f5; color: #333; }
      .scoreboard td, .round-history-table td { color: #000; }
      .logo-title, .winner-name {
        -webkit-text-fill-color: #000;
        background: none; color: #000;
      }
      .standing-position.gold { color: #b8860b; -webkit-text-fill-color: #b8860b; }
      .trophy { font-size: 2rem; }
      .print-header {
        display: block !important;
        text-align: center; margin-bottom: 1rem;
        font-family: 'Fredoka One', cursive; font-size: 1.5rem;
      }
      .standing-row { border-color: #ccc; }
      .standing-row:first-child { border-color: #b8860b; }
    }

    .print-header { display: none; }

    /* ---- Copy Toast ---- */
    .copy-toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--success); color: #000;
      padding: .6rem 1.5rem; border-radius: 12px;
      font-weight: 600; font-size: .9rem;
      opacity: 0; transition: all .3s ease;
      z-index: 999; pointer-events: none;
    }
    .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ---- Hat Pulse ---- */
    @keyframes hatPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3) rotate(8deg); }
      100% { transform: scale(1); }
    }
    .hat-pulse { animation: hatPulse .35s ease; }

    /* ---- Modo Asado Toggle ---- */
    .asado-toggle-row {
      display: flex; align-items: center; gap: .75rem;
      margin-top: 1.5rem;
      font-size: .95rem; font-weight: 600; color: var(--text-muted);
    }
    .asado-switch {
      position: relative; width: 52px; height: 28px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 14px; cursor: pointer;
      transition: background .3s;
    }
    .asado-switch input { display: none; }
    .asado-switch .slider {
      position: absolute; top: 2px; left: 2px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--text-muted);
      transition: all .3s; display: flex; align-items: center; justify-content: center;
      font-size: .75rem;
    }
    .asado-switch input:checked + .slider {
      left: 26px; background: #ff6b35;
    }
    body.asado .asado-switch { background: rgba(255,107,53,.25); border-color: #ff6b35; }

    /* ---- Modo Asado Theme ---- */
    body.asado {
      --bg: #1a0e08;
      --surface: #2a1a0e;
      --surface-2: #3d2b1f;
      --surface-3: #4a3728;
      --text: #f5e6d0;
      --text-muted: #a08060;
      --border: #5a4030;
      --danger: #ff6b35;
      --success: #7cb342;
      --uno-red: #e64a19;
      --uno-yellow: #ffb300;
      --uno-green: #7cb342;
      --uno-blue: #78909c;
    }
    body.asado .btn-primary {
      background: linear-gradient(135deg, #e64a19, #ff6b35);
      box-shadow: 0 6px 24px rgba(230,74,25,.35);
    }
    body.asado .progress-fill {
      background: linear-gradient(90deg, #c62828, #e64a19, #ff6b35, #ffb300, #4e342e);
    }
    body.asado .logo-title {
      background: linear-gradient(135deg, #e64a19, #ffb300, #7cb342, #78909c);
      -webkit-background-clip: text; background-clip: text;
    }
    body.asado .round-roast-slide.roast { color: #ff6b35; }
    body.asado .round-roast-slide.brag { color: #7cb342; }

    /* ---- Flying Meat (Modo Asado) ---- */
    .flying-meat {
      position: fixed;
      z-index: 50;
      width: 60px; height: 60px;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      animation: meatFly var(--fly-dur, 6s) linear forwards;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.4));
    }
    @keyframes meatFly {
      0% { transform: translate(var(--start-x), var(--start-y)) rotate(0deg) scale(0.5); opacity: 0; }
      10% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) rotate(30deg) scale(1); }
      90% { opacity: 1; }
      100% { transform: translate(var(--end-x), var(--end-y)) rotate(var(--spin, 720deg)) scale(0.6); opacity: 0; }
    }

    /* ---- Share Card ---- */
    .share-card { margin-top: 1rem; }
    .share-card h4 { margin-bottom: .75rem; font-size: 1rem; color: var(--text-muted); }
    .share-actions { display: flex; flex-direction: column; gap: .75rem; }
    .share-photo-row { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-start; justify-content: center; margin-top: .5rem; }
    .share-photo-box { text-align: center; max-width: 220px; }
    .share-photo-box img { width: 100%; border-radius: 12px; border: 2px solid var(--border); display: block; }
    .share-photo-box .share-photo-label { font-size: .75rem; color: var(--text-muted); margin-top: .35rem; }
    .share-photo-box .btn-small { margin-top: .5rem; }
    .photo-upload-wrap { margin: .5rem 0; }
    .photo-upload-wrap input[type="file"] { font-size: .85rem; color: var(--text); }
    .share-upload-label { display:block; font-size:.85rem; margin-bottom:.5rem; color: var(--text-muted); }
    .share-upload-buttons { display:flex; flex-wrap:wrap; gap:.5rem; }
    .share-upload-btn { cursor:pointer; display:inline-flex; align-items:center; gap:.4rem; }
    .share-photo-box-wide { max-width: 100%; width: 100%; }
    .share-photo-box-wide img {
      width: 100%; max-width: 540px; margin: 0 auto;
      border-radius: 12px; border: 2px solid var(--border); display: block;
    }

    /* ---- Walk of Shame ---- */
    .walk-of-shame {
      width: 100%; max-width: 480px;
      display: none;
    }
    .walk-of-shame.visible { display: block; }
    .walk-of-shame h3 {
      font-size: .95rem; color: var(--danger); margin-bottom: .5rem;
      display: flex; align-items: center; gap: .4rem;
    }
    .shame-list {
      display: flex; flex-direction: column; gap: .4rem;
    }
    .shame-row {
      display: flex; align-items: center; gap: .6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .55rem .75rem;
    }
    .shame-rank {
      font-family: 'Fredoka One', cursive;
      font-size: 1rem; width: 24px; text-align: center;
      color: var(--danger);
    }
    .shame-name {
      flex: 1; font-weight: 600; font-size: .9rem;
      display: flex; align-items: center; gap: .4rem;
    }
    .shame-badge {
      background: rgba(255,77,106,.15);
      color: var(--danger);
      padding: .2rem .6rem;
      border-radius: 8px;
      font-size: .8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    /* ---- Bucket Overlay (Walk of Shame) ---- */
    .shame-face-container {
      position: relative;
      display: inline-block;
    }
    .shame-face-container .bucket-overlay {
      position: absolute;
      top: -60%;
      left: 50%;
      transform: translateX(-50%);
      width: 2.2rem;
      pointer-events: none;
      z-index: 2;
    }

    /* ---- Games List ---- */
    .games-list {
      width: 100%; max-width: 480px; margin-top: 1rem;
      display: flex; flex-direction: column; gap: .5rem;
    }
    .games-list h3 {
      font-size: 1rem; color: var(--text-muted); margin-bottom: .25rem;
    }
    .game-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .85rem 1rem;
      display: flex; flex-direction: column; gap: .5rem;
    }
    .game-item-info {
      display: flex; flex-direction: column; gap: .2rem;
    }
    .game-item-info .game-item-title {
      font-weight: 600; font-size: .95rem;
    }
    .game-item-scores {
      font-size: .85rem; color: var(--text); font-weight: 500;
    }
    .game-item-meta {
      font-size: .75rem; color: var(--text-muted);
    }
    .game-item-actions {
      display: flex; flex-direction: row; gap: .5rem;
    }
    .game-card-season {
      font-weight: 700; font-size: .95rem; color: var(--text);
    }
    .game-card-row {
      display: flex; align-items: center; gap: .4rem;
      font-size: .85rem; color: var(--text);
    }
    .game-card-row.game-card-loser { color: var(--text-muted); }
    .game-card-row img.player-face-sm { width: 1.1rem; height: 1.1rem; }
    .game-card-inprogress {
      font-weight: 600; font-size: .9rem; color: var(--uno-yellow);
    }

    /* ---- Fines ---- */
    .btn-fine {
      background: rgba(255,180,0,.15); color: var(--uno-yellow);
      border: 1px solid rgba(255,180,0,.3); font-size: .75rem;
      padding: .3rem .6rem; border-radius: 8px; cursor: pointer;
      font-family: 'Inter', sans-serif; font-weight: 600;
      transition: all .2s;
    }
    .btn-fine:hover { background: rgba(255,180,0,.25); }
    .btn-fine.has-fine { background: rgba(255,180,0,.3); border-color: var(--uno-yellow); }
    .fine-input-row {
      display: none; align-items: center; gap: .5rem;
      padding-left: 2rem; margin-top: -.3rem;
    }
    .fine-input-row.visible { display: flex; }
    .fine-label { font-size: .8rem; color: var(--uno-yellow); font-weight: 600; white-space: nowrap; }
    .fine-input-row input { width: 70px; text-align: center; font-size: .9rem; font-weight: 600; padding: .4rem .3rem; }
    .fine-badge { color: var(--uno-yellow); font-size: .75rem; font-weight: 600; }
    .fine-total-badge { background: rgba(255,180,0,.12); color: var(--uno-yellow); padding: .15rem .5rem; border-radius: 6px; font-size: .75rem; font-weight: 700; }
    .btn-corte {
      background: var(--surface-2); color: var(--uno-green);
      border: 1px solid var(--border);
    }
    .btn-corte:hover { background: rgba(0,166,81,.18); }
    .btn-corte.active {
      background: var(--uno-green); color: #0f0f1a; border-color: var(--uno-green);
      box-shadow: 0 0 0 2px rgba(0,166,81,.25);
    }
    .corte-badge { color: var(--uno-green); font-size: .75rem; font-weight: 600; }
    .corte-total-badge { background: rgba(0,166,81,.15); color: var(--uno-green); padding: .15rem .5rem; border-radius: 6px; font-size: .75rem; font-weight: 700; }

    /* ---- Setup: attending chip + guests ---- */
    .preset-chip.attending {
      border-color: var(--uno-green); background: rgba(0,166,81,.18);
      box-shadow: 0 0 0 2px rgba(0,166,81,.25);
    }
    .preset-chip.host-chip::after {
      content: '🏠'; position: absolute; top: -6px; right: -6px; font-size: .9rem;
    }
    .preset-chip { position: relative; }
    .roster-grid { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .5rem; }
    .host-select-row { margin-top: .9rem; display: flex; align-items: center; gap: .5rem; }
    .host-select-row select { flex: 1; }
    .guests-section { margin-top: 1rem; padding-top: .8rem; border-top: 1px dashed var(--border); }
    .guests-section-label {
      font-size: .75rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .btn-add-guest {
      background: var(--surface-2); color: var(--text-muted);
      border: 1px dashed var(--border); padding: .4rem .75rem; border-radius: 8px;
      font-size: .8rem; cursor: pointer; margin-top: .5rem;
    }
    .btn-add-guest:hover { color: var(--text); border-color: var(--text-muted); }
    .guest-remove {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 1rem; padding: .2rem .4rem;
    }
    .guest-remove:hover { color: var(--danger); }

    /* ---- Stats screen ---- */
    .stats-tabs {
      display: flex; gap: .35rem; margin-bottom: 1rem;
      border-bottom: 1px solid var(--border); padding-bottom: .25rem; flex-wrap: wrap;
    }
    .stats-tab-btn {
      background: transparent; color: var(--text-muted); border: 1px solid transparent;
      padding: .45rem .8rem; border-radius: 8px 8px 0 0; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: .85rem; font-weight: 600;
      transition: all .2s;
    }
    .stats-tab-btn:hover { color: var(--text); background: var(--surface-2); }
    .stats-tab-btn.active {
      color: var(--uno-yellow); background: var(--surface-2);
      border-color: var(--border); border-bottom-color: var(--surface-2);
    }
    .stats-tab-panel { display: none; }
    .stats-tab-panel.active { display: block; }
    .stats-hero {
      display: flex; align-items: center; gap: .8rem;
      padding: 1rem; background: var(--surface-2); border-radius: 12px;
      margin-bottom: .8rem;
    }
    .stats-hero img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; }
    .stats-hero-name { font-family: 'Fredoka One', cursive; font-size: 1.4rem; }
    .stats-hero-meta { color: var(--text-muted); font-size: .85rem; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: .4rem;
    }
    .stat-tile {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: .5rem .55rem; display: flex; flex-direction: column; gap: .15rem;
    }
    .stat-tile .stat-label {
      font-size: .62rem; text-transform: uppercase; letter-spacing: .04em;
      color: var(--text-muted); font-weight: 600;
    }
    .stat-tile .stat-value {
      font-family: 'Fredoka One', cursive; font-size: 1.15rem; color: var(--text);
    }
    .stat-tile .stat-sub { font-size: .65rem; color: var(--text-muted); }
    .stat-section-label {
      font-size: .75rem; text-transform: uppercase; letter-spacing: .06em;
      color: var(--text-muted); font-weight: 700; margin: 1rem 0 .4rem;
    }
    .stats-table {
      width: 100%; border-collapse: collapse; font-size: .85rem; background: var(--surface);
    }
    .stats-table th, .stats-table td {
      padding: .5rem .6rem; text-align: left; border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .stats-table th { background: var(--surface-2); font-weight: 700; color: var(--text-muted); text-transform: uppercase; font-size: .7rem; letter-spacing: .05em; }
    .stats-table tr:hover td { background: var(--surface-2); }

    /* Horizontal-scroll wrapper so stats tables never widen the page on mobile */
    .stats-table-scroll {
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .stats-tab-panel { width: 100%; max-width: 100%; }

    /* Share-to-WhatsApp button under each stats table */
    .btn-whatsapp {
      display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
      background: #25D366; color: #fff; border: none; border-radius: 10px;
      padding: .55rem 1rem; font-family: 'Inter', sans-serif; font-weight: 600;
      font-size: .85rem; cursor: pointer; margin-top: .75rem;
      transition: all .2s ease;
      box-shadow: 0 2px 8px rgba(37,211,102,.25);
    }
    .btn-whatsapp:hover:not(:disabled) { background: #1fb855; box-shadow: 0 4px 14px rgba(37,211,102,.4); }
    .btn-whatsapp:disabled { opacity: .6; cursor: wait; }

    .h2h-matrix { font-size: .75rem; }
    .h2h-matrix td, .h2h-matrix th {
      text-align: center; padding: .3rem .35rem; min-width: 44px;
    }
    .h2h-good { background: rgba(0,166,81,.2); }
    .h2h-bad { background: rgba(237,28,36,.18); }
    .h2h-diag { background: var(--surface-2); color: var(--text-muted); }

    /* ---- Nachi credit button ---- */
    .btn-nachi {
      display: inline-block;
      background: var(--surface-2);
      border: 2px solid var(--uno-yellow);
      color: var(--text);
      text-decoration: none;
      border-radius: 999px;
      padding: .3rem .75rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: transform .15s, background .2s;
    }
    .btn-nachi:hover { background: var(--surface-3); transform: scale(1.05); }

    /* ---- Edit limit inline ---- */
    .edit-limit-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: .8rem; padding: .1rem .3rem;
      border-radius: 4px; transition: color .2s;
      vertical-align: middle;
    }
    .edit-limit-btn:hover { color: var(--uno-yellow); }

    /* ---- Responsive ---- */
    @media (max-width: 500px) {
      .logo-title { font-size: 2.4rem; }
      .round-input-row .player-label { min-width: 90px; font-size: .85rem; }
      .round-input-row input { width: 75px; }
      .scoreboard th, .scoreboard td { padding: .5rem .4rem; font-size: .85rem; }
    }
  </style>
</head>

  <!-- Banner de modo offline: se muestra cuando Firebase no carga en 8 s -->

  <!-- Indicador de sync con Firestore: guardando / guardado / pendientes -->
  <div id="saveIndicator" class="save-indicator" role="status" aria-live="polite">
    <span id="saveIndicatorText"></span>
  </div>

  <!-- ============ HOME ============ -->
  <div id="home" class="screen active">
    <div>
      <div class="uno-cards">
        <div class="uno-card-mini" style="--rot:-8deg;"><img src="assets/uno-plus4.png" alt="" width="160" height="232"></div>
        <div class="uno-card-mini" style="--rot:-3deg;"><img src="assets/uno-plus4.png" alt="" width="160" height="232"></div>
        <div class="uno-card-mini" style="--rot:3deg;"><img src="assets/uno-plus4.png" alt="" width="160" height="232"></div>
        <div class="uno-card-mini" style="--rot:8deg;"><img src="assets/uno-plus4.png" alt="" width="160" height="232"></div>
      </div>

    <button class="btn btn-primary" onclick="showScreen('setup')" data-i18n="home_start"></button>

  <!-- ============ SETUP ============ -->
  <div id="setup" class="screen">
    <h2 style="font-size:1.6rem; margin-bottom:.5rem;" data-i18n="setup_title"></h2>

    <div class="card">
      <div class="input-group">
        <label data-i18n="setup_roster_label"></label>
        <div class="roster-grid" id="rosterGrid"></div>

    <div class="card">

<!-- ============ FIREBASE FIRESTORE (module) ============ -->
<!--
  To enable cloud sync + stats, create a Firebase project (free tier)
  and paste your web app config into firebaseConfig below.
  Docs: https://firebase.google.com/docs/web/setup
  Recommended Firestore rules (open, small friend group):
    rules_version = '2';
    service cloud.firestore {
      match /databases/{database}/documents {
        match /{document=**} { allow read, write: if true; }
      }
    }
  Until a real config is pasted, the app falls back to localStorage-only.
-->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import {
    initializeFirestore,
    persistentLocalCache,
    persistentMultipleTabManager,
    collection, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc, addDoc,
    query, where, orderBy, serverTimestamp, Timestamp
  } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDgmh5HjjYdIwkFgeo7iBfcfQ_b73Xa3yM",
    authDomain: "lunesdeuno.firebaseapp.com",
    projectId: "lunesdeuno",
    storageBucket: "lunesdeuno.firebasestorage.app",
    messagingSenderId: "694296428363",
    appId: "1:694296428363:web:fb8cc52a4a5c58e24372ce",
    measurementId: "G-BL6BEJ39C1"
  };

  const isConfigured = firebaseConfig.projectId && firebaseConfig.projectId !== "REPLACE_ME";
  window.LDU_READY = false;

  if (!isConfigured) {
    console.info("[LDU] Firebase config not set — running in localStorage-only mode.");
  } else {
    try {
      const app = initializeApp(firebaseConfig);
      let db;
      try {
        db = initializeFirestore(app, {
          localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
        });
      } catch (e) {
        const { getFirestore } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js");
        db = getFirestore(app);
      }

      const gamesCol = () => collection(db, 'games');
      const seasonsCol = () => collection(db, 'seasons');
      const playersCol = () => collection(db, 'players');

      window.LDU = {
        db,
        async saveGame(entry) {
          const s = entry.state || {};
          // Firestore rejects nested arrays, so wrap each inner row as { v: [...] }.
          const wrap2d = (arr) => (arr || []).map((r) => ({ v: r || [] }));
          const payload = {
            gameId: entry.id,
            createdAt: entry.timestamp ? Timestamp.fromMillis(entry.timestamp) : Timestamp.now(),
            updatedAt: serverTimestamp(),
            finishedAt: entry.finishedAt ? Timestamp.fromMillis(entry.finishedAt) : null,
            finished: !!entry.finished,
            maxPoints: s.maxPoints || 0,
            venue: s.venue || '',
            hostId: s.hostId || null,
            participants: s.participants || [],
            absentees: s.absentees || [],
            rounds: wrap2d(s.rounds),
            fines: wrap2d(s.fines),
            cortes: wrap2d(s.cortes),
            winnerSlot: (typeof entry.winnerSlot === 'number') ? entry.winnerSlot : null,
            winnerPlayerId: entry.winnerPlayerId || null,
            seasonId: entry.seasonId || null
          };
          await setDoc(doc(db, 'games', entry.id), payload, { merge: true });
        },
        async deleteGame(id) { await deleteDoc(doc(db, 'games', id)); },
        async getAllGames() {
          const snap = await getDocs(gamesCol());
          return snap.docs.map(d => d.data());
        },
        async getAllFinishedGames() {
          // Client-side filter+sort to avoid requiring a composite Firestore index.
          const snap = await getDocs(gamesCol());
          return snap.docs
            .map(d => d.data())
            .filter(g => g.finished === true && g.finishedAt)
            .sort((a, b) => {
              const am = a.finishedAt && a.finishedAt.toMillis ? a.finishedAt.toMillis() : (a.finishedAt || 0);
              const bm = b.finishedAt && b.finishedAt.toMillis ? b.finishedAt.toMillis() : (b.finishedAt || 0);
              return am - bm;
            });
        },
        async getSeasons() {
          const snap = await getDocs(query(seasonsCol(), orderBy('seasonNumber', 'asc')));
          return snap.docs.map(d => d.data());
        },
        async getSeason(n) {
          const snap = await getDoc(doc(db, 'seasons', String(n)));
          return snap.exists() ? snap.data() : null;
        },
        async writeSeason(seasonDoc) {
          await setDoc(doc(db, 'seasons', String(seasonDoc.seasonNumber)), seasonDoc);
        },
        async updateGameSeason(gameId, seasonId) {
          await updateDoc(doc(db, 'games', gameId), { seasonId });
        },
        async seedPresets(presets) {
          for (const p of presets) {
            await setDoc(doc(db, 'players', p.slug), {
              slug: p.slug,
              displayName: p.displayName,
              face: p.face,
              color: p.color,
              isPreset: true
            }, { merge: true });
          }
        },
        async getPlayers() {
          const snap = await getDocs(playersCol());
          return snap.docs.map(d => d.data());
        },
        async logEdit(gameId, info) {
          if (!gameId || !info) return;
          const gameRef = doc(db, 'games', gameId);
          const editsRef = collection(gameRef, 'edits');
          const payload = Object.assign({}, info, { serverTimestamp: serverTimestamp() });
          // Fire both writes; tolerate individual failures (e.g. the game doc
          // not existing yet on a brand-new game) without failing the whole op.
          await Promise.all([
            addDoc(editsRef, payload).catch((e) => { console.warn('[LDU] logEdit addDoc failed:', e); }),
            setDoc(gameRef, { lastEdit: payload }, { merge: true }).catch((e) => { console.warn('[LDU] logEdit setDoc failed:', e); })
          ]);
        }
      };

      window.LDU_READY = true;
      console.info("[LDU] Firestore ready.");
      window.dispatchEvent(new Event('ldu-ready'));
    } catch (e) {
      console.error("[LDU] Firebase init failed:", e);
      window.LDU_READY = false;
    }
  }
</script>

function t(key) {
  return (STRINGS[currentLang] && STRINGS[currentLang][key]) || STRINGS.en[key] || key;
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lunesdeuno_lang', lang);
  document.documentElement.lang = lang;

  // Update flag buttons
  document.getElementById('langEs').classList.toggle('active', lang === 'es');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');

  // Apply all data-i18n
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPh);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    const val = t(el.dataset.i18nTitle);
    el.title = val;
    el.setAttribute('aria-label', val);
  });

  // Re-render dynamic content if a game screen is active
  if (document.getElementById('setup').classList.contains('active')) initSetup();
  if (document.getElementById('game').classList.contains('active')) renderGame();
  if (document.getElementById('results').classList.contains('active')) renderResults();
  if (typeof _updateSeasonTabLabel === 'function') _updateSeasonTabLabel();
  if (typeof populateSeasonSelector === 'function' && _statsData && _statsData.loaded) {
    populateSeasonSelector();
  }
}

// Set of player slugs that have won at least one season. Populated by
// loadSeasonWinners() on boot; re-populated whenever stats load.
var SEASON_WINNERS = new Set();

function _playerSlug(player) {
  if (!player) return '';
  if (player.playerId) return player.playerId;
  if (player.slug) return player.slug;
  if (player.face) {
    var m = /\/([^\/]+)\.(?:png|jpg|jpeg|webp|svg)$/i.exec(player.face);
    if (m) return m[1].toLowerCase();
  }
  return (player.name || '').toLowerCase();
}

function _isSeasonWinner(slug) {
  return !!slug && SEASON_WINNERS.has(slug);
}

function _withSeasonStar(inner, slug, size) {
  if (!_isSeasonWinner(slug)) return inner;
  var cls = size === 'lg' ? 'face-wrap face-wrap-lg' : 'face-wrap';
  return '<span class="' + cls + '">' + inner + '<span class="season-star-badge" title="Season winner">\u2726</span></span>';
}

function loadSeasonWinners() {
  if (!window.LDU_READY || !window.LDU || !window.LDU.getSeasons) return Promise.resolve();
  return window.LDU.getSeasons().then(function(seasons) {
    SEASON_WINNERS = new Set();
    (seasons || []).forEach(function(s) {
      if (s && s.winnerPlayerId) SEASON_WINNERS.add(s.winnerPlayerId);
    });
  }).catch(function() { /* silently tolerate offline */ });
}

// ============ EDIT ATTRIBUTION / AUDIT LOG ============
// Passively collects device/network/browser signals on every mutation (submit
// round, edit round, change max points, create/finish game) and writes them
// to Firestore under games/{gameId}/edits/* and games/{gameId}.lastEdit.
// Every API used below is zero-permission: canvas, WebGL, OfflineAudioContext,
// RTCPeerConnection (without getUserMedia), UA Client Hints, ipapi.co.
// All async work is cached after the first boot-time warmup so individual
// edits don't wait on the network. Every code path is wrapped in try/catch
// that silently falls back — a failed fingerprint must NEVER interrupt the
// user's flow.
var _fpCache = {};

function getDeviceId() {
  try {
    var id = localStorage.getItem('lunesdeuno_deviceId');
    if (!id) {
      id = (window.crypto && crypto.randomUUID)
        ? crypto.randomUUID()
        : (Date.now() + '-' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2));
      localStorage.setItem('lunesdeuno_deviceId', id);
    }
    return id;
  } catch (e) { return null; }
}

function _mq(q) { try { return matchMedia(q).matches; } catch (e) { return null; } }

async function computeCanvasHash() {
  if (_fpCache.canvas !== undefined) return _fpCache.canvas;
  try {
    var c = document.createElement('canvas');
    c.width = 280; c.height = 60;
    var ctx = c.getContext('2d');
    if (!ctx) { _fpCache.canvas = null; return null; }
    ctx.textBaseline = 'top';
    ctx.font = "14px 'Arial'";
    ctx.fillStyle = '#f60'; ctx.fillRect(125, 1, 62, 20);
    ctx.fillStyle = '#069'; ctx.fillText('LunesDeUNO \uD83C\uDCA0 fingerprint', 2, 15);
    ctx.fillStyle = 'rgba(102,204,0,0.7)'; ctx.fillText('LunesDeUNO \uD83C\uDCA0 fingerprint', 4, 17);
    var data = c.toDataURL();
    if (window.crypto && crypto.subtle && crypto.subtle.digest) {
      var buf = new TextEncoder().encode(data);
      var digest = await crypto.subtle.digest('SHA-1', buf);
      _fpCache.canvas = Array.from(new Uint8Array(digest))
        .map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    } else {
      // Fallback: simple string hash over the data URL.
      var h = 0;
      for (var i = 0; i < data.length; i++) { h = ((h << 5) - h + data.charCodeAt(i)) | 0; }
      _fpCache.canvas = 'h' + (h >>> 0).toString(16);
    }
    return _fpCache.canvas;
  } catch (e) { _fpCache.canvas = null; return null; }
}

function readWebGL() {
  if (_fpCache.webgl !== undefined) return _fpCache.webgl;
  var out = {};
  try {
    var canvas = document.createElement('canvas');
    var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (gl) {
      var dbg = gl.getExtension('WEBGL_debug_renderer_info');
      if (dbg) {
        try { out.vendor = gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL); } catch (e) {}
        try { out.renderer = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL); } catch (e) {}
      }
      try { out.maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE); } catch (e) {}
      try {
        var vp = gl.getParameter(gl.MAX_VIEWPORT_DIMS);
        out.maxViewportDims = vp && vp.length ? [vp[0], vp[1]] : null;
      } catch (e) {}
    }
  } catch (e) {}
  _fpCache.webgl = out;
  return out;
}

async function computeAudioHash() {
  if (_fpCache.audio !== undefined) return _fpCache.audio;
  try {
    var OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
    if (!OfflineCtx) { _fpCache.audio = null; return null; }
    var ctx = new OfflineCtx(1, 44100, 44100);
    var osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = 10000;
    var comp = ctx.createDynamicsCompressor();
    osc.connect(comp);
    comp.connect(ctx.destination);
    osc.start(0);
    var buf = await ctx.startRendering();
    var ch = buf.getChannelData(0);
    var sum = 0;
    for (var i = 4500; i < 5000; i++) sum += Math.abs(ch[i]);
    _fpCache.audio = sum.toString();
    return _fpCache.audio;
  } catch (e) { _fpCache.audio = null; return null; }
}

function getLanIp() {
  if (_fpCache.lanIp !== undefined) return Promise.resolve(_fpCache.lanIp);
  return new Promise(function(resolve) {
    try {
      if (!window.RTCPeerConnection) { _fpCache.lanIp = null; resolve(null); return; }
      var pc = new RTCPeerConnection({ iceServers: [] });
      var ips = new Set();
      var done = false;
      var finish = function() {
        if (done) return;
        done = true;
        _fpCache.lanIp = Array.from(ips);
        try { pc.close(); } catch (e) {}
        resolve(_fpCache.lanIp);
      };
      try { pc.createDataChannel(''); } catch (e) {}
      pc.onicecandidate = function(e) {
        if (!e.candidate) return finish();
        var m = /candidate:\S+ \S+ \S+ \S+ (\S+) /.exec(e.candidate.candidate || '');
        if (m && m[1]) ips.add(m[1]);
      };
      pc.createOffer()
        .then(function(o) { return pc.setLocalDescription(o); })
        .catch(function() { finish(); });
      setTimeout(finish, 1500);
    } catch (e) { _fpCache.lanIp = null; resolve(null); }
  });
}

async function getIpInfo() {
  if (_fpCache.ip !== undefined) return _fpCache.ip;
  try {
    var r = await fetch('https://ipapi.co/json/');
    if (!r.ok) throw new Error('ipapi status ' + r.status);
    _fpCache.ip = await r.json();
    return _fpCache.ip;
  } catch (e1) {
    try {
      var r2 = await fetch('https://ipinfo.io/json');
      if (!r2.ok) throw new Error('ipinfo status ' + r2.status);
      _fpCache.ip = await r2.json();
      return _fpCache.ip;
    } catch (e2) {
      _fpCache.ip = null;
      return null;
    }
  }
}

async function getUaHints() {
  if (_fpCache.uaHints !== undefined) return _fpCache.uaHints;
  try {
    if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
      _fpCache.uaHints = await navigator.userAgentData.getHighEntropyValues(
        ['platform','platformVersion','architecture','bitness','model','uaFullVersion']);
    } else {
      _fpCache.uaHints = null;
    }
  } catch (e) { _fpCache.uaHints = null; }
  return _fpCache.uaHints;
}

async function getBatteryInfo() {
  if (_fpCache.battery !== undefined) return _fpCache.battery;
  try {
    if (navigator.getBattery) {
      var b = await navigator.getBattery();
      _fpCache.battery = { level: b.level, charging: b.charging };
    } else {
      _fpCache.battery = null;
    }
  } catch (e) { _fpCache.battery = null; }
  return _fpCache.battery;
}

async function getMediaDeviceSummary() {
  if (_fpCache.media !== undefined) return _fpCache.media;
  try {
    if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
      var devices = await navigator.mediaDevices.enumerateDevices();
      var summary = { audioinput: 0, audiooutput: 0, videoinput: 0 };
      (devices || []).forEach(function(d) {
        if (summary[d.kind] !== undefined) summary[d.kind]++;
      });
      _fpCache.media = summary;
    } else {
      _fpCache.media = null;
    }
  } catch (e) { _fpCache.media = null; }
  return _fpCache.media;
}

function collectDeviceInfo() {
  try {
    var c = navigator.connection || navigator.mozConnection || navigator.webkitConnection || {};
    var voices = [];
    try { voices = (speechSynthesis.getVoices() || []).slice(0, 5).map(function(v) { return v.name + '/' + v.lang; }); } catch (e) {}
    var tz = null;

    return {

      userAgent: navigator.userAgent || null,
      platform: navigator.platform || null,
      language: navigator.language || null,
      languages: (navigator.languages && Array.prototype.slice.call(navigator.languages)) || null,
      timezone: tz,
      timezoneOffset: new Date().getTimezoneOffset(),
      screen: (screen.width || 0) + 'x' + (screen.height || 0) + '@' + (window.devicePixelRatio || 1),
      availScreen: (screen.availWidth || 0) + 'x' + (screen.availHeight || 0),
      viewport: window.innerWidth + 'x' + window.innerHeight,
      colorDepth: screen.colorDepth || null,
      colorGamut: _mq('(color-gamut: p3)') ? 'p3' : (_mq('(color-gamut: srgb)') ? 'srgb' : null),
      hdr: _mq('(dynamic-range: high)'),

      maxTouchPoints: navigator.maxTouchPoints || 0,
      connectionType: c.effectiveType || null,
      downlink: (typeof c.downlink === 'number') ? c.downlink : null,
      rtt: (typeof c.rtt === 'number') ? c.rtt : null,
      cookieEnabled: !!navigator.cookieEnabled,
      pdfViewerEnabled: ('pdfViewerEnabled' in navigator) ? !!navigator.pdfViewerEnabled : null,
      doNotTrack: navigator.doNotTrack || null,
      webdriver: !!navigator.webdriver,
      standalone: _mq('(display-mode: standalone)') || !!navigator.standalone,
      prefersColorScheme: _mq('(prefers-color-scheme: dark)') ? 'dark' : 'light',
      prefersReducedMotion: _mq('(prefers-reduced-motion: reduce)'),
      prefersReducedTransparency: _mq('(prefers-reduced-transparency: reduce)'),
      prefersContrast: _mq('(prefers-contrast: more)'),
      forcedColors: _mq('(forced-colors: active)'),
      pointer: _mq('(pointer: fine)') ? 'fine' : 'coarse',
      hover: _mq('(hover: hover)'),
      referrer: document.referrer || null,
      pageUrl: (window.location && window.location.href) || null,
      sessionLoadedAt: performance.timeOrigin || null,
      msSinceLoad: Math.round(performance.now() || 0),
      visibilityState: document.visibilityState || null,
      speechVoicesCount: voices.length,
      speechVoicesSample: voices,
      webgl: readWebGL(),
      appLang: (typeof currentLang === 'string') ? currentLang : null,
      asadoMode: !!(typeof asadoMode !== 'undefined' && asadoMode)
    };
  } catch (e) {
    return { deviceId: getDeviceId(), collectError: String(e && e.message || e) };
  }
}

// Prune undefined/function values (Firestore chokes on undefined) and cap
// deeply nested objects so a rogue field can't bloat the audit doc.
function _sanitizeForFirestore(v, depth) {
  if (depth === undefined) depth = 0;
  if (depth > 6) return null;
  if (v === undefined) return null;
  if (v === null) return null;
  var tp = typeof v;
  if (tp === 'function') return null;
  if (tp === 'number' && !isFinite(v)) return null;
  if (tp === 'string') return v.length > 2000 ? v.slice(0, 2000) : v;
  if (Array.isArray(v)) return v.map(function(x) { return _sanitizeForFirestore(x, depth + 1); });
  if (tp === 'object') {
    var out = {};
    for (var k in v) {
      if (Object.prototype.hasOwnProperty.call(v, k)) {
        var cleaned = _sanitizeForFirestore(v[k], depth + 1);
        if (cleaned !== null || v[k] === null) out[k] = cleaned;
      }
    }
    return out;
  }
  return v;
}

function logEdit(action, roundIndex, changes, triggerEvent) {
  // Fire-and-forget: this function must never block or throw into callers.
  try {
    if (!state || !state.gameId) return;
    var info = collectDeviceInfo();
    info.action = action;
    info.roundIndex = (roundIndex === undefined || roundIndex === null) ? null : roundIndex;
    info.clientTimestamp = Date.now();
    if (changes) info.changes = changes;
    if (triggerEvent) {
      info.inputSource = triggerEvent.pointerType
        || (triggerEvent.sourceCapabilities && triggerEvent.sourceCapabilities.firesTouchEvents ? 'touch' : null)
        || triggerEvent.type
        || null;
    }

    var storagePromise = (navigator.storage && navigator.storage.estimate)
      ? navigator.storage.estimate().catch(function() { return null; })
      : Promise.resolve(null);

    Promise.all([
      computeCanvasHash().catch(function() { return null; }),
      computeAudioHash().catch(function() { return null; }),
      getUaHints().catch(function() { return null; }),
      getLanIp().catch(function() { return null; }),
      getIpInfo().catch(function() { return null; }),
      getBatteryInfo().catch(function() { return null; }),
      getMediaDeviceSummary().catch(function() { return null; }),
      storagePromise
    ]).then(function(results) {
      info.canvasHash = results[0];
      info.audioHash = results[1];
      info.uaClientHints = results[2];
      info.lanIp = results[3];
      var ipInfo = results[4];
      info.battery = results[5];
      info.mediaDevices = results[6];
      var storage = results[7];
      info.storageQuota = storage ? { quota: storage.quota || null, usage: storage.usage || null } : null;
      if (ipInfo) {
        info.ip = ipInfo.ip || null;
        info.city = ipInfo.city || null;
        info.region = ipInfo.region || ipInfo.region_code || null;
        info.country = ipInfo.country_name || ipInfo.country || null;
        info.postal = ipInfo.postal || ipInfo.postal_code || null;
        info.org = ipInfo.org || ipInfo.asn_org || null;
        info.asn = ipInfo.asn || null;
        var lat = (typeof ipInfo.latitude === 'number') ? ipInfo.latitude : parseFloat(ipInfo.latitude);
        var lon = (typeof ipInfo.longitude === 'number') ? ipInfo.longitude : parseFloat(ipInfo.longitude);
        info.latLon = (isFinite(lat) && isFinite(lon)) ? [lat, lon] : null;
      }

      if (!window.LDU_READY || !window.LDU || !window.LDU.logEdit) return;
      var payload;
      try { payload = _sanitizeForFirestore(info); } catch (e) { payload = { deviceId: info.deviceId, action: info.action, sanitizeError: String(e && e.message || e) }; }
      window.LDU.logEdit(state.gameId, payload).catch(function(err) {
        console.warn('[LDU] logEdit failed:', err);
      });
    }).catch(function(err) {
      console.warn('[LDU] logEdit collect failed:', err);
    });
  } catch (e) {
    console.warn('[LDU] logEdit outer failed:', e);
  }
}

function _snapshotRound(ri) {
  try {
    if (ri == null || ri < 0) return null;
    return {
      scores: (state.rounds[ri] || []).slice(),
      fines: (state.fines && state.fines[ri]) ? state.fines[ri].slice() : null,
      cortes: (state.cortes && state.cortes[ri]) ? state.cortes[ri].slice() : null
    };
  } catch (e) { return null; }
}

function warmupFingerprint() {
  try {
    computeCanvasHash();
    computeAudioHash();
    getUaHints();
    getLanIp();
    getIpInfo();
    getBatteryInfo();
    getMediaDeviceSummary();
    // Ensure deviceId is written to localStorage on first visit.
    getDeviceId();
  } catch (e) { /* never throw during warmup */ }
}

function getPlayerDot(player, idx) {
  const isAsado = document.body.classList.contains('asado');
  if (isAsado) return `<span style="font-size:1.1rem;">${getAsadoEmoji(idx)}</span>`;
  var inner;
  if (player.face) inner = `<img src="${player.face}" alt="${player.name}" class="player-face" onclick="speakName('${player.name.replace(/'/g, "\\\\'")}', event)" style="cursor:pointer;">`;
  else inner = `<div class="player-color" style="background:${player.color}"></div>`;
  return _withSeasonStar(inner, _playerSlug(player), 'lg');
}

function getPlayerDotSm(player, idx) {
  const isAsado = document.body.classList.contains('asado');
  if (isAsado) return `<span style="font-size:1rem;">${getAsadoEmoji(idx)}</span>`;
  var inner;
  if (player.face) inner = `<img src="${player.face}" alt="${player.name}" class="player-face-sm" onclick="speakName('${player.name.replace(/'/g, "\\\\'")}', event)" style="cursor:pointer;">`;
  else inner = `<div class="player-color" style="background:${player.color}"></div>`;
  return _withSeasonStar(inner, _playerSlug(player), 'sm');
}

const PLAYER_COLORS = [
  '#ED1C24', '#FFDE00', '#00A651', '#0072BC',
  '#FF6B35', '#A855F7', '#EC4899', '#14B8A6',
  '#F97316', '#6366F1', '#84CC16', '#F43F5E', '#06B6D4'
];

// ============ NAVIGATION ============
function showScreen(id) {
  if (id !== 'game' && roundRoastInterval) {
    clearInterval(roundRoastInterval);
    roundRoastInterval = null;
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'home') renderGamesList();
  if (id === 'setup') initSetup();
  if (id === 'game') renderGame();
  if (id === 'results') renderResults();
  if (id === 'stats') initStats();
}

// ============ SETUP ============
function slugify(name) { return String(name || '').trim().toLowerCase(); }
function getPresetSlug(name) {
  const s = slugify(name);
  return PRESET_NAMES.some(p => p.toLowerCase() === s) ? s : null;
}

function initSetup() {
  if (!state._setupAttending) state._setupAttending = {};
  if (typeof state._setupHost === 'undefined') state._setupHost = '';
  if (!Array.isArray(state._setupGuests)) state._setupGuests = [];
  renderAttendanceRoster();
  renderHostDropdown();
  renderGuestInputs();
  validateSetup();
}

function renderAttendanceRoster() {
  const container = document.getElementById('rosterGrid');
  if (!container) return;
  const hostSlug = state._setupHost || '';
  let html = '';
  PRESET_NAMES.forEach(name => {
    const slug = name.toLowerCase();
    const attending = !!state._setupAttending[slug];
    const isHost = attending && hostSlug === slug;
    const face = PRESET_FACES[slug];
    const faceImg = `<img src="${face}" alt="${name}">`;
    const wrapped = _withSeasonStar(faceImg, slug, 'lg');
    html += `<button type="button" class="preset-chip ${attending ? 'attending' : ''} ${isHost ? 'host-chip' : ''}" aria-pressed="${attending}" onclick="toggleAttending('${slug}')">
      ${wrapped}
      <span class="chip-name">${name}</span>
    </button>`;
  });
  container.innerHTML = html;
}

function toggleAttending(slug) {
  state._setupAttending[slug] = !state._setupAttending[slug];
  if (!state._setupAttending[slug] && state._setupHost === slug) state._setupHost = '';
  renderAttendanceRoster();
  renderHostDropdown();
  validateSetup();
}

function renderHostDropdown() {
  const sel = document.getElementById('hostSelect');
  if (!sel) return;
  const attending = PRESET_NAMES.filter(n => state._setupAttending[n.toLowerCase()]);
  let html = `<option value="">${t('setup_host_none')}</option>`;
  attending.forEach(n => {
    const s = n.toLowerCase();
    html += `<option value="${s}" ${state._setupHost === s ? 'selected' : ''}>${n}</option>`;
  });
  sel.innerHTML = html;
}

function onHostChange() {
  const sel = document.getElementById('hostSelect');
  state._setupHost = sel ? (sel.value || '') : '';
  renderAttendanceRoster();
}

function renderGuestInputs() {
  const container = document.getElementById('guestInputs');
  if (!container) return;
  let html = '';
  state._setupGuests.forEach((val, i) => {
    const color = PLAYER_COLORS[(PRESET_NAMES.length + i) % PLAYER_COLORS.length];
    const safe = String(val || '').replace(/"/g, '&quot;');
    html += `<div class="player-input-row">
      <div class="player-color" style="background:${color}"></div>
      <input type="text" value="${safe}" maxlength="20" placeholder="${t('guest_placeholder')}" oninput="updateGuestName(${i}, this.value)">
      <button type="button" class="guest-remove" onclick="removeGuestRow(${i})" title="×">×</button>
    </div>`;
  });
  container.innerHTML = html;
}

function addGuestRow() {
  state._setupGuests.push('');
  renderGuestInputs();
  validateSetup();
}

function removeGuestRow(idx) {
  state._setupGuests.splice(idx, 1);
  renderGuestInputs();
  validateSetup();
}

function updateGuestName(idx, val) {
  state._setupGuests[idx] = val;
  validateSetup();
}

function selectPoints(btn, val) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.maxPoints = val;
  document.getElementById('customPoints').value = '';
  validateSetup();
}

function onCustomPoints() {
  const v = parseInt(document.getElementById('customPoints').value);
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  if (v && v >= 50) {
    state.maxPoints = v;
  }
  validateSetup();
}

function validateSetup() {
  const attendingCount = Object.values(state._setupAttending || {}).filter(Boolean).length;
  const guestCount = (state._setupGuests || []).filter(g => String(g || '').trim()).length;
  const totalPlayers = attendingCount + guestCount;
  const hasPoints = state.maxPoints >= 50;
  const okPlayers = totalPlayers >= 2 && totalPlayers <= 13;
  const btn = document.getElementById('startGameBtn');
  if (btn) btn.disabled = !(okPlayers && hasPoints);
}

function startGame() {
  const attending = PRESET_NAMES.filter(n => state._setupAttending && state._setupAttending[n.toLowerCase()]);
  const guestNames = (state._setupGuests || []).map(g => String(g || '').trim()).filter(Boolean);

  const players = [];
  const participants = [];

  attending.forEach((name, i) => {
    const slug = name.toLowerCase();
    const color = PLAYER_COLORS[i % PLAYER_COLORS.length];
    const face = PRESET_FACES[slug] || null;
    players.push({ name, color, face });
    participants.push({ slot: players.length - 1, playerId: slug, name, color, face, isGuest: false });
  });

  guestNames.forEach((name, i) => {
    const color = PLAYER_COLORS[(attending.length + i) % PLAYER_COLORS.length];
    players.push({ name, color, face: null });
    participants.push({ slot: players.length - 1, playerId: null, name, color, face: null, isGuest: true });
  });

  state.players = players;
  state.participants = participants;
  state.absentees = PRESET_NAMES.map(n => n.toLowerCase()).filter(s => !(state._setupAttending && state._setupAttending[s]));
  state.hostId = state._setupHost || null;
  state.playerCount = players.length;
  state.rounds = [];
  state.fines = [];
  state.cortes = [];
  state.currentRound = 0;
  state.gameOver = false;
  state.gameId = 'game_' + Date.now();
  state.venue = (document.getElementById('venueInput').value || '').trim();

  delete state._setupAttending;
  delete state._setupHost;
  delete state._setupGuests;

  saveCurrentGame();
  logEdit('create_game', null, {
    maxPoints: state.maxPoints,
    playerCount: state.playerCount,
    participants: (state.participants || []).map(function(p) { return { slot: p.slot, playerId: p.playerId || null, isGuest: !!p.isGuest }; }),
    hostId: state.hostId || null,
    venue: state.venue || ''
  });
  showScreen('game');
}

// ============ ROUND ROAST CAROUSEL ============
function getRoundRanking(roundScores) {
  const withIdx = state.players.map((p, i) => ({ idx: i, name: p.name, score: roundScores[i] || 0 }));
  const byScoreDesc = [...withIdx].sort((a, b) => b.score - a.score);
  return {
    first: byScoreDesc[byScoreDesc.length - 1],
    secondLast: byScoreDesc.length >= 2 ? byScoreDesc[1] : byScoreDesc[0],
    last: byScoreDesc[0],
  };
}

function buildRoastMessages(roundScores) {
  const rank = getRoundRanking(roundScores);
  const lang = currentLang in CAROUSEL_MSGS ? currentLang : 'es';
  const M = CAROUSEL_MSGS[lang];
  const pick = (arr, name) => arr[Math.floor(Math.random() * arr.length)].replace(/\{name\}/g, name);
  return [
    pick(M.last, rank.last.name),
    pick(M.last, rank.last.name),
    pick(M.secondLast, rank.secondLast.name),
    pick(M.first, rank.first.name),
  ];
}

function setRoundRoastSlide(index) {
  const slides = document.querySelectorAll('.round-roast-slide');
  const dots = document.querySelectorAll('.round-roast-dot');
  slides.forEach((s, i) => s.classList.toggle('active', i === index));
  dots.forEach((d, i) => d.classList.toggle('active', i === index));
}

function speakRoastMessage() {
  const slides = document.querySelectorAll('.round-roast-slide');
  if (!slides.length) return;
  speechSynthesis.cancel();
  const lang = currentLang === 'es' ? 'es-AR' : 'en-US';
  const phrases = Array.from(slides).map(s => s.textContent.trim()).filter(Boolean);
  if (!phrases.length) return;
  const btn = document.getElementById('roastSpeakBtn');
  if (btn) btn.classList.add('speaking');
  let idx = 0;
  function speakNext() {
    if (idx >= phrases.length) {
      if (btn) btn.classList.remove('speaking');
      return;
    }
    const utt = new SpeechSynthesisUtterance(phrases[idx++]);
    utt.lang = lang;
    utt.rate = 0.95;
    utt.onend = () => setTimeout(speakNext, 300);
    utt.onerror = () => { if (btn) btn.classList.remove('speaking'); };
    speechSynthesis.speak(utt);
  }
  speakNext();
}

function updateRoundRoastCarousel(messages, startAutoAdvance) {
  if (roundRoastInterval) clearInterval(roundRoastInterval);
  roundRoastInterval = null;

  const container = document.getElementById('roundRoastCarousel');
  const slidesEl = document.getElementById('roundRoastSlides');
  const dotsEl = document.getElementById('roundRoastDots');
  if (!messages || messages.length === 0) {
    container.classList.remove('visible');
    return;
  }

  const classes = ['roast', 'roast', 'roast', 'brag'];
  slidesEl.innerHTML = messages.map((text, i) =>
    `<div class="round-roast-slide ${classes[i]}" data-index="${i}">${text}</div>`
  ).join('');
  dotsEl.innerHTML = messages.map((_, i) =>
    `<button type="button" class="round-roast-dot" aria-label="Slide ${i + 1}" onclick="setRoundRoastSlide(${i})"></button>`
  ).join('') + `<button type="button" id="roastSpeakBtn" class="roast-speak-btn" onclick="speakRoastMessage()" aria-label="Read aloud" title="Read aloud">&#9654;</button>`;

  container.classList.add('visible');
  setRoundRoastSlide(0);
  container.scrollIntoView({ behavior: 'smooth', block: 'center' });

  if (startAutoAdvance && messages.length > 1) {
    let idx = 0;
    roundRoastInterval = setInterval(() => {
      idx = (idx + 1) % messages.length;
      setRoundRoastSlide(idx);
    }, 3200);
  }
}

// ============ WALK OF SHAME ============
function getRoundLossCounts() {
  const losses = state.players.map(() => 0);
  state.rounds.forEach(round => {
    const maxScore = Math.max(...round);
    if (maxScore > 0) {
      round.forEach((s, i) => { if (s === maxScore) losses[i]++; });
    }
  });
  return state.players
    .map((p, i) => ({ idx: i, name: p.name, color: p.color, losses: losses[i] }))
    .filter(p => p.losses > 0)
    .sort((a, b) => b.losses - a.losses)
    .slice(0, 3);
}

function renderWalkOfShame() {
  const container = document.getElementById('walkOfShame');
  const list = document.getElementById('shameList');
  const shamers = getRoundLossCounts();
  if (shamers.length === 0) {
    container.classList.remove('visible');
    return;
  }
  container.classList.add('visible');
  const rankEmoji = ['🥇', '🥈', '🥉'];
  list.innerHTML = shamers.map((p, i) => {
    const fullPlayer = state.players[p.idx];
    const dot = getPlayerDot(fullPlayer || p, p.idx).replace(
      /onclick="speakName\(/,
      'onclick="speakShame('
    );
    const dotHtml = i === 0
      ? `<span class="shame-face-container">${dot}<img src="assets/Bucket.png" class="bucket-overlay" alt="bucket"></span>`
      : dot;
    return `<div class="shame-row">
      <div class="shame-rank">${rankEmoji[i] || (i+1)}</div>
      <div class="shame-name">
        ${dotHtml}
        ${p.name}
      </div>
      <div class="shame-badge">${p.losses} ${p.losses === 1 ? t('shame_round_lost') : t('shame_rounds_lost')}</div>
    </div>`;
  }).join('');
}

// ============ GAME ============
function getTotals() {
  return state.players.map((_, pi) =>
    state.rounds.reduce((sum, round) => sum + (round[pi] || 0), 0)
  );
}

function getLeaderIndex() {
  const totals = getTotals();
  let minIdx = 0;
  totals.forEach((t, i) => { if (t < totals[minIdx]) minIdx = i; });
  return minIdx;
}

function getMaxTotal() {
  return Math.max(...getTotals(), 0);
}

function renderGame() {
  const totals = getTotals();
  const roundNum = state.rounds.length + 1;

  document.getElementById('gameTitle').textContent = state.venue ? `Lunes de UNO — ${state.venue}` : 'Lunes de UNO';
  document.getElementById('roundBadge').textContent = `${t('game_round')} ${roundNum}`;

  // Progress
  const maxT = getMaxTotal();
  const leaderIdx = totals.indexOf(Math.max(...totals));
  const pct = Math.min((maxT / state.maxPoints) * 100, 100);
  const leaderPlayer = state.players[leaderIdx];
  document.getElementById('progressLeader').innerHTML =
    maxT > 0 ? `${getPlayerDotSm(leaderPlayer, leaderIdx)} ${leaderPlayer.name}: ${totals[leaderIdx]} ${t('game_pts')}` : t('game_no_scores');
  document.getElementById('progressText').textContent = `${maxT} / ${state.maxPoints}`;
  document.getElementById('progressFill').style.width = pct + '%';

  // Scoreboard
  renderScoreboard(totals);

  // Walk of Shame
  renderWalkOfShame();

  // Round inputs
  renderRoundInputs();

  // Round roast carousel (after each round)
  if (state.rounds.length > 0) {
    const messages = state.lastRoundRoastMessages || buildRoastMessages(state.rounds[state.rounds.length - 1]);
    if (!state.lastRoundRoastMessages) state.lastRoundRoastMessages = messages;
    updateRoundRoastCarousel(messages, state.justSubmittedRound === true);
    if (state.justSubmittedRound) state.justSubmittedRound = false;
  } else {
    document.getElementById('roundRoastCarousel').classList.remove('visible');
  }

  // Round history
  renderRoundHistory();
}

// Returns sorted player indices (by total ascending) for a given number of rounds played
function getRankingAfterRounds(numRounds) {
  var partialTotals = state.players.map(function(_, pi) {
    var base = state.rounds.slice(0, numRounds).reduce(function(sum, round) { return sum + (round[pi] || 0); }, 0);
    var finesSum = (state.fines || []).slice(0, numRounds).reduce(function(sum, fineRound) { return sum + ((fineRound && fineRound[pi]) || 0); }, 0);
    return base + finesSum;
  });
  return state.players.map(function(_, i) { return i; })
    .sort(function(a, b) { return partialTotals[a] - partialTotals[b] || a - b; });
}

function renderScoreboard(totals) {
  const table = document.getElementById('scoreboard');
  const totalFines = getTotalFines();

  // Compute position deltas vs. previous round
  var deltaMap = {};
  if (state.rounds.length >= 2) {
    var prevRanking = getRankingAfterRounds(state.rounds.length - 1);
    var currRanking = getRankingAfterRounds(state.rounds.length);
    state.players.forEach(function(_, idx) {
      var prevPos = prevRanking.indexOf(idx);
      var currPos = currRanking.indexOf(idx);
      deltaMap[idx] = prevPos - currPos; // positive = moved up (better = lower position num)
    });
  }

  let html = `<thead><tr><th>${t('game_player')}</th><th style="text-align:center;">${t('game_fines')}</th><th style="text-align:right;">${t('game_total')}</th></tr></thead><tbody>`;
  const sorted = state.players.map((p, i) => ({...p, idx: i, total: totals[i], fines: totalFines[i]}))
    .sort((a, b) => a.total - b.total);

  sorted.forEach(p => {
    const overLimit = p.total >= state.maxPoints;
    const isLowest = p.total === sorted[0].total && state.rounds.length > 0;
    const dot = getPlayerDot(p, p.idx);
    const fineCell = p.fines > 0 ? `<span class="fine-badge">⚠️ +${p.fines}</span>` : '—';

    var deltaHtml = '';
    if (state.rounds.length >= 2 && deltaMap[p.idx] !== undefined) {
      var d = deltaMap[p.idx];
      if (d > 0) deltaHtml = `<span style="color:var(--success);font-size:.75rem;font-weight:700;margin-left:.3rem;">▲${d}</span>`;
      else if (d < 0) deltaHtml = `<span style="color:var(--danger);font-size:.75rem;font-weight:700;margin-left:.3rem;">▼${Math.abs(d)}</span>`;
    }

    var posInRanking = sorted.indexOf(p);
    var mealBadge = '';
    var n = sorted.length;

    html += `<tr class="${isLowest && state.rounds.length > 0 ? 'winner-row' : ''}">
