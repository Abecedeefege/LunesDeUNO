function saveCurrentGame() {
  if (!state.gameId) return;
  var games = loadGames();
  var existing = games.find(function(g) { return g.id === state.gameId; });

  // Compute winner info when game is over
  var winnerSlot = null;
  var winnerPlayerId = null;
  if (state.gameOver && state.players && state.players.length) {
    var finalTotals = getFinalTotals();
    winnerSlot = 0;
    for (var i = 1; i < finalTotals.length; i++) {
      if (finalTotals[i] < finalTotals[winnerSlot]) winnerSlot = i;
    }
    var winnerParticipant = (state.participants || [])[winnerSlot];
    winnerPlayerId = winnerParticipant ? winnerParticipant.playerId : null;
  }

  // Preserve first finalization timestamp across saves
  var priorFinishedAt = existing ? existing.finishedAt : null;
  var finishedAt = state.gameOver ? (priorFinishedAt || Date.now()) : null;

  var entry = {
    id: state.gameId,
    timestamp: parseInt(state.gameId.replace('game_', ''), 10) || Date.now(),
    finishedAt: finishedAt,
    winnerSlot: winnerSlot,
    winnerPlayerId: winnerPlayerId,
    seasonId: existing ? (existing.seasonId || null) : null,
    state: {
      playerCount: state.playerCount,
      maxPoints: state.maxPoints,
      players: state.players,
      rounds: state.rounds,
      currentRound: state.currentRound,
      gameOver: state.gameOver,
      gameId: state.gameId,
      fines: state.fines || [],
      cortes: state.cortes || [],
      participants: state.participants || [],
      absentees: state.absentees || [],
      hostId: state.hostId || null,
      venue: state.venue || ''
    },
    finished: !!state.gameOver
  };
  var idx = games.findIndex(function(g) { return g.id === state.gameId; });
  if (idx >= 0) { games[idx] = entry; } else { games.push(entry); }
  saveGames(games);

  // Dual-write to Firestore (fire-and-forget)
  if (window.LDU_READY && window.LDU && window.LDU.saveGame) {
    window.LDU.saveGame(entry).then(function() {
      // If this save just finalized the game, attempt to compute the season
      if (state.gameOver && typeof maybeComputeSeason === 'function') {
        var wasFinalized = priorFinishedAt && existing && existing.finished;
        if (!wasFinalized) maybeComputeSeason();
      }
    }).catch(function(err) { console.warn('[LDU] saveGame failed:', err); });
  }
}

function formatTimestamp(ts) {
  var d = new Date(ts);
  var days = currentLang === 'es'
    ? ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']
    : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months = currentLang === 'es'
    ? ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']
    : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var hh = String(d.getHours()).padStart(2, '0');
  var mm = String(d.getMinutes()).padStart(2, '0');
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()] + ', ' + hh + ':' + mm;
}

function renderGamesList() {
  var container = document.getElementById('gamesList');
  var games = loadGames();
  if (games.length === 0) { container.innerHTML = ''; return; }
  games.sort(function(a, b) { return b.timestamp - a.timestamp; });
  var html = '<div class="games-list"><h3>' + t('games_title') + '</h3>';
  games.forEach(function(g) {
    var s = g.state;
    var names = s.players.map(function(p) { return p.name; });
    var totals = s.players.map(function(_, pi) {
      return s.rounds.reduce(function(sum, round) { return sum + (round[pi] || 0); }, 0);
    });
    var scoresStr = totals.join('-');
    var title;
    var venueStr = s.venue ? ' · 📍 ' + s.venue : '';
    if (g.finished) {
      var minIdx = 0;
      totals.forEach(function(t, i) { if (t < totals[minIdx]) minIdx = i; });
      title = '🏆 ' + names[minIdx] + ' ' + t('games_won') + ' | ' + scoresStr + ' | ' + t('games_limit') + ': ' + s.maxPoints + venueStr;
    } else {
      title = '📋 ' + names.join(', ') + ' | ' + scoresStr + ' | ' + t('games_limit') + ': ' + s.maxPoints + venueStr;
    }
    var btnLabel = g.finished ? t('games_view') : t('games_resume');
    var btnAction = g.finished
      ? 'resumeGame(\'' + g.id + '\')'
      : 'resumeGame(\'' + g.id + '\')';
    html += '<div class="game-item">' +
      '<div class="game-item-info">' +
        '<div class="game-item-title">' + title + '</div>' +
        '<div class="game-item-meta">' + formatTimestamp(g.timestamp) + '</div>' +
      '</div>' +
      '<div class="game-item-actions">' +
        '<button class="btn btn-secondary btn-small" onclick="' + btnAction + '">' + btnLabel + '</button>' +
        '<button class="btn btn-secondary btn-small" style="color:var(--danger);" onclick="deleteGame(\'' + g.id + '\')">' + t('games_delete') + '</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function resumeGame(gameId) {
  var games = loadGames();
  var g = games.find(function(g) { return g.id === gameId; });
  if (!g) return;
  state.playerCount = g.state.playerCount;
  state.maxPoints = g.state.maxPoints;
  state.players = g.state.players;
  state.rounds = g.state.rounds;
  state.currentRound = g.state.currentRound;
  state.gameOver = g.state.gameOver;
  state.gameId = g.state.gameId;
  state.fines = g.state.fines || [];
  state.cortes = (g.state.cortes && g.state.cortes.length) ? g.state.cortes : (g.state.rounds || []).map(function(r) { return (r || []).map(function() { return false; }); });
  state.participants = g.state.participants || [];
  state.absentees = g.state.absentees || [];
  state.hostId = g.state.hostId || null;
  state.venue = g.state.venue || '';
  if (g.finished) {
    showScreen('results');
  } else {
    showScreen('game');
  }
}

function deleteGame(gameId) {
  if (!confirm(t('games_confirm_delete'))) return;
  var games = loadGames();
  games = games.filter(function(g) { return g.id !== gameId; });
  saveGames(games);
  if (window.LDU_READY && window.LDU && window.LDU.deleteGame) {
    window.LDU.deleteGame(gameId).catch(function(err) { console.warn('[LDU] deleteGame failed:', err); });
  }
  renderGamesList();
}

// Merge remote Firestore games into local list (one-way sync into localStorage)
function syncRemoteGamesToLocal() {
  if (!window.LDU_READY || !window.LDU || !window.LDU.getAllGames) return Promise.resolve();
  return window.LDU.getAllGames().then(function(remoteGames) {
    if (!remoteGames || !remoteGames.length) return;
    var local = loadGames();
    var byId = {};
    local.forEach(function(g) { byId[g.id] = g; });
    remoteGames.forEach(function(r) {
      var entry = {
        id: r.gameId,
        timestamp: r.createdAt && r.createdAt.toMillis ? r.createdAt.toMillis() : Date.now(),
        finishedAt: r.finishedAt && r.finishedAt.toMillis ? r.finishedAt.toMillis() : null,
        winnerSlot: (typeof r.winnerSlot === 'number') ? r.winnerSlot : null,
        winnerPlayerId: r.winnerPlayerId || null,
        seasonId: r.seasonId || null,
        state: {
          playerCount: (r.participants || []).length,
          maxPoints: r.maxPoints || 0,
          players: (r.participants || []).map(function(p) { return { name: p.name, color: p.color, face: p.face }; }),
          rounds: r.rounds || [],
          currentRound: (r.rounds || []).length,
          gameOver: !!r.finished,
          gameId: r.gameId,
          fines: r.fines || [],
          cortes: r.cortes || [],
          participants: r.participants || [],
          absentees: r.absentees || [],
          hostId: r.hostId || null,
          venue: r.venue || ''
        },
        finished: !!r.finished
      };
      byId[entry.id] = entry;
    });
    var merged = Object.values(byId);
    saveGames(merged);
  }).catch(function(err) { console.warn('[LDU] syncRemoteGamesToLocal failed:', err); });
}

// Compute per-slot final score for a remote-shape game doc.
function computeGameFinalScore(gameDoc, slot) {
  var rounds = gameDoc.rounds || [];
  var fines = gameDoc.fines || [];
  var cortes = gameDoc.cortes || [];
  var base = rounds.reduce(function(sum, r) { return sum + ((r && r[slot]) || 0); }, 0);
  var f = fines.reduce(function(sum, r) { return sum + ((r && r[slot]) || 0); }, 0);
  var c = cortes.reduce(function(sum, r) { return sum + ((r && r[slot]) ? -50 : 0); }, 0);
  return base + f + c;
}

// Runs after a game is finalized. If the finished-games count is a multiple of 4,
// creates a season doc for the most recent 4 games (idempotent).
function maybeComputeSeason() {
  if (!window.LDU_READY || !window.LDU || !window.LDU.getAllFinishedGames) return Promise.resolve();
  return window.LDU.getAllFinishedGames().then(function(games) {
    if (!games || !games.length || (games.length % 4 !== 0)) return;
    var seasonNumber = games.length / 4;
    return window.LDU.getSeason(seasonNumber).then(function(existing) {
      if (existing) return;
      var fourGames = games.slice(-4);

      // Track which preset playerIds appeared in each of the 4 games.
      var presence = {}; // slug -> number of games participated in
      var perPlayerScores = {}; // slug -> total score across participated games
      fourGames.forEach(function(g) {
        (g.participants || []).forEach(function(p) {
          if (!p.playerId) return; // skip guests
          presence[p.playerId] = (presence[p.playerId] || 0) + 1;
          perPlayerScores[p.playerId] = (perPlayerScores[p.playerId] || 0) + computeGameFinalScore(g, p.slot);
        });
      });

      var participantIds = Object.keys(presence);
      var eligible = participantIds.filter(function(id) { return presence[id] === 4; });
      var winnerPlayerId = null;
      if (eligible.length) {
        winnerPlayerId = eligible.reduce(function(best, id) {
          if (best === null) return id;
          if (perPlayerScores[id] < perPlayerScores[best]) return id;
          if (perPlayerScores[id] === perPlayerScores[best] && id < best) return id;
          return best;
        }, null);
      }
      var losers = participantIds.filter(function(id) { return id !== winnerPlayerId; });

      var startedAt = fourGames[0].finishedAt || null;
      var endedAt = fourGames[3].finishedAt || null;

      var seasonDoc = {
        seasonNumber: seasonNumber,
        gameIds: fourGames.map(function(g) { return g.gameId; }),
        startedAt: startedAt,
        endedAt: endedAt,
        participantIds: participantIds,
        perPlayerScores: perPlayerScores,
        winnerPlayerId: winnerPlayerId,
        losers: losers
      };

      return window.LDU.writeSeason(seasonDoc).then(function() {
        // Stamp each game with its seasonId
        var updates = fourGames.map(function(g) { return window.LDU.updateGameSeason(g.gameId, seasonNumber); });
        return Promise.all(updates);
      });
    });
  }).catch(function(err) { console.warn('[LDU] maybeComputeSeason failed:', err); });
}

  // Prefer Firestore. Fall back to whatever is in localStorage.
  var gamesPromise;
  if (window.LDU_READY && window.LDU && window.LDU.getAllFinishedGames) {
    gamesPromise = window.LDU.getAllFinishedGames().then(function(remoteGames) {
      return (remoteGames || []).map(function(r) {
        return {
          gameId: r.gameId,
          finishedAt: r.finishedAt && r.finishedAt.toMillis ? r.finishedAt.toMillis() : (r.finishedAt || 0),
          maxPoints: r.maxPoints || 0,
          venue: r.venue || '',
          hostId: r.hostId || null,
          participants: r.participants || [],
          absentees: r.absentees || [],
          rounds: r.rounds || [],
          fines: r.fines || [],
          cortes: r.cortes || [],
          winnerSlot: (typeof r.winnerSlot === 'number') ? r.winnerSlot : null,
          winnerPlayerId: r.winnerPlayerId || null,
          seasonId: r.seasonId || null,
          finished: true
        };
      });
    });
  } else {
    // Fallback: localStorage finished games
    var local = loadGames().filter(function(g) { return g.finished; });
    local.sort(function(a, b) { return (a.finishedAt || a.timestamp) - (b.finishedAt || b.timestamp); });
    var mapped = local.map(function(g) {
      var s = g.state || {};
      return {
        gameId: g.id,
        finishedAt: g.finishedAt || g.timestamp || 0,
        maxPoints: s.maxPoints || 0,
        venue: s.venue || '',
        hostId: s.hostId || null,
        participants: s.participants || [],
        absentees: s.absentees || [],
        rounds: s.rounds || [],
        fines: s.fines || [],
        cortes: s.cortes || [],
        winnerSlot: (typeof g.winnerSlot === 'number') ? g.winnerSlot : null,
        winnerPlayerId: g.winnerPlayerId || null,
        seasonId: g.seasonId || null,
        finished: true
      };
    });
    gamesPromise = Promise.resolve(mapped);
  }

  var seasonsPromise = (window.LDU_READY && window.LDU && window.LDU.getSeasons)
    ? window.LDU.getSeasons().catch(function() { return []; })
    : Promise.resolve([]);

  return Promise.all([gamesPromise, seasonsPromise]).then(function(results) {
    _statsData.games = results[0] || [];
    _statsData.seasons = results[1] || [];
    _statsData.loaded = true;
  });
}

// ---------- computeAllStats ----------
function _emptyPlayerStats(slug) {
  return {
    slug: slug,
    gamesPlayed: 0,
    gamesWon: 0,
    gamesLost: 0,
    roundsPlayed: 0,
    roundsWon: 0,
    roundsLost: 0,
    totalScore: 0,
    scoreSumRound: 0,
    highestRoundScore: 0,
    lowestGameScore: null,
    worstGameScore: 0,
    absences: 0,
    timesHosted: 0,
    wonWhileHosting: 0,
    perfectRounds: 0,
    totalMultas: 0,
    totalCortes: 0,
    seasonsWon: 0,
    seasonsLost: 0,
    positionDist: {},
    sumPosition: 0,
    fastestWin: null,
    longestGame: 0,
    biggestComeback: 0,
    closestLoss: null,
    unfinished: 0,
    netVsAvg: 0,
    venueStats: {},
    dayStats: {},
    gameResults: [],      // chronological [{won, finishedAt, gameId}]
    h2h: {}               // otherSlug -> {wins, losses, together}
  };
}

function computeAllStats(games, seasons) {
  var presetSlugs = PRESET_NAMES.map(function(n) { return n.toLowerCase(); });
  var byPlayer = {};
  presetSlugs.forEach(function(s) { byPlayer[s] = _emptyPlayerStats(s); });

  // Chronological order
  var sorted = games.slice().sort(function(a, b) { return (a.finishedAt || 0) - (b.finishedAt || 0); });

  sorted.forEach(function(g) {
    var participants = g.participants || [];
    var numPlayers = participants.length;
    if (!numPlayers) return;

    // Final score per slot
    var finalScores = participants.map(function(_, slot) { return computeGameFinalScore(g, slot); });
    // Positions: 1 = lowest final score
    var ordered = finalScores.map(function(v, i) { return { slot: i, score: v }; }).sort(function(a, b) { return a.score - b.score; });
    var positionBySlot = {};
    ordered.forEach(function(o, i) { positionBySlot[o.slot] = i + 1; });

    // Round-level wins/losses per slot
    var numRounds = (g.rounds || []).length;
    var roundWinsBySlot = {};
    var roundLossesBySlot = {};
    (g.rounds || []).forEach(function(round) {
      if (!round || !round.length) return;
      var minVal = Math.min.apply(null, round);
      var maxVal = Math.max.apply(null, round);
      round.forEach(function(s, slot) {
        if (s === minVal) roundWinsBySlot[slot] = (roundWinsBySlot[slot] || 0) + 1;
        if (s === maxVal && maxVal > 0) roundLossesBySlot[slot] = (roundLossesBySlot[slot] || 0) + 1;
      });
    });

    // Running totals for comeback calc
    var runningTotals = participants.map(function() { return 0; });
    var comebackBestBySlot = participants.map(function() { return 0; });
    (g.rounds || []).forEach(function(round, ri) {
      round.forEach(function(s, slot) { runningTotals[slot] += (s || 0); });
      // After this round, for each slot, compute deficit vs leader
      participants.forEach(function(_, slot) {
        var bestOpp = -Infinity;
        participants.forEach(function(_, other) {
          if (other !== slot && -runningTotals[other] > bestOpp) bestOpp = -runningTotals[other];
        });
        // Deficit = opponent_min_total - this_total? UNO: low = good. Deficit = this_total - opponent_best (lowest). If positive, we're behind.
        var oppMin = Infinity;
        participants.forEach(function(_, other) {
          if (other !== slot && runningTotals[other] < oppMin) oppMin = runningTotals[other];
        });
        if (oppMin === Infinity) return;
        var deficit = runningTotals[slot] - oppMin;
        if (deficit > comebackBestBySlot[slot]) comebackBestBySlot[slot] = deficit;
      });
    });

    var finishedAt = g.finishedAt || 0;
    var dayOfWeek = finishedAt ? new Date(finishedAt).getDay() : -1;

    // Per-participant updates
    participants.forEach(function(p, slot) {
      if (!p.playerId || !byPlayer[p.playerId]) return; // skip guests
      var ps = byPlayer[p.playerId];
      ps.gamesPlayed++;
      ps.roundsPlayed += numRounds;
      ps.totalScore += finalScores[slot];
      ps.roundsWon += roundWinsBySlot[slot] || 0;
      ps.roundsLost += roundLossesBySlot[slot] || 0;

      // Round-level aggregates
      (g.rounds || []).forEach(function(round) {
        var s = (round && round[slot]) || 0;
        ps.scoreSumRound += s;
        if (s > ps.highestRoundScore) ps.highestRoundScore = s;
        if (s === 0) ps.perfectRounds++;
      });
      (g.fines || []).forEach(function(round) { ps.totalMultas += (round && round[slot]) || 0; });
      (g.cortes || []).forEach(function(round) { if (round && round[slot]) ps.totalCortes++; });

      // Game-level aggregates
      if (ps.lowestGameScore === null || finalScores[slot] < ps.lowestGameScore) ps.lowestGameScore = finalScores[slot];
      if (finalScores[slot] > ps.worstGameScore) ps.worstGameScore = finalScores[slot];
      if (numRounds > ps.longestGame) ps.longestGame = numRounds;

      var pos = positionBySlot[slot];
      ps.sumPosition += pos;
      var posKey = (pos === numPlayers) ? 'last' : String(pos);
      ps.positionDist[posKey] = (ps.positionDist[posKey] || 0) + 1;

      var isWin = (g.winnerPlayerId === p.playerId);
      var isLoss = !isWin;
      if (isWin) {
        ps.gamesWon++;
        if (ps.fastestWin === null || numRounds < ps.fastestWin) ps.fastestWin = numRounds;
        if (comebackBestBySlot[slot] > ps.biggestComeback) ps.biggestComeback = comebackBestBySlot[slot];
      } else {
        ps.gamesLost++;
        if (pos === 2) {
          var winnerScore = ordered[0].score;
          var diff = finalScores[slot] - winnerScore;
          if (ps.closestLoss === null || diff < ps.closestLoss) ps.closestLoss = diff;
        }
      }
      ps.gameResults.push({ won: isWin, finishedAt: finishedAt, gameId: g.gameId });

      // Net vs group average (this player - avg of others)
      var othersTotal = 0, othersCount = 0;
      finalScores.forEach(function(fs, i) { if (i !== slot) { othersTotal += fs; othersCount++; } });
      var othersAvg = othersCount ? (othersTotal / othersCount) : 0;
      ps.netVsAvg += (finalScores[slot] - othersAvg);

      // Per-venue
      if (g.venue) {
        var v = g.venue;
        if (!ps.venueStats[v]) ps.venueStats[v] = { games: 0, wins: 0 };
        ps.venueStats[v].games++;
        if (isWin) ps.venueStats[v].wins++;
      }

      // Day-of-week
      if (dayOfWeek >= 0) {
        if (!ps.dayStats[dayOfWeek]) ps.dayStats[dayOfWeek] = { games: 0, wins: 0 };
        ps.dayStats[dayOfWeek].games++;
        if (isWin) ps.dayStats[dayOfWeek].wins++;
      }

      // Hosting
      if (g.hostId === p.playerId) {
        ps.timesHosted++;
        if (isWin) ps.wonWhileHosting++;
      }

      // H2H vs other presets in same game
      participants.forEach(function(other, otherSlot) {
        if (otherSlot === slot) return;
        if (!other.playerId) return;
        if (!ps.h2h[other.playerId]) ps.h2h[other.playerId] = { wins: 0, losses: 0, together: 0 };
        ps.h2h[other.playerId].together++;
        if (positionBySlot[slot] < positionBySlot[otherSlot]) ps.h2h[other.playerId].wins++;
        else if (positionBySlot[slot] > positionBySlot[otherSlot]) ps.h2h[other.playerId].losses++;
      });
    });

    // Absences
    (g.absentees || []).forEach(function(absSlug) {
      if (byPlayer[absSlug]) byPlayer[absSlug].absences++;
    });
  });

  // Seasons roll-up
  (seasons || []).forEach(function(s) {
    if (s.winnerPlayerId && byPlayer[s.winnerPlayerId]) byPlayer[s.winnerPlayerId].seasonsWon++;
    (s.losers || []).forEach(function(loserSlug) {
      if (byPlayer[loserSlug]) byPlayer[loserSlug].seasonsLost++;
    });
  });

  // Derived / streaks
  presetSlugs.forEach(function(slug) {
    var ps = byPlayer[slug];
    ps.avgScorePerGame = ps.gamesPlayed ? ps.totalScore / ps.gamesPlayed : 0;
    ps.avgScorePerRound = ps.roundsPlayed ? ps.scoreSumRound / ps.roundsPlayed : 0;
    ps.avgPosition = ps.gamesPlayed ? ps.sumPosition / ps.gamesPlayed : 0;
    ps.winRate = ps.gamesPlayed ? ps.gamesWon / ps.gamesPlayed : 0;
    ps.homeWinRate = ps.timesHosted ? ps.wonWhileHosting / ps.timesHosted : 0;

    // Streaks from gameResults (chronological)
    var gr = ps.gameResults;
    ps.longestWinStreak = 0; ps.longestLossStreak = 0;
    var cw = 0, cl = 0;
    gr.forEach(function(r) {
      if (r.won) { cw++; cl = 0; if (cw > ps.longestWinStreak) ps.longestWinStreak = cw; }
      else       { cl++; cw = 0; if (cl > ps.longestLossStreak) ps.longestLossStreak = cl; }
    });
    // Current streaks (tail)
    ps.currentWinStreak = 0; ps.currentLossStreak = 0;
    for (var i = gr.length - 1; i >= 0; i--) {
      if (gr[i].won) { if (ps.currentLossStreak > 0) break; ps.currentWinStreak++; }
      else           { if (ps.currentWinStreak > 0) break; ps.currentLossStreak++; }
    }
    // Games since last win
    ps.gamesSinceLastWin = null;
    for (var j = gr.length - 1, since = 0; j >= 0; j--) {
      if (gr[j].won) { ps.gamesSinceLastWin = since; break; }
      since++;
    }
    if (ps.gamesSinceLastWin === null && gr.length === 0) ps.gamesSinceLastWin = null;

    // Nemesis / victim
    ps.nemesis = null; ps.victim = null;
    var maxLosses = 0, maxWins = 0;
    Object.keys(ps.h2h).forEach(function(other) {
      var rec = ps.h2h[other];
      if (rec.losses > maxLosses) { maxLosses = rec.losses; ps.nemesis = other; }
      if (rec.wins > maxWins) { maxWins = rec.wins; ps.victim = other; }
    });

    // Best day of week
    ps.bestDay = null;
    var bestRate = -1;
    Object.keys(ps.dayStats).forEach(function(d) {
      var ds = ps.dayStats[d];
      if (ds.games >= 2) {
        var r = ds.wins / ds.games;
        if (r > bestRate) { bestRate = r; ps.bestDay = parseInt(d, 10); }
      }
    });
  });

  // Season streaks
  var seasonsChrono = (seasons || []).slice().sort(function(a, b) { return (a.seasonNumber || 0) - (b.seasonNumber || 0); });
  presetSlugs.forEach(function(slug) {
    var ps = byPlayer[slug];
    ps.longestSeasonWinStreak = 0;
    ps.currentSeasonWinStreak = 0;
    var streak = 0;
    seasonsChrono.forEach(function(s) {
      var played = (s.participantIds || []).indexOf(slug) >= 0;
      if (!played) { streak = 0; return; }
      if (s.winnerPlayerId === slug) { streak++; if (streak > ps.longestSeasonWinStreak) ps.longestSeasonWinStreak = streak; }
      else { streak = 0; }
    });
    ps.currentSeasonWinStreak = streak;
  });

  return { byPlayer: byPlayer, seasons: seasonsChrono };
}

// ---------- rendering ----------
function _dayLabel(d) {
  if (d === null || typeof d !== 'number' || d < 0) return t('stat_never');
  var days = currentLang === 'es'
    ? ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb']
    : ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  return days[d];
}

function _tile(label, value, sub) {
  var subHtml = sub ? '<div class="stat-sub">' + sub + '</div>' : '';
  return '<div class="stat-tile"><div class="stat-label">' + label + '</div>'
       + '<div class="stat-value">' + value + '</div>' + subHtml + '</div>';
}

function _presetName(slug) {
  var idx = PRESET_NAMES.findIndex(function(n) { return n.toLowerCase() === slug; });
  return idx >= 0 ? PRESET_NAMES[idx] : slug;
}

function renderPlayerStats(slug) {
  var container = document.getElementById('statsPlayerCard');
  if (!container || !_statsData.computed) return;
  var ps = _statsData.computed.byPlayer[slug];
  if (!ps) { container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:1rem;">' + t('stats_no_data') + '</div>'; return; }
  if (!ps.gamesPlayed) {
    container.innerHTML = '<div class="stats-hero"><img src="' + (PRESET_FACES[slug] || '') + '"><div><div class="stats-hero-name">' + _presetName(slug) + '</div><div class="stats-hero-meta">' + t('stats_no_data') + '</div></div></div>';
    return;
  }

  var html = '';
  html += '<div class="stats-hero">';
  if (PRESET_FACES[slug]) html += '<img src="' + PRESET_FACES[slug] + '" alt="' + _presetName(slug) + '">';
  html += '<div>';
  html += '<div class="stats-hero-name">' + _presetName(slug) + '</div>';
  html += '<div class="stats-hero-meta">' + ps.gamesWon + ' ' + t('leaderboard_wins') + ' · ' + ps.gamesLost + ' ' + t('leaderboard_losses') + ' · ' + (ps.winRate * 100).toFixed(0) + '% ' + t('leaderboard_winrate') + '</div>';
  html += '</div></div>';

  html += '<div class="stat-section-label">Core</div>';
  html += '<div class="stats-grid">';
  html += _tile(t('stat_total_score'), ps.totalScore);
  html += _tile(t('stat_games_played'), ps.gamesPlayed);
  html += _tile(t('stat_games_won'), ps.gamesWon);
  html += _tile(t('stat_games_lost'), ps.gamesLost);
  html += _tile(t('stat_rounds_won'), ps.roundsWon);
  html += _tile(t('stat_rounds_lost'), ps.roundsLost);
  html += _tile(t('stat_seasons_won'), ps.seasonsWon);
  html += _tile(t('stat_seasons_lost'), ps.seasonsLost);
  html += _tile(t('stat_absences'), ps.absences);
  html += _tile(t('stat_times_hosted'), ps.timesHosted);
  html += _tile(t('stat_highest_round'), ps.highestRoundScore, t('stat_pts'));
  html += _tile(t('stat_lowest_game'), ps.lowestGameScore === null ? '—' : ps.lowestGameScore, t('stat_pts'));
  html += '</div>';

  html += '<div class="stat-section-label">Streaks & averages</div>';
  html += '<div class="stats-grid">';
  html += _tile(t('stat_current_win_streak'), ps.currentWinStreak);
  html += _tile(t('stat_longest_win_streak'), ps.longestWinStreak);
  html += _tile(t('stat_current_loss_streak'), ps.currentLossStreak);
  html += _tile(t('stat_longest_loss_streak'), ps.longestLossStreak);
  html += _tile(t('stat_season_win_streak'), ps.currentSeasonWinStreak);
  html += _tile(t('stat_longest_season_streak'), ps.longestSeasonWinStreak);
  html += _tile(t('stat_avg_round'), ps.avgScorePerRound.toFixed(1));
  html += _tile(t('stat_avg_game'), ps.avgScorePerGame.toFixed(1));
  html += _tile(t('stat_avg_position'), ps.avgPosition.toFixed(2));
  html += _tile(t('stat_games_since_win'), ps.gamesSinceLastWin === null ? t('stat_never') : ps.gamesSinceLastWin);
  html += _tile(t('stat_net_points'), (ps.netVsAvg >= 0 ? '+' : '') + ps.netVsAvg.toFixed(0));
  html += _tile(t('stat_rounds_played'), ps.roundsPlayed);
  html += '</div>';

  html += '<div class="stat-section-label">Penalties & perks</div>';
  html += '<div class="stats-grid">';
  html += _tile(t('stat_total_multas'), ps.totalMultas);
  html += _tile(t('stat_total_cortes'), ps.totalCortes);
  html += _tile(t('stat_perfect_rounds'), ps.perfectRounds);
  html += _tile(t('stat_home_field'), ps.timesHosted ? (ps.homeWinRate * 100).toFixed(0) + '%' : '—', ps.timesHosted ? (ps.wonWhileHosting + '/' + ps.timesHosted) : '');
  html += '</div>';

  html += '<div class="stat-section-label">Extremes</div>';
  html += '<div class="stats-grid">';
  html += _tile(t('stat_fastest_win'), ps.fastestWin === null ? '—' : ps.fastestWin, ps.fastestWin === null ? '' : t('stat_rounds'));
  html += _tile(t('stat_longest_game'), ps.longestGame || '—', t('stat_rounds'));
  html += _tile(t('stat_biggest_comeback'), ps.biggestComeback || '—', ps.biggestComeback ? t('stat_pts') : '');
  html += _tile(t('stat_closest_loss'), ps.closestLoss === null ? '—' : ps.closestLoss, ps.closestLoss === null ? '' : t('stat_pts'));
  html += _tile(t('stat_worst_game'), ps.worstGameScore || '—', ps.worstGameScore ? t('stat_pts') : '');
  html += _tile(t('stat_nemesis'), ps.nemesis ? _presetName(ps.nemesis) : t('stat_none'), ps.nemesis ? (ps.h2h[ps.nemesis].losses + '-' + ps.h2h[ps.nemesis].wins) : '');
  html += _tile(t('stat_victim'), ps.victim ? _presetName(ps.victim) : t('stat_none'), ps.victim ? (ps.h2h[ps.victim].wins + '-' + ps.h2h[ps.victim].losses) : '');
  html += _tile(t('stat_day_perf'), ps.bestDay === null ? '—' : _dayLabel(ps.bestDay));
  html += '</div>';

  html += '<div class="stat-section-label">' + t('stat_pos_dist') + '</div>';
  html += '<div class="stats-grid">';
  Object.keys(ps.positionDist).sort().forEach(function(k) {
    var label = (k === 'last') ? '🪦 ' + t('stat_pos_dist') : '#' + k;
    html += _tile(label, ps.positionDist[k]);
  });
  html += '</div>';

  container.innerHTML = html;
}

function renderLeaderboard(sortKey) {
  sortKey = sortKey || 'gamesWon';
  var table = document.getElementById('leaderboardTable');
  if (!table || !_statsData.computed) return;
  var rows = Object.values(_statsData.computed.byPlayer)
    .filter(function(p) { return p.gamesPlayed > 0; })
    .sort(function(a, b) {
      if (sortKey === 'avgPosition' || sortKey === 'totalScore') {
        return (a[sortKey] || 0) - (b[sortKey] || 0); // lower is better
      }
      return (b[sortKey] || 0) - (a[sortKey] || 0);
    });
  if (!rows.length) { table.innerHTML = '<tbody><tr><td style="color:var(--text-muted);text-align:center;padding:1rem;">' + t('stats_no_data') + '</td></tr></tbody>'; return; }

  var html = '<thead><tr>'
    + '<th>#</th>'
    + '<th>' + t('leaderboard_player') + '</th>'
    + '<th>' + t('leaderboard_games') + '</th>'
    + '<th>' + t('leaderboard_wins') + '</th>'
    + '<th>' + t('leaderboard_losses') + '</th>'
    + '<th>' + t('leaderboard_winrate') + '</th>'
    + '<th>' + t('leaderboard_seasons') + '</th>'
    + '<th>' + t('leaderboard_avg_pos') + '</th>'
    + '<th>' + t('leaderboard_hosted') + '</th>'
    + '<th>' + t('leaderboard_score') + '</th>'
    + '</tr></thead><tbody>';
  rows.forEach(function(p, i) {
    var face = PRESET_FACES[p.slug];
    var faceImg = face ? '<img src="' + face + '" class="player-face-sm" style="vertical-align:middle;margin-right:.35rem;">' : '';
    html += '<tr>'
      + '<td>' + (i + 1) + '</td>'
      + '<td>' + faceImg + _presetName(p.slug) + '</td>'
      + '<td>' + p.gamesPlayed + '</td>'
      + '<td>' + p.gamesWon + '</td>'
      + '<td>' + p.gamesLost + '</td>'
      + '<td>' + (p.winRate * 100).toFixed(0) + '%</td>'
      + '<td>' + p.seasonsWon + '</td>'
      + '<td>' + (p.avgPosition ? p.avgPosition.toFixed(2) : '—') + '</td>'
      + '<td>' + p.timesHosted + '</td>'
      + '<td>' + p.totalScore + '</td>'
      + '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function renderSeasonsTable() {
  var table = document.getElementById('seasonsTable');
  if (!table || !_statsData.computed) return;
  var seasons = _statsData.computed.seasons.slice().reverse();
  if (!seasons.length) { table.innerHTML = '<tbody><tr><td style="color:var(--text-muted);text-align:center;padding:1rem;">' + t('stats_no_data') + '</td></tr></tbody>'; return; }
  var html = '<thead><tr>'
    + '<th>' + t('seasons_col_num') + '</th>'
    + '<th>' + t('seasons_col_winner') + '</th>'
    + '<th>' + t('seasons_col_score') + '</th>'
    + '<th>' + t('seasons_col_dates') + '</th>'
    + '<th>' + t('seasons_col_games') + '</th>'
    + '</tr></thead><tbody>';
  seasons.forEach(function(s) {
    var winner = s.winnerPlayerId ? _presetName(s.winnerPlayerId) : '—';
    var winnerScore = s.winnerPlayerId ? s.perPlayerScores[s.winnerPlayerId] : '—';
    var startedAt = s.startedAt && s.startedAt.toMillis ? s.startedAt.toMillis() : s.startedAt;
    var endedAt = s.endedAt && s.endedAt.toMillis ? s.endedAt.toMillis() : s.endedAt;
    var dates = (startedAt && endedAt) ? (formatTimestamp(startedAt) + ' → ' + formatTimestamp(endedAt)) : '—';
    html += '<tr>'
      + '<td>#' + s.seasonNumber + '</td>'
      + '<td>🏆 ' + winner + '</td>'
      + '<td>' + winnerScore + '</td>'
      + '<td style="font-size:.8rem;color:var(--text-muted);">' + dates + '</td>'
      + '<td>' + ((s.gameIds || []).length) + '</td>'
      + '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function renderH2HMatrix() {
  var table = document.getElementById('h2hMatrix');
  if (!table || !_statsData.computed) return;
  var slugs = PRESET_NAMES.map(function(n) { return n.toLowerCase(); });
  var byPlayer = _statsData.computed.byPlayer;
  var html = '<thead><tr><th></th>';
  slugs.forEach(function(s) { html += '<th title="' + _presetName(s) + '">' + _presetName(s).slice(0, 3) + '</th>'; });
  html += '</tr></thead><tbody>';
  slugs.forEach(function(rowSlug) {
    html += '<tr><th>' + _presetName(rowSlug) + '</th>';
    slugs.forEach(function(colSlug) {
      if (rowSlug === colSlug) { html += '<td class="h2h-diag">—</td>'; return; }
      var rec = byPlayer[rowSlug].h2h[colSlug];
      if (!rec || !rec.together) { html += '<td style="color:var(--text-muted);">·</td>'; return; }
      var rate = rec.wins / rec.together;
      var cls = rate > 0.5 ? 'h2h-good' : (rate < 0.5 ? 'h2h-bad' : '');
      html += '<td class="' + cls + '" title="' + rec.wins + '-' + rec.losses + ' (' + rec.together + ')">' + rec.wins + '/' + rec.together + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

// ============ INIT ============
asadoMode = localStorage.getItem('lunesdeuno_asado') === 'on';
document.getElementById('asadoToggle').checked = asadoMode;
if (asadoMode) applyAsadoMode();

setLang(currentLang);
initSetup();
renderGamesList();

// Firestore bootstrap: seed presets, pull remote games, then re-render home list.
function lduBootstrap() {
  if (!window.LDU_READY || !window.LDU) return;
  var presets = PRESET_NAMES.map(function(name, i) {
    var slug = name.toLowerCase();
    return {
      slug: slug,
      displayName: name,
      face: PRESET_FACES[slug] || null,
      color: PLAYER_COLORS[i % PLAYER_COLORS.length]
    };
  });
  window.LDU.seedPresets(presets).catch(function(err) { console.warn('[LDU] seedPresets failed:', err); });
  syncRemoteGamesToLocal().then(function() { renderGamesList(); });
}

if (window.LDU_READY) {
  lduBootstrap();
} else {
  window.addEventListener('ldu-ready', lduBootstrap, { once: true });
}
</script>
