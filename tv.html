<!DOCTYPE html>
<html lang="es-UY">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d12">
  <title>Lunes de UNO — Modo TV</title>
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --uno-red: #ED1C24;
      --uno-yellow: #FFDE00;
      --uno-green: #00A651;
      --uno-blue: #0072BC;
      --bg: #0d0d12;
      --surface: #1a1a2e;
      --surface-2: #242442;
      --surface-3: #2d2d52;
      --border: #3a3a5c;
      --text: #f0f0f5;
      --text-muted: #8888a8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #050507; color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Marco TV antigua CRT ---- */
    /* TV vintage de plástico gris oscuro/negro, marcos GRUESOS, esquinas
       redondeadas suaves, parrilla de altavoz horizontal abajo, perilla
       de volumen circular a la derecha, marca grabada al frente, dos
       antenas saliendo arriba. Ocupa el 98% del viewport — la pantalla
       sigue siendo la mayoría del espacio (~80%). */
    .tv-cabinet {
      position: relative;
      width: 98vw; height: 81vh;
      margin: 5.5vh auto 0 auto;        /* deja ~5vh arriba para que las antenas se vean */
      padding: 4vh 3vw 5vh 1.4vw;       /* bezel grueso arriba/abajo (consola vintage), slim laterales */
      background:
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.05) 0%, transparent 25%),
        linear-gradient(170deg, #2a2a2e 0%, #16161a 50%, #2a2a2e 100%);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow:
        0 0 0 4px #0a0a0c,
        0 24px 64px rgba(0,0,0,.7),
        inset 0 4px 16px rgba(255,255,255,.05),
        inset 0 -4px 16px rgba(0,0,0,.6);
    }
    /* Patas decorativas de TV vintage — debajo del cabinet */
    .tv-legs {
      position: absolute;
      left: 0; right: 0;
      bottom: -7.5vh;
      height: 7.5vh;
      pointer-events: none;
      z-index: 0;
    }
    .tv-legs::before, .tv-legs::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 5vw; max-width: 80px; min-width: 32px;
      height: 6vh; min-height: 32px;
      background:
        linear-gradient(180deg, #2a2a2e 0%, #1a1a1e 60%, #0a0a0a 100%);
      border-radius: 0 0 8px 8px;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.06),
        0 6px 12px rgba(0,0,0,.5);
      clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
    }
    .tv-legs::before { left: 14%; }
    .tv-legs::after  { right: 14%; }
    /* Antenas saliendo de arriba (rabbit ears) — más grandes y notorias */
    .tv-antennae {
      position: absolute;
      left: 0; right: 0; top: -5vh;
      height: 5vh;
      pointer-events: none;
      z-index: 1;
    }
    .tv-antennae::before,
    .tv-antennae::after {
      content: '';
      position: absolute;
      bottom: 0;
      width: 3px;
      height: 5vh;
      background: linear-gradient(180deg, #d8d8d8, #777);
      border-radius: 2px;
      transform-origin: bottom center;
      box-shadow: 0 0 6px rgba(0,0,0,.6);
    }
    .tv-antennae::before {
      left: calc(50% - 3.5vw);
      transform: rotate(-25deg);
    }
    .tv-antennae::after {
      left: calc(50% + 3.5vw);
      transform: rotate(25deg);
    }
    .tv-antennae-base {
      position: absolute;
      left: 50%; bottom: 0;
      transform: translateX(-50%);
      width: 8vw; height: 1.4vh;
      background: linear-gradient(180deg, #3a3a3e, #1a1a1c);
      border-radius: 6px 6px 0 0;
    }

    /* Marca del frente — más visible ahora que el bezel inferior es grueso */
    .tv-brand-plate {
      position: absolute;
      bottom: 1.5vh; left: 1.5vw;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(.7rem, 1.1vw, 1.05rem);
      letter-spacing: .3em;
      color: #d8b550;
      text-shadow:
        0 1px 0 #6a4f1a,
        0 -1px 0 rgba(255,255,255,.18);
      pointer-events: none;
      line-height: 1.05;
    }
    .tv-brand-plate small {
      display: block;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: .55em;
      letter-spacing: .25em;
      color: rgba(216,181,80,.6);
      margin-top: .15vh;
    }

    /* Parrilla horizontal del altavoz — vintage, más grande con bezel inferior grueso */
    .tv-speaker {
      position: absolute;
      bottom: 1.4vh; right: 7vw;
      width: 14vw; max-width: 220px;
      height: 3vh; min-height: 22px;
      background:
        repeating-linear-gradient(
          to bottom,
          #0a0a0c 0px,
          #0a0a0c 2px,
          rgba(255,255,255,.04) 2px,
          rgba(255,255,255,.04) 4px
        );
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 3px;
      box-shadow: inset 0 0 6px rgba(0,0,0,.6);
    }

    /* Perilla de volumen / canal a la derecha — vintage CRT */
    .tv-knob {
      position: absolute;
      right: .5vw;
      width: 2.2vw; max-width: 32px; min-width: 18px;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 50%),
        linear-gradient(135deg, #3a3a3e, #16161a);
      border: 1px solid #0a0a0c;
      box-shadow:
        inset 0 0 4px rgba(0,0,0,.7),
        0 1px 3px rgba(0,0,0,.4);
    }
    .tv-knob::before {
      content: '';
      position: absolute;
      left: 50%; top: 18%;
      transform: translateX(-50%);
      width: 8%; height: 28%;
      background: linear-gradient(180deg, #d8b550, #6a4f1a);
      border-radius: 1px;
    }
    .tv-knob.tv-knob-top { top: 5vh; }
    .tv-knob.tv-knob-bot { top: 9vh; }

    /* LED de power — bezel inferior, ahora más visible */
    .tv-led {
      position: absolute;
      right: 2.4vw;
      bottom: 2.4vh;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff3344;
      box-shadow: 0 0 10px #ff3344, inset 0 0 2px rgba(255,255,255,.5);
    }
    .tv-led-label {
      position: absolute;
      right: 1.2vw;
      bottom: 1.4vh;
      color: rgba(255,255,255,.4);
      font-size: clamp(.5rem, .8vw, .8rem);
      letter-spacing: .25em;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
    }

    .tv-screen {
      width: 100%; height: 100%;
      background: var(--bg);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.04),
        inset 0 0 80px rgba(0,0,0,.8),
        0 0 0 6px #050507;        /* "vidrio" oscuro alrededor del CRT */
    }
    /* Highlight diagonal sutil simulando reflejo de pantalla CRT */
    .tv-screen::before {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,.05) 0%, transparent 30%),
        radial-gradient(circle at 88% 92%, rgba(255,255,255,.025) 0%, transparent 35%);
      z-index: 1;
    }
    /* Scanlines tenues para look CRT */
    .tv-screen::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,.08) 2px,
        rgba(0,0,0,.08) 3px
      );
      z-index: 1;
      opacity: .35;
    }

    /* Layout reducido: en celular el bezel se hace todavía más fino */
    @media (max-width: 700px) {
      .tv-cabinet {
        padding: 1vh 1.5vw 1.7vh 1vw;
        border-radius: 10px;
      }
      .tv-antennae { display: none; }
      .tv-speaker { width: 8vw; height: 1.6vh; right: 4vw; }
      .tv-knob { width: 2.6vw; min-width: 14px; right: .2vw; }
      .tv-knob.tv-knob-top { top: 1.5vh; }
      .tv-knob.tv-knob-bot { top: 3.4vh; }
      .tv-brand-plate { font-size: .5rem; left: 1vw; }
      .tv-led { right: 1.2vw; bottom: .6vh; }
      .tv-led-label { display: none; }
    }

    /* ---- Layout principal ---- */
    .tv {
      width: 100%; height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: .5vh;
      padding: .4vh .6vw;
      position: relative;
      z-index: 2;
    }
    .tv-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1.5vw;
      padding: .6vh 1.5vw;
      background: var(--surface);
      border-radius: 1.2vw;
      border: 1px solid var(--border);
    }
    .tv-brand {
      display: flex; align-items: center; gap: 1vw;
    }
    .tv-brand img { height: 4vh; width: auto; }
    .tv-brand-name {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.1rem, 2.4vw, 2.2rem);
      line-height: 1;
      background: linear-gradient(135deg, var(--uno-red) 0%, var(--uno-yellow) 35%, var(--uno-green) 70%, var(--uno-blue) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tv-controls {
      display: flex; align-items: center; gap: 1.2vw;
    }
    .tv-cast-btn {
      display: inline-flex; align-items: center; gap: .5vw;
      background: var(--uno-yellow); color: #1a1a1a;
      border: 2px solid var(--uno-yellow);
      padding: .8vh 1.2vw;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: clamp(.8rem, 1.3vw, 1.2rem);
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(255,222,0,.25);
      transition: transform .15s ease;
    }
    .tv-cast-btn:hover { transform: translateY(-1px); }
    .tv-cast-btn:active { transform: scale(.97); }
    .tv-cast-btn[disabled] { opacity: .5; cursor: not-allowed; }
    .tv-cast-btn.casting { background: var(--uno-green); border-color: var(--uno-green); color: #fff; }
    .tv-status {
      display: flex; align-items: center; gap: .8vw;
      font-size: clamp(.8rem, 1.4vw, 1.4rem);
      font-weight: 700; letter-spacing: .12em;
      color: var(--text);
    }
    .tv-live-dot {
      width: 1.1vw; height: 1.1vw; min-width: 12px; min-height: 12px;
      border-radius: 50%; background: #ff3344;
      box-shadow: 0 0 14px #ff3344;
      animation: pulse 1.4s infinite;
    }
    .tv-status.offline .tv-live-dot { background: var(--text-muted); box-shadow: none; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .35; transform: scale(.85); }
    }
    .tv-meta {
      font-size: clamp(.55rem, .9vw, .9rem);
      color: var(--text-muted);
      letter-spacing: .04em;
    }

    .tv-body {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 1.2vw;
      min-height: 0;
    }
    .tv-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1vw;
      padding: .5vh .8vw;
      display: flex; flex-direction: column;
      min-height: 0;
    }
    .tv-panel h2 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.1rem, 2.2vw, 2.2rem);
      margin: 0 0 .3vh 0;
      color: var(--uno-yellow);
      letter-spacing: .04em;
    }
    .tv-panel h2 small {
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: .55em;
      margin-left: .6vw;
      letter-spacing: 0;
    }

    /* ---- Tablas ---- */
    .tv-table {
      width: 100%;
      border-collapse: separate; border-spacing: 0;
      font-size: clamp(1.2rem, 2.4vw, 2.8rem);
      flex: 1; min-height: 0;
      table-layout: fixed;
    }
    .tv-table thead tr { background: rgba(255,255,255,.03); }
    .tv-table th {
      text-align: left;
      color: var(--text-muted);
      font-size: clamp(.6rem, 1vw, 1.05rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: .3vh .35vw;
      border-bottom: 2px solid var(--border);
    }
    .tv-table td {
      padding: .5vh .35vw;
      border-bottom: 1px solid rgba(255,255,255,.04);
      vertical-align: middle;
    }
    .tv-table tr:last-child td { border-bottom: none; }
    .tv-table .col-pos {
      width: 8%; text-align: center; color: var(--text-muted); font-weight: 700;
      white-space: nowrap;
    }
    .tv-rank-arrow {
      display: inline-block; margin-left: .25em;
      font-size: .85em; font-weight: 800; line-height: 1;
      vertical-align: middle;
    }
    .tv-rank-arrow.up   { color: var(--uno-green); text-shadow: 0 0 8px rgba(0,166,81,.5); }
    .tv-rank-arrow.down { color: var(--uno-red);   text-shadow: 0 0 8px rgba(237,28,36,.5); }
    .tv-rank-arrow.same { color: var(--text-muted); opacity: .4; }
    .tv-table .col-player { width: auto; }
    .tv-table .col-num { width: 10%; text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; }
    .tv-table .col-num.col-mute { color: var(--text-muted); font-weight: 500; }
    .tv-table tbody .col-total { color: var(--uno-yellow); font-size: 1.15em; }
    /* En thead el header "TOTAL" / "PTS" mantiene el mismo tamaño que los
       otros headers (la regla más específica que .tv-table .col-total
       gana). Solo le dejamos el color amarillo de pista. */
    .tv-table thead th.col-total { color: var(--uno-yellow); font-size: clamp(.6rem, 1vw, 1.05rem); }

    .tv-player {
      display: flex; align-items: center; gap: 1vw;
      min-width: 0;
    }
    .tv-player img {
      width: 5.5vh; height: 5.5vh; min-width: 36px; min-height: 36px;
      border-radius: 50%; object-fit: cover;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .tv-player .tv-player-name {
      font-weight: 700; font-size: 1.22em;
      letter-spacing: -.005em;
      text-decoration: underline;
      text-decoration-color: rgba(255,255,255,.18);
      text-decoration-thickness: 2px;
      text-underline-offset: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tv-table tr.tv-leader td { background: linear-gradient(90deg, rgba(255,222,0,.10), transparent); }
    .tv-table tr.tv-leader .tv-player-name { color: var(--uno-yellow); }
    .tv-table tr.tv-leader .col-pos { color: var(--uno-yellow); }
    .tv-table tr.tv-trail td { background: linear-gradient(90deg, rgba(237,28,36,.08), transparent); }
    .tv-table tr.tv-trail .col-pos { color: var(--uno-red); }
    .tv-cortes-cell { color: var(--uno-green); }
    .tv-fines-cell { color: var(--uno-yellow); }

    /* ---- Estado: esperando partido ---- */
    .tv-empty {
      grid-column: 1 / -1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2vh;
      color: var(--text-muted);
      text-align: center;
      padding: 4vh;
    }
    .tv-empty-icon {
      font-size: clamp(3rem, 8vw, 8rem);
      opacity: .5;
    }
    .tv-empty h2 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 3.2vw, 3rem);
      margin: 0;
      color: var(--text);
    }
    .tv-empty p {
      margin: 0;
      font-size: clamp(.9rem, 1.6vw, 1.4rem);
      max-width: 60vw;
    }

    /* ---- Layout reducido para pantallas chicas (TVs HD-ready) ---- */
    @media (max-aspect-ratio: 4/3) {
      .tv-body { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
    }
    @media (max-width: 800px) {
      .tv-body { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .tv-table .col-num { width: 18%; }
    }
  </style>
</head>
<body>

<!-- Marco "TV antigua HD". Todo el contenido vive dentro del .tv-screen. -->
<div class="tv-cabinet">
  <!-- Detalles vintage decorativos: antenas, perillas, parrilla, marca, LED, patas -->
  <div class="tv-antennae" aria-hidden="true"><div class="tv-antennae-base"></div></div>
  <div class="tv-knob tv-knob-top" aria-hidden="true"></div>
  <div class="tv-knob tv-knob-bot" aria-hidden="true"></div>
  <div class="tv-led" aria-hidden="true"></div>
  <span class="tv-led-label" aria-hidden="true">PWR</span>
  <div class="tv-speaker" aria-hidden="true"></div>
  <div class="tv-brand-plate" aria-hidden="true">LUNES TV<small>CRT-1985</small></div>
  <div class="tv-legs" aria-hidden="true"></div>

  <div class="tv-screen">

    <div class="tv" id="tvRoot">
      <div class="tv-header">
        <div class="tv-brand">
          <img src="assets/tophat-logo.png" alt="">
          <div>
            <div class="tv-brand-name">Lunes de UNO</div>

          </div>
        </div>
        <div class="tv-controls">
          <button id="castBtn" class="tv-cast-btn" type="button" hidden>
            <span aria-hidden="true">📡</span><span>Castear</span>
          </button>
          <div class="tv-status" id="tvStatus">
            <span class="tv-live-dot"></span>
            <span id="statusText">EN VIVO</span>
          </div>
        </div>
      </div>

      <div class="tv-body" id="tvBody">
        <div class="tv-empty" id="tvEmpty">
          <div class="tv-empty-icon">🎴</div>
          <h2>Esperá a que arranque el partido…</h2>

  </div>

<!-- ============ FIREBASE FIRESTORE (module) ============ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import {
    getFirestore, collection, doc, getDocs, onSnapshot
  } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  // ----- Mismos identificadores y firebaseConfig que index.html / propuestas.html -----
  const PRESET_NAMES = ['PT','Mac','Mata','Gael','Nachi','Carucha','Negro','Naso','Tano','Gordo','Cobra'];
  const NAME_BY_ID = Object.fromEntries(PRESET_NAMES.map(n => [n.toLowerCase(), n]));
  const FACE_PATH = id => `assets/faces/${id}.png`;

  const firebaseConfig = {
    apiKey: "AIzaSyDgmh5HjjYdIwkFgeo7iBfcfQ_b73Xa3yM",
    authDomain: "lunesdeuno.firebaseapp.com",
    projectId: "lunesdeuno",
    storageBucket: "lunesdeuno.firebasestorage.app",
    messagingSenderId: "694296428363",
    appId: "1:694296428363:web:fb8cc52a4a5c58e24372ce",
    measurementId: "G-BL6BEJ39C1"
  };
  const _fbApp = initializeApp(firebaseConfig);
  const _db = getFirestore(_fbApp);

  // ----- Helpers puros copiados de propuestas.html (gameTotalScores / unwrap2d) -----
  // Los inlineamos en lugar de importar para no crear dependencias entre páginas.
  function unwrap2d(arr) {
    if (!Array.isArray(arr)) return [];
    return arr.map(row => {
      if (row && Array.isArray(row.v)) return row.v;
      if (Array.isArray(row)) return row;
      return [];
    });
  }
  // Normaliza un doc tal cual viene de Firestore (con `{v:[...]}` y Timestamps).
  function normalizeGame(g) {
    if (!g) return null;
    const out = Object.assign({}, g);
    out.rounds = unwrap2d(g.rounds);
    out.fines  = unwrap2d(g.fines);
    out.cortes = unwrap2d(g.cortes);
    out.finishedAt = (g.finishedAt && g.finishedAt.toMillis) ? g.finishedAt.toMillis() : (g.finishedAt || 0);
    out.updatedAt  = (g.updatedAt  && g.updatedAt.toMillis ) ? g.updatedAt.toMillis()  : (g.updatedAt  || 0);
    return out;
  }
  // Devuelve { playerId: { base, fines, cortes, total } } para un game ya normalizado.
  function gameScoreBreakdown(g) {
    const out = {};
    const parts = (g && g.participants) || [];
    parts.forEach(p => {
      if (!p || !p.playerId) return;
      const slot = p.slot;
      const base = (g.rounds || []).reduce((s, r) => s + ((r && r[slot]) || 0), 0);
      const fines = (g.fines || []).reduce((s, r) => s + ((r && r[slot]) || 0), 0);
      const cortesCount = (g.cortes || []).reduce((s, r) => s + ((r && r[slot]) ? 1 : 0), 0);
      const cortes = cortesCount * -50;
      out[p.playerId] = { base, fines, cortes, total: base + fines + cortes, slot };
    });
    return out;
  }
  function gameTotalScores(g) {
    const breakdown = gameScoreBreakdown(g);
    const out = {};
    Object.keys(breakdown).forEach(k => out[k] = breakdown[k].total);
    return out;
  }

  // ----- Estado interno de la TV -----
  const TV = {
    currentGameId: null,
    currentGame: null,        // doc del partido en vivo (normalizado)
    finishedGames: [],        // games finalizados (normalizados)
    unsubscribeGame: null,
    unsubscribeGames: null,
  };

  // ----- Render -----
  function renderEmpty(message) {
    const body = document.getElementById('tvBody');
    body.innerHTML = `
      <div class="tv-empty">
        <div class="tv-empty-icon">🎴</div>
        <h2>${message || 'Esperá a que arranque el partido…'}</h2>
        <p>Cuando alguien empiece a anotar desde el celular, los puntajes parciales aparecen acá en vivo.</p>
      </div>`;
  }

  function setStatus(text, offline) {
    const txt = document.getElementById('statusText');
    const wrap = document.getElementById('tvStatus');
    if (txt) txt.textContent = text;
    if (wrap) wrap.classList.toggle('offline', !!offline);
  }

  function setMeta(g) {
    const el = document.getElementById('gameMeta');
    if (!el || !g) return;
    const d = g.finishedAt ? new Date(g.finishedAt) : new Date();
    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const dateStr = `${d.getDate()} ${meses[d.getMonth()]} ${d.getFullYear()}`;
    const venue = g.venue ? `📍 ${g.venue} · ` : '';
    const rondas = (g.rounds || []).length;
    const rndLabel = rondas > 0 ? `Ronda ${rondas}` : 'Por arrancar';
    el.textContent = `${venue}${dateStr} · ${rndLabel}`;
  }

  // Tabla del partido en curso: pos | jugador | base | mul | cor | total
  // Helper: rank de un game omitiendo las últimas N rondas. Devuelve un mapa
  // { playerId: posición (1-indexed) } basado en totales menor→mayor.
  function rankFor(g, omitLastRounds) {
    if (!g || !Array.isArray(g.participants)) return {};
    const N = (g.rounds || []).length - (omitLastRounds || 0);
    if (N < 0) return {};
    const slim = Object.assign({}, g, {
      rounds: (g.rounds || []).slice(0, N),
      fines:  (g.fines  || []).slice(0, N),
      cortes: (g.cortes || []).slice(0, N),
    });
    const breakdown = gameScoreBreakdown(slim);
    return Object.keys(breakdown)
      .map(id => ({ id, total: breakdown[id].total }))
      .sort((a, b) => a.total - b.total)
      .reduce((acc, p, i) => { acc[p.id] = i + 1; return acc; }, {});
  }

  // Helper: HTML de la flecha de movimiento. Verde si subió (posición numérica
  // bajó), rojo si bajó. Devuelve '' si no hay previa o si no cambió.
  function arrowHTML(prevPos, currPos) {
    if (prevPos == null || currPos == null) return '';
    if (prevPos === currPos) return '<span class="tv-rank-arrow same">·</span>';
    if (currPos < prevPos) return `<span class="tv-rank-arrow up" title="Subió ${prevPos - currPos} puesto${prevPos - currPos === 1 ? '' : 's'}">▲</span>`;
    return `<span class="tv-rank-arrow down" title="Bajó ${currPos - prevPos} puesto${currPos - prevPos === 1 ? '' : 's'}">▼</span>`;
  }

  function renderCurrent(g) {
    if (!g || !Array.isArray(g.participants) || !g.participants.length) {
      return `<div class="tv-empty"><div class="tv-empty-icon">⏳</div><h2>Sin participantes todavía</h2></div>`;
    }
    const breakdown = gameScoreBreakdown(g);
    const rows = g.participants.map(p => ({
      slug: p.playerId,
      name: p.name || NAME_BY_ID[p.playerId] || p.playerId,
      ...breakdown[p.playerId] || { base: 0, fines: 0, cortes: 0, total: 0 }
    })).sort((a, b) => a.total - b.total);
    const winnerSlug = rows[0]?.slug;
    const loserSlug  = rows[rows.length - 1]?.slug;

    // Posición previa (con la última ronda omitida) sólo si ya hay ≥2 rondas.
    // Antes de la 2da ronda no tiene sentido hablar de "subió/bajó".
    const totalRounds = (g.rounds || []).length;
    const prevPos = totalRounds >= 2 ? rankFor(g, 1) : null;
    const currPos = rankFor(g, 0);

    return `
      <div class="tv-panel">
        <h2>Partido en curso <small>${g.maxPoints ? '· hasta ' + g.maxPoints + ' pts' : ''}</small></h2>
        <table class="tv-table">
          <thead><tr>
            <th class="col-pos">#</th>
            <th>Jugador</th>
            <th class="col-num">Base</th>
            <th class="col-num">Multas</th>
            <th class="col-num">Cortes</th>
            <th class="col-num">Total</th>
          </tr></thead>
          <tbody>
            ${rows.map((r, i) => `
              <tr class="${r.slug === winnerSlug ? 'tv-leader' : (r.slug === loserSlug && rows.length > 1 ? 'tv-trail' : '')}">
                <td class="col-pos">${i + 1}${prevPos ? arrowHTML(prevPos[r.slug], currPos[r.slug]) : ''}</td>
                <td><div class="tv-player">
                  <img src="${FACE_PATH(r.slug)}" alt="" onerror="this.style.visibility='hidden'">
                  <span class="tv-player-name">${r.name}</span>
                </div></td>
                <td class="col-num col-mute">${r.base || 0}</td>
                <td class="col-num tv-fines-cell">${r.fines > 0 ? '+' + r.fines : '—'}</td>
                <td class="col-num tv-cortes-cell">${r.cortes < 0 ? r.cortes : '—'}</td>
                <td class="col-num col-total">${r.total}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // Tabla de la temporada: pos | jugador | partidos | total acumulado
  // Los puntos de la temporada incluyen: partidos previos finalizados de la
  // temporada en curso + el parcial del partido en vivo.
  function renderSeason(currentGame, finishedGames) {
    // Regla de la app: una temporada cierra cada 4 finalizados. Los partidos
    // de la temporada en curso son los últimos N que no llegaron a 4 todavía.
    const finished = (finishedGames || [])
      .slice()
      .sort((a, b) => (a.finishedAt || 0) - (b.finishedAt || 0));
    const seasonGames = finished.slice(Math.floor(finished.length / 4) * 4);
    const includedCurrent = currentGame && currentGame.gameId ? [currentGame] : [];
    const all = seasonGames.concat(includedCurrent);

    if (!all.length) {
      return `<div class="tv-panel">
        <h2>Temporada en curso</h2>
        <div class="tv-empty" style="padding:2vh">
          <div class="tv-empty-icon">🏁</div>
          <p>Empieza una temporada nueva con este partido.</p>
        </div>
      </div>`;
    }

    // Computamos totales con dos snapshots: actual y previo (omitiendo la
    // última ronda del partido en curso). El previo sólo tiene sentido si
    // hay un partido en curso con ≥2 rondas.
    function totalsFor(games) {
      const t = {}, p = {};
      games.forEach(g => {
        const scores = gameTotalScores(g);
        Object.keys(scores).forEach(pid => {
          t[pid] = (t[pid] || 0) + scores[pid];
          p[pid] = (p[pid] || 0) + 1;
        });
      });
      return { t, p };
    }
    const cur = totalsFor(all);
    const totalRoundsInCurrent = currentGame ? (currentGame.rounds || []).length : 0;
    let prevPos = null;
    if (currentGame && totalRoundsInCurrent >= 2) {
      const prevCurrent = Object.assign({}, currentGame, {
        rounds: (currentGame.rounds || []).slice(0, -1),
        fines:  (currentGame.fines  || []).slice(0, -1),
        cortes: (currentGame.cortes || []).slice(0, -1),
      });
      const prevAll = seasonGames.concat([prevCurrent]);
      const { t: pt } = totalsFor(prevAll);
      prevPos = Object.keys(pt)
        .map(id => ({ id, total: pt[id] }))
        .sort((a, b) => a.total - b.total)
        .reduce((acc, p, i) => { acc[p.id] = i + 1; return acc; }, {});
    }

    const rows = Object.keys(cur.t).map(id => ({
      slug: id,
      name: NAME_BY_ID[id] || id,
      total: cur.t[id],
      partidos: cur.p[id] || 0,
    })).sort((a, b) => a.total - b.total);
    const winnerSlug = rows[0]?.slug;
    const loserSlug  = rows[rows.length - 1]?.slug;
    const currPos = rows.reduce((acc, r, i) => { acc[r.slug] = i + 1; return acc; }, {});

    return `
      <div class="tv-panel">
        <h2>Temporada en curso <small>· ${all.length} partido${all.length === 1 ? '' : 's'} (incluye parcial)</small></h2>
        <table class="tv-table">
          <thead><tr>
            <th class="col-pos">#</th>
            <th>Jugador</th>
            <th class="col-num">PJ</th>
            <th class="col-num col-total">Pts</th>
          </tr></thead>
          <tbody>
            ${rows.map((r, i) => `
              <tr class="${r.slug === winnerSlug ? 'tv-leader' : (r.slug === loserSlug && rows.length > 1 ? 'tv-trail' : '')}">
                <td class="col-pos">${i + 1}${prevPos ? arrowHTML(prevPos[r.slug], currPos[r.slug]) : ''}</td>
                <td><div class="tv-player">
                  <img src="${FACE_PATH(r.slug)}" alt="" onerror="this.style.visibility='hidden'">
                  <span class="tv-player-name">${r.name}</span>
                </div></td>
                <td class="col-num col-mute">${r.partidos}</td>
                <td class="col-num col-total">${r.total}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  function renderAll() {
    const body = document.getElementById('tvBody');
    if (!TV.currentGame) {
      renderEmpty('Esperá a que arranque el partido…');
      return;
    }
    setMeta(TV.currentGame);
    body.innerHTML = renderCurrent(TV.currentGame) + renderSeason(TV.currentGame, TV.finishedGames);
    // Ajustar font-size después de que el browser pintó el layout para que
    // todas las filas entren sin scroll. requestAnimationFrame nos da el size
    // real del tbody.
    requestAnimationFrame(() => requestAnimationFrame(autoFitTables));
  }

  // Mide cada panel y reduce el font-size del tbody + padding de los td
  // si las filas no entran todas en el alto disponible. Si tras un ajuste
  // sigue habiendo overflow, repite hasta convergir (máx 4 iteraciones).
  function autoFitTables() {
    document.querySelectorAll('.tv-panel').forEach(panel => {
      const tbody = panel.querySelector('tbody');
      if (!tbody) return;
      const rows = tbody.querySelectorAll('tr').length;
      if (!rows) return;
      // Reset
      tbody.style.fontSize = '';
      panel.querySelectorAll('tbody td').forEach(td => {
        td.style.paddingTop = ''; td.style.paddingBottom = '';
      });
      panel.querySelectorAll('tbody .tv-player img').forEach(img => {
        img.style.width = ''; img.style.height = '';
        img.style.minWidth = ''; img.style.minHeight = '';
      });

      // Disponible para tbody: bottom del panel menos top real del tbody
      // menos padding-bottom del panel. Esto contempla h2, thead y padding.
      const panelBox = panel.getBoundingClientRect();
      const tbodyTop = tbody.getBoundingClientRect().top;
      const padBot = parseFloat(getComputedStyle(panel).paddingBottom || 0);
      const availableForBody = panelBox.bottom - tbodyTop - padBot - 4;
      if (availableForBody <= 0) return;

      const targetRowHeight = availableForBody / rows;
      // Nombres / caras / puntajes son el contenido más importante. Subimos la
      // proporción del font (50% del row) y achicamos el padding (14% por
      // lado) para que las filas crezcan. Cap a 72 px para pantallas grandes.
      // Cara = 1.6 × fontPx para que sea bien visible.
      const fontPx = Math.max(10, Math.min(60, Math.floor(targetRowHeight * 0.50)));
      const padPx = Math.max(1, Math.floor(targetRowHeight * 0.14));

      tbody.style.fontSize = fontPx + 'px';
      panel.querySelectorAll('tbody td').forEach(td => {
        td.style.paddingTop = padPx + 'px';
        td.style.paddingBottom = padPx + 'px';
      });
      panel.querySelectorAll('tbody .tv-player img').forEach(img => {
        const sz = Math.max(22, Math.round(fontPx * 1.5));
        img.style.width = sz + 'px';
        img.style.height = sz + 'px';
        img.style.minWidth = sz + 'px';
        img.style.minHeight = sz + 'px';
      });

      // Segunda pasada: si el contenido sigue overflowing (porque alguna
      // celda con texto largo no se redujo bien), reducimos un poco más.
      const lastRow = tbody.lastElementChild;
      if (lastRow) {
        const lastBottom = lastRow.getBoundingClientRect().bottom;
        const overflow = lastBottom - (panelBox.bottom - padBot);
        if (overflow > 1) {
          const factor = Math.max(0.6, (availableForBody - overflow) / availableForBody);
          const newFont = Math.max(9, Math.floor(fontPx * factor));
          const newPad = Math.max(0, Math.floor(padPx * factor));
          tbody.style.fontSize = newFont + 'px';
          panel.querySelectorAll('tbody td').forEach(td => {
            td.style.paddingTop = newPad + 'px';
            td.style.paddingBottom = newPad + 'px';
          });
          panel.querySelectorAll('tbody .tv-player img').forEach(img => {
            const sz = Math.max(18, Math.round(newFont * 1.5));
            img.style.width = sz + 'px';
            img.style.height = sz + 'px';
            img.style.minWidth = sz + 'px';
            img.style.minHeight = sz + 'px';
          });
        }
      }
    });
  }
  window.addEventListener('resize', () => {
    requestAnimationFrame(() => requestAnimationFrame(autoFitTables));
  });

  // ----- Suscripciones a Firestore (read-only) -----
  function subscribeToGames() {
    // onSnapshot a la colección entera. Cada vez que cambia algo, recomputamos:
    //   - cuál es el partido in-progress más reciente
    //   - lista de games finalizados (para el ranking de temporada)
    if (TV.unsubscribeGames) { try { TV.unsubscribeGames(); } catch (e) {} }
    TV.unsubscribeGames = onSnapshot(collection(_db, 'games'), snap => {
      const all = snap.docs.map(d => normalizeGame(d.data())).filter(Boolean);
      TV.finishedGames = all.filter(g => g.finished);
      // Partido in-progress: el de updatedAt más reciente con finished===false
      const open = all.filter(g => !g.finished)
        .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      const next = open[0] || null;

      // Si cambió el partido activo, re-suscribirse al doc. Cualquier rama
      // termina en renderAll() para reflejar el cambio (incluyendo cuando se
      // pasa de tener un partido in-progress a no tener ninguno).
      const prevId = TV.currentGameId;
      const nextId = next ? next.gameId : null;
      if (nextId !== prevId) {
        TV.currentGameId = nextId;
        TV.currentGame = next;
        if (TV.unsubscribeGame) { try { TV.unsubscribeGame(); } catch (e) {} TV.unsubscribeGame = null; }
        if (nextId) {
          TV.unsubscribeGame = onSnapshot(doc(_db, 'games', nextId), s => {
            if (!s.exists()) {
              TV.currentGame = null; TV.currentGameId = null; renderAll(); return;
            }
            TV.currentGame = normalizeGame(s.data());
            renderAll();
          }, err => { console.warn('[tv] game listener error', err); });
        }
      }
      // Siempre rerendereamos para que el ranking de temporada se mantenga
      // sincronizado con la lista de finalizados, incluso cuando no hay
      // partido in-progress.
      renderAll();
    }, err => {
      console.error('[tv] games listener error', err);
      setStatus('SIN CONEXIÓN', true);
    });
  }

  // ----- Cast / Presentation API -----
  // Usamos la Web Presentation API (soportada por Chrome desde HTTPS) para
  // que el botón "Castear" muestre la lista nativa de Chromecast / dispositivos
  // de presentación. La página receiver es la propia URL de tv.html.
  // En browsers sin soporte (iOS Safari, Firefox), el botón queda escondido y
  // se muestra una explicación al tocarlo.
  (function setupCast() {
    const btn = document.getElementById('castBtn');
    if (!btn) return;
    btn.hidden = false;  // siempre visible: el modal explica cómo castear si la API falla

    // Detectar device para mostrar la instrucción correcta arriba del modal.
    const ua = navigator.userAgent || '';
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    const isAndroid = /Android/i.test(ua);
    const isFirefox = /Firefox\//.test(ua);
    const isMobile = isIOS || isAndroid || /Mobi/.test(ua);

    // PresentationRequest sólo dispara el selector nativo de Chromecast en
    // Chrome desktop. En Android Chrome el método existe pero rara vez
    // muestra UI: el "Cast tab" se hace siempre desde el menú del browser.
    // Por eso lo intentamos sólo como bonus.
    let request = null;
    if (typeof window.PresentationRequest === 'function') {
      try { request = new PresentationRequest([location.href]); }
      catch (e) { /* ignorar */ }
    }

    function deviceTip() {
      if (isIOS) {
        return {
          title: '🍎 iPhone / iPad',
          steps: [
            'Deslizá desde la esquina superior derecha → abrí el <b>Centro de Control</b>.',
            'Tocá <b>Duplicar pantalla</b> (⊟).',
            'Elegí tu <b>Apple TV</b> o <b>Chromecast con AirPlay</b> en la lista.',
            'La pestaña con <code>tv.html</code> aparece en la TV. Volvé a esta pestaña en el cel.'
          ]
        };
      }
      if (isAndroid) {
        return {
          title: '🤖 Android / Chrome',
          steps: [
            'Tocá el menú <b>⋮</b> (tres puntos) arriba a la derecha en Chrome.',
            'Tocá <b>Transmitir...</b> (Cast).',
            'Elegí tu <b>Chromecast</b> y luego <b>"Transmitir pestaña"</b>.',
            'La pestaña actual aparece en la TV en vivo.'
          ]
        };
      }
      if (isFirefox) {
        return {
          title: '🦊 Firefox',
          steps: [
            'Firefox no soporta cast nativo en esta computadora.',
            'Probá desde Chrome o Edge en la misma compu.',
            'O conectá la laptop por <b>HDMI</b> a la TV y poné esta pestaña en pantalla completa (F11).'
          ]
        };
      }
      return {
        title: '💻 Chrome / Edge en escritorio',
        steps: [
          'Click en el menú <b>⋮</b> → <b>Transmitir...</b> (Cast).',
          'Elegí tu Chromecast y al lado de "Fuentes" seleccioná <b>Pestaña</b>.',
          'La pestaña actual se proyecta en la TV en vivo.'
        ]
      };
    }

    function openCastModal() {
      // Si la API estuviera disponible, intentamos primero. Si falla con
      // NotFoundError o el user cancela, mostramos el modal igual.
      if (request && typeof request.start === 'function') {
        request.start().then(s => {
          btn.classList.add('casting');
          btn.lastElementChild.textContent = 'Casteando';
          s.addEventListener('terminate', () => {
            btn.classList.remove('casting');
            btn.lastElementChild.textContent = 'Castear';
          });
        }).catch(err => {
          if (err && err.name === 'AbortError') return;  // user canceló — silencioso
          showInstructionsModal();
        });
      } else {
        showInstructionsModal();
      }
    }

    function showInstructionsModal() {
      const tip = deviceTip();
      // El modal vive directo en body con position: fixed; se borra al cerrar.
      const wrap = document.createElement('div');
      wrap.id = 'castInstrModal';
      wrap.innerHTML = ''
        + '<style>'
        + '#castInstrModal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.78);'
        + 'display:flex;align-items:center;justify-content:center;padding:1rem;'
        + 'font-family:Inter,-apple-system,sans-serif;color:#f0f0f5;}'
        + '#castInstrModal .ci-card{background:#1a1a2e;border:2px solid #FFDE00;'
        + 'border-radius:18px;max-width:520px;width:100%;padding:1.5rem 1.5rem 1rem;'
        + 'box-shadow:0 20px 60px rgba(0,0,0,.6);}'
        + '#castInstrModal h3{font-family:"Fredoka One",cursive;color:#FFDE00;'
        + 'font-size:1.3rem;margin:0 0 .25rem 0;}'
        + '#castInstrModal .ci-sub{color:#8888a8;font-size:.85rem;margin-bottom:1rem;}'
        + '#castInstrModal ol{margin:0 0 1rem 0;padding-left:1.4rem;line-height:1.6;font-size:.95rem;}'
        + '#castInstrModal ol li{margin:.4rem 0;}'
        + '#castInstrModal code{background:#0d0d12;padding:.1rem .4rem;border-radius:4px;'
        + 'font-size:.85em;color:#FFDE00;}'
        + '#castInstrModal .ci-url{display:flex;gap:.5rem;background:#0d0d12;padding:.6rem .75rem;'
        + 'border:1px solid #3a3a5c;border-radius:10px;font-size:.8rem;color:#8888a8;margin-bottom:1rem;'
        + 'word-break:break-all;align-items:center;}'
        + '#castInstrModal .ci-url code{background:transparent;color:#f0f0f5;padding:0;flex:1;}'
        + '#castInstrModal .ci-url button{background:#FFDE00;color:#1a1a1a;border:none;padding:.35rem .7rem;'
        + 'border-radius:6px;font-weight:700;cursor:pointer;font-size:.75rem;flex-shrink:0;}'
        + '#castInstrModal .ci-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:1rem;}'
        + '#castInstrModal .ci-actions button{background:#FFDE00;color:#1a1a1a;border:none;padding:.55rem 1.2rem;'
        + 'border-radius:999px;font-weight:700;cursor:pointer;}'
        + '#castInstrModal .ci-actions button.ghost{background:transparent;color:#8888a8;border:1px solid #3a3a5c;}'
        + '</style>'
        + '<div class="ci-card" role="dialog" aria-labelledby="ci-title">'
        +   '<h3 id="ci-title">📡 ' + tip.title + '</h3>'
        +   '<div class="ci-sub">Cómo proyectar esta pantalla en la TV</div>'
        +   '<div class="ci-url"><code>' + location.href + '</code><button id="ciCopy">Copiar</button></div>'
        +   '<ol>' + tip.steps.map(s => '<li>' + s + '</li>').join('') + '</ol>'
        +   '<div class="ci-actions"><button class="ghost" id="ciClose">Listo</button></div>'
        + '</div>';
      document.body.appendChild(wrap);
      wrap.addEventListener('click', e => { if (e.target === wrap) wrap.remove(); });
      wrap.querySelector('#ciClose').addEventListener('click', () => wrap.remove());
      wrap.querySelector('#ciCopy').addEventListener('click', () => {
        try {
          navigator.clipboard.writeText(location.href).then(() => {
            wrap.querySelector('#ciCopy').textContent = '✓';
          });
        } catch (e) {
          wrap.querySelector('#ciCopy').textContent = '✓';
        }
      });
    }

    btn.addEventListener('click', openCastModal);
  })();

  // Boot
  setStatus('EN VIVO', false);
  subscribeToGames();
  // Aviso si Firestore tarda > 8 s en responder (network mala, etc).
  setTimeout(() => {
    if (!TV.currentGame && TV.finishedGames.length === 0) {
      // Mantener la pantalla "esperando"; sólo cambiamos status si ni siquiera
      // vino el primer snapshot.
      if (!TV.unsubscribeGames || !document.querySelector('#tvBody .tv-panel')) {
        setStatus('SIN DATOS', true);
      }
    }
  }, 8000);

  // Para tests: exponemos algunos handlers e info de estado
  window.__TV_BOOT_OK__ = true;
  window.__TV_HELPERS = { unwrap2d, normalizeGame, gameScoreBreakdown, gameTotalScores };
</script>
